body:
  text: 卷二大便不利按大便不利一證有陽虛陰虛陽明胃實肺移燥熱之別因陽虛者由下焦火衰不能化下焦之陰陰主靜而不動真氣不能施其運行之力故大便不利其人定見無神面目唇口青黑色滿口津液不思茶水雖十餘日不便而並無腹脹煩躁不安等情即有渴者定喜熱湯冷物全然不受他書稱為陰結寒閉者即此也法宜扶陽如回陽飲加安桂砂仁白通湯附子甘草湯之類因陰虛者由火旺傷血血液枯槁腸中之糟粕乾澀不行如船舟之無水而停滯不動也其人定多煩躁聲音響亮渴欲飲冷吐痰干黃脈或洪大細數他書稱為熱結陽秘者即此也法宜養血清熱如潤燥湯麻仁丸養血湯加麥芽香附蜂蜜之類因陽陰胃實者由外邪入胃從胃熱而化為熱邪熱甚則胃中津液立亡故不利其人定見惡熱口臭身輕氣粗飲冷與夫狂妄譫語痞滿實燥堅等情法宜急下以存陰如大小承氣湯之類因肺移燥者由燥邪乘肺肺與大腸為表裡表分受邪漸及里分其勢自然其人定多煩渴皮膚不澤大便脹甚欲下不下法宜清燥為主如甘桔二冬湯益元散之類以上治法不拘男婦老幼皆宜如此故曰有是病宜是藥切勿惑於老幼附子大黃之說也眉批知非氏曰細推大腸主糟粕原自胃中傳入其勢頗順經曰胃實則腸虛腸實則胃虛指糟粕出入而言其所以運化糟粕則在元氣元氣出入升降運化精微今病人大便不利仍是氣機不利總貴在病機病情上求之學者須要先明理法然後臨證審察的確或回陽或清熱或急下方有膽量把握不然誤下誤清雖不遭謗倘用回陽豈不惑己惑人欽安指點親切當細心講究亦不可恃有此按不揣病源致臨機而仍蹈徒法不能以自行之弊也近來市習一見大便不利多用大黃與滋陰潤腸之香油蜂蜜麻仁郁李歸芍之類並不問及陰陽受害實多而人不察良可悲也小便不利按小便不利一證有陽虛陰虛心移熱於小腸與太陽腑證中之蓄尿蓄熱蓄血癃閉諸證因陽虛而致者由下焦陽微陰寒阻截膀胱之路陽微無力不能化之故小便不利其人定無力無神兩尺必浮空或極勁口並不渴即有渴者必喜熱湯法宜扶下焦之陽如桂苓朮甘湯倍桂加白蔻砂仁或桂棗丸加胡椒丁香之類因陰虛而致者由下焦血液不足邪熱遂生須知焦思則生心火忿怒生肝火思淫動相火火動於中不獨此疾皆是由一念而生其旨甚微切不可概謂由外而生熱結於尿隧閉其水道流行之機故不利其人多煩躁口渴飲冷小便或能滴幾點或短赤而熱痛法宜扶下焦之陰如四苓滑石阿膠湯益元散之類因心移熱而致者由心火太旺或焦思太甚而生心火心與小腸為表裡心熱甚而小腸受之熱伏小腸傷及血液流行失職而小便遂不利也其人病情多與陰虛法同法宜清心如黃連解毒湯加滑石木通或導赤散倍生地之類至於太陽腑證中之蓄尿蓄熱蓄血癃閉等證已詳醫理真傳茲不具載眉批知非氏曰前證言胃傳糟粕於二腸得元氣運化而出膀胱主溺與二腸無涉知非細推其原在胃陽明為海生精生血化氣行水之宗且脾為胃行津液脾能行水由水道達於膀胱膀胱有下口而無上口須氣化滲泌而出今病人小便不利明是二土失職中宮少運經曰陽明主闔又曰脾胃同處中州又可見脾不為胃行津液故水道不利如此溯本窮源陽虛陰虛一切移熱蓄熱蓄尿蓄血癃閉諸證有由來矣再觀仲景五苓散方中用桂枝白朮通陽和脾義極精微大具神通手眼欽安按中執定陰陽實據加以溫中行氣治之必無不效也近來市習一見小便不利便以木通車前滑石黃連等治之陽實易瘳陽虛則殆不可不知也淋證按淋證一條諸書載有勞淋砂淋血淋氣淋石淋之別是因病情而立名者也予欲求其一定之要諸書俱未明晰再三追索統以陽不化陰抑鬱生熱為主大凡病淋之人少年居多由其泄欲已開專思淫邪或目之所見耳之所聽心之所思皆能搖動陰精邪念一萌精即離位遂不復還停滯精道不能發泄久久抑鬱生熱熬干陰精結成砂石種種病形當小便便時氣機下降敗精之結於經隧者皆欲下趨然尿竅與精竅相隔一紙精竅與尿竅異位同源同從玉莖而出尿竅易開精竅不易啟不知好色之人元陽日耗封鎖不固當君火下照尿竅已開精竅亦啟尿欲速出而精竅又開兩竅相啟彼此牽強欲行不行而痛故愈甚也此二竅原不並開此證全是並開之故兩相欲下停精之結與未結化與未化者皆欲下趨也精停而結者有砂石之形鬱熱熬而成之也好色過度精未化者血淋之源也治砂石貴以清熱為先而化氣之品亦不可少治血淋須以扶陽為重交通上下而固元尤當知此病皆由自取當其痛如刀割雖云可憐未始非好色之果報也古方每以八陣五淋散功專清熱亦多獲效予意此證當於清熱利水中兼以化精化氣之品鼓其元陽俾二竅不同時並開為主予治此證嘗以滋腎丸倍桂多效又嘗以白通湯專交心腎亦多效又嘗以大劑回陽飲加細辛吳萸安桂多效是取其下焦有陽而開闔有節不至兩相併啟也但服回陽等方初次小便雖痛甚而尿來覺快者氣機將暢而病當解也此道最微理實無窮學者須當細心求之勿執予法為一定恐未必盡善眉批虛心人語又是婆心人語而辨認總以陰陽兩字有神無神兩尺浮大有力無力為準眉批淋之一證責在精道予嘗詢之少年之人其精中往往有子早已廉得其情百不失一委是縱欲所致譬如月缺難圓金針暗失人生不免殊為恨事迨至病成痛作尤徵過縱謂曰自取果報夫夫也其何說之辭治法扶陽抑陰如其人神不大衰加清上焦之邪火佐以行氣並囑其清心節欲自無不愈也欽安抉破其情論辨精詳自是方家舉止且為腦後痛下針砭喚醒夢夢以規戒為治法的是妙人卻與知非同為快人也呵呵膝腫痛按膝腫痛一證有由外感寒濕之邪閉塞關節者有陽虛者有陰虛者因外感寒濕而致者或貪涼而足履冷水或偶受寒邪而經絡閉塞漸至兩膝腫痛諸書有歷節風鶴膝風之說由其寒濕之邪從外而入閉其運行之機膝處多空虛之地最易藏邪氣道壅滯水濕漸臻抑鬱生熱而成膝腫疼痛之疾法宜發汗行水為主如小青龍湯或麻黃湯加茯苓澤瀉之類因陽虛者由其素秉不足陰邪寒濕叢生流入下焦關節屈伸之處或胃陽不足過於飲酒酒濕之邪流入關節阻滯不行而膝腫痛但其證多皮色如常漫腫微痛實屬陽微不能化陰法宜溫固脾腎之陽如回陽飲加桂苓益智故紙茴香砂仁之類多服自愈切不可性急而信心不堅因陰虛者由其素秉陽旺過食醇酒厚味濕熱毒邪流入下焦關節處運行不暢遏鬱而紅腫便生法宜養陰清熱兼理氣除濕為主如黃連阿膠湯加苓術補血湯加秦艽羌活桑根香附麥芽之類此數法不過明其陰陽大致究竟認證全在活法神而明之眉批知非氏曰細玩易象震仰孟二陰上一陽下孔子取為足能走夫陽動陰靜動而在下者足也震動也氣之動於下者也今膝腫痛或腳氣注痛必不便於行而陽先病矣所以然者不外內外二因醫先識此知寒邪中於爾則動於下之氣機不利而有腫痛流注之證乃於逐邪之中審其陽氣之衰盛而多方照顧預培其生機毋使邪氣克正致勢滔天不可向邇矧可撲滅滔火者犯心之謂也陽微不能化陰之謂也欽安諄諄於溫固回陽兼補發汗行水除濕散結諸法者通其源正市習之訛者節其流學者洞晰源流治膝腳之證無餘蘊壽世活人大為快事腳氣按腳氣一證有由下而上衝作痛者有隻在下作痛者有大病後至午後腳底即發熱作腫作痛皮色如常至天明即愈者有天陰甚而痛反劇者以上數證悉屬陽虛不能鎮納陰邪陰氣上騰乃為大逆犯心能令人死法宜回陽收納為要如回陽飲加砂仁故紙益智碎補與白通湯之類若只在下而作腫痛挾濕亦多加除濕必效如或紅腫痛甚心煩口渴小便短赤乃濕熱結聚下焦也法宜除濕濕去而熱自消如五苓散雞鳴散之類更有紅腫痛極欲死氣喘唇青小便清長者乃是元氣發外從腳而脫也法宜大劑回陽為要切不可按尋常腳證治之近來市習一見腳腫腳氣發騰不察虛實每以蒼朮苡仁秦艽防己木瓜茯苓桂枝松節等藥治之濕邪易瘳陽虛則殆喘證按喘促一證有外感風寒而致者有太陽證誤下而致者有胃火上攻而致者有濕痰水飲閉塞而致者有元氣欲脫而致者因風寒而致者由風寒之邪閉塞肺氣肺氣發泄不暢上壅而喘必有發熱頭痛身疼一段為據如發熱而無頭疼身疼或見口唇青脈勁之喘必是元氣外越不得即以外感風寒閉塞目之辨認留意切不可少法宜宣散如麻黃湯定喘湯小青龍湯之類因太陽誤下而致由太陽之邪未解既已壅塞發泄不暢仍宣大啟其腠理俾邪早出醫者不明其理見其大燒以為火旺妄行攻下客邪下陷愈不得出壅於胸膈呼吸錯亂而喘證立生法宜仍舉其所陷之邪如桂枝湯去芍藥倍桂或重加甘葛以舉之類俾欲出者仍從外出以解透為妙也因胃火上攻而致者由胃中素有伏熱或與外來之熱邪協或胃中有停滯生熱熱甚則邪火上攻熱逼於肺氣無所主呼吸錯亂而喘證立生必有大渴飲冷口臭氣粗二便不利等情法宜攻下如大小承氣湯白虎湯之類因痰濕水飲而致者由太陽之氣化偶乖中宮之轉輸失職水濕停滯不行久久中氣日衰痰水日盛漸漸上干清道壅塞太甚呼吸錯亂而喘證立生其人定見食少痰多清水上湧喉中不利法宜溫中除濕如桂苓朮甘湯理中加砂半茯苓之類因元陽將脫而喘者由其人陽衰陰盛已極逼陽於外陽氣不得下趨潛藏陰陽兩不相接呼吸錯亂而喘促立生必現面白唇青口舌黧黑人無生氣全是一團純陰此刻有大燒汗出之可畏法宜回陽收納如吳萸四逆湯加丁香胡椒砂仁之類尚可十中救一二眉批知非氏曰孟子云今夫蹶者趨者是氣也又曰夫志氣之帥也又曰持其志勿暴其氣此理可通乎治喘彼趨與蹶皆令人氣喘以其升降紆徐之機為作勞所迫促然一經靜鎮而即平今氣之喘不由作勞而亦迫促不舒且非靜而能鎮是孰使之然哉誠有如欽安所論五因各因皆有辨認陰陽虛實之憑據可謂詳矣惟元陽將脫之喘用回陽收納之法未免駭人殊不知志為氣帥持其志勿暴其氣正合用姜附之機宜神機化滅升降將息火用不宣水體不動惟有用薑附以養帥帥如能振氣即隨之而號令庶幾中與可冀此煉石補天之技出人頭地之醫學者視薑附為熱藥斯得之矣迨至病人燒退身安薑附又能退熱夫熱屬火薑附退熱為瀉火學者視薑附為涼藥則更妙矣呵呵凡治喘證切不可猛浪先將陰陽情形審明然後施治切不可一味治喘妄以蘇子降氣湯麻黃定喘湯投之風寒可施內傷則殆汗證按汗證一條有陽虛者有陰虛者有太陽風傷衛者有陽明熱盛者因陽虛者由其人素秉陽虛或用心過度而損心陽心陽衰不能統攝心中之液而汗出或脾胃陽衰不能收攝脾胃中之血液而汗出或肝腎陽衰不能收束肝腎中血液而汗出上中下三部陽衰皆能出汗統以陽虛名之其人定多嗜臥少氣懶言為準法宜扶陽陽旺始能鎮納群陰陰氣始得下降陽氣始得潛藏乃不外亡法宜回陽收納溫固為要如封髓丹潛陽丹黃耆建中湯回陽飲之類因陰虛者則為盜汗由其人血液久虧不能收藏元氣元氣無依而外越血液亦與俱出多在夜分夜分乃元氣下藏之時而無陰以戀之故汗出也非汗自出實氣浮之徵也法宜養血如當歸六黃湯封髓丹倍黃柏加地骨皮之類更有一等陰盛隔陽於外之證夜間亦汗出此為陽欲下交而不得下交陽浮於外故汗出法宜扶陽陽旺而陰不敢與爭陽氣始得下交如白通湯補坎益離丹之類務要知得陰虛陰盛之旨陰虛則火旺其人定然有神煩渴飲冷為據陰盛則陽衰其人定然無神少氣懶言不渴不食即渴喜滾為據因內傷太陽衛分者由太陽之氣不足不能充周於腠理毛竅空疏風入於內風為陽邪善行而動衛外血液不得潛藏隨發熱之氣機而外出故自汗淋漓法宜扶太陽之氣太陽氣旺始能勝邪仲景之桂枝湯是也因陽明火旺而致者由胃中有火熱蒸於外大汗如雨非若久病大汗亡陽之證此則其人大渴飲冷二便閉塞煩躁身輕氣粗口臭法宜專清胃熱如人參白虎湯大小承氣湯之類是也更有一等汗證如戰汗狂汗黃汗熱汗冷汗上身汗下身汗頭汗飲酒食肉汗出之例亦不可不知夫曰戰汗者由正氣鼓動與外入之邪氣相攻客邪外越驟然戰慄不已汗大出汗止而戰慄自然不作病即立瘳瘟疫證中有此一證又曰狂汗者由外邪入內隨熱而化熱乘於心神識不明當正邪相攻客邪突出心神不定其人如狂大汗如注邪盡汗止而病可立瘳又曰黃汗者汗出沾衣而衣皆黃也由脾液發泄不藏法宜收納脾胃之元氣如薑砂草理中湯之類又曰熱汗者陽分之徵冷汗者陰分之驗上身獨汗者陽竭於上也下身獨汗者陰脫於下也上下二證是為久病虛極者言也總以收納為要若病未大虛而上身汗者責在氣分有熱下身汗者責在血分有火不可拘執務在這陰陽互根處理會至於頭汗出至頸而還有風淫於上有濕熱蒸於上有蓄血生熱而蒸於上須當變通若是飲酒食肉而即汗出者多由其人素緣胃熱一遇飲酒食肉胃氣即動熱氣沸騰薰蒸於上而汗出於外不藥無傷此有餘之候非不足可比眉批此等之人計不是病乃精不深藏神不內斂氣易外越夏固如此冬亦皆然主潦倒一生此又相法之可通於醫者尚有一等絕證汗出如珠如油如雨種種不治之證予曾經驗急以仲景回陽湯飲救之十中每痊四五當此時也病家亦委之命而莫救也醫家亦委之於絕而莫救也雖曰天命又何妨力盡人事哉但欲開方務在單上批寫明白告誡病家設或追之不及不得歸咎於醫藥以免後人借為口實目下世人畏附子乾薑不啻砒毒眉批世人畏薑附庸醫誤之也醫生畏薑附火字誤之也即有當服附子而亦不肯服者不勝屈指矣嗟呼陰陽不明醫門壞極喜清涼而惡辛溫無怪乎陰盛陽衰矣眉批知非氏曰汗者渙也易曰汗渙具大號氣機之外出者然也然有病有不病焉陰陽本是一個動為陽靜為陰外為陽內為陰出則俱出入則俱入相隨不離故曰互根又曰一而二二而一性兼寒熱熱則動寒則凝機緘本乎自然故夏則多汗冬則無汗勞則多汗逸則無汗此不病之常也病則無冬無夏無勞無逸皆有外越之機身體必見不安之狀或因陰虛或因虛或太陽中風或陽明熱越少陰少陽厥陰太陰無不汗出欽安論治絲絲入扣學者詳玩熟記臨證處方萬舉萬當何多求焉近來市習一見汗出多以麻黃根冬桑葉浮麥參耆之類治之不在陰陽互根處理會每多不效健忘按健忘一證固有陽虛陰虛之別然亦不必拘分統以精神不足為主凡人稟二氣以生二氣即陽精陰精也二氣渾為一氣神居二氣之中為氣之宰故曰精氣神二氣貫於周身神亦遍於周身精氣足則神自聰明故無所不知不曉精氣衰則神昏故時明時昧猶若殘燈之火欲明不明不能照物此病老年居多少年卻少即有如斯之少年其所傷損不異乎老人也此病法宜交通陰陽為主再加以調養胎息之功攝心於宥密之地久久行之亦可復明如將竭之燈而更添其膏也方用白通湯久服或桂枝龍骨牡蠣散三才潛陽等湯緩緩服至五六十劑自然如常切勿專以天王補心寧神定志諸方與參棗茯神遠志硃砂一派可也眉批邵子詩云耳目聰明男子身鴻鈞賦於不為貧病至健忘賦畀之良危矣欽安定以精神不足透出神昏之所以然理明法立非淺見寡聞者所能窺測苟能按方用藥可療此疾又何必深究所以此一段乃性靈文字不在醫例亦不得作醫書觀夫神與氣精是三品上藥獨神是火為先天之元陽不但統制氣精而氣精皆神所生故此火宜溫不宜涼宜養不宜折病人但能存此火尚可施治此火一滅精氣絕而其人死矣豈但健忘一證即一部醫法圓通之死證皆此火衰絕耳凡醫因何而不敢放膽用薑附以活人耶全龍點睛正在此處學者著眼至攝心宥密乃培養此火種之法欽安之醫之心之學亦於是乎在驚悸按驚悸一證名異而源同同在心經也驚由神氣之衰不能鎮靜悸由水氣之擾陰邪為殃二證大有攸分不得視為一例予意當以心驚為一證心悸為一證臨證庶不至混淆立法治之方不錯亂夫曰驚者觸物而心即惶惶無措偶聞震響而即恐懼無依此皆由正氣衰極神無所主法宜扶陽交通水火為主如白通湯補坎益離丹之類多服自愈悸者心下有水氣也心為火地得陰水以擾之故心不安水停心下時時盪漾故如有物忡也法宜行水為主如桂苓朮甘湯澤瀉散之類若悸甚而心下痛甚時聞水聲又當以十棗湯決堤行水不可因循姑惜以釀寇仇也眉批知非氏曰經曰陽氣者欲如運樞起居如驚神氣乃浮欽安分驚為一證以為正氣衰微神無所主法宜扶陽與內經吻合自是方家舉止分悸為一證指為心下有水氣亦合仲景之法凡醫皆能如此認證言言有物謂有不愈之病吾不信也近來市習一見驚悸並不區分概以安魂定魄為主一味龍骨硃砂茯神遠志棗仁參歸治之治驚之法盡於斯矣不臥按不臥一證有因外邪擾亂正氣而致者有因內傷已久心腎不交而致者有因卒然大吐大瀉而致者有因事勢逼迫憂思過度而致者因外感而致者由邪從外入或在皮膚或在肌肉或在經輸或在血脈或在臟腑正氣受傷心君不寧故不得臥必須去其外邪正復神安始能得臥醫者當審定邪之所在如汗出不透者透之熱鬱不泄者泄之氣化不得化者化之樞機失運者運之可吐者吐之可下者下之可溫者溫之可涼者涼之按定淺深病情提綱自然中肯因內傷而致者由素秉陽衰有因腎陽衰而不能啟真水上升以交於心心氣即不得下降故不臥有因心血衰不能降君火以下交於腎腎水即不得上升亦不得臥其人定見萎靡不振氣短神衰時多煩躁法宜交通上下為主如白通湯補坎益離丹之類因吐瀉而致者由其吐瀉傷及中宮之陽中宮陽衰不能運津液而交通上下法宜溫中如吳茱萸湯理中湯之類因憂思而致者由過於憂思心君浮躁不寧元神不得下趨以交於陰故不得臥此非藥力可醫必得事事如意神氣安好自然能臥若欲治之亦只解鬱而已如歸脾湯鞠郁丸之類近來市習一見不臥便謂非安魂定魄不可不知外感內傷皆能令人不臥不可不辨也眉批知非氏曰不臥一證屬少陰於何徵之仲景傷寒論曰少陰之為病脈微細但欲寐也但欲寐者但想臥而不得臥即不臥之深文故屬少陰學者凡遇不臥之證拿定提綱再審所因罔不中肯此扼要之法也痢證按痢證一條舒馳遠先生分為四綱曰秋燥曰時毒曰滑脫曰虛寒甚為恰切予謂此四法中燥證十居其八時毒十居二三滑脫與虛寒十居四五但辨察之間不可無法燥證之痢裡急後重日雖數十次精神不衰喜飲清涼法宜清潤始甘桔二冬湯是也時毒之痢裡急後重多見發熱身疼一鄉一邑病形皆相似也乃是時行不正之氣由外入內伏於腸胃與時令之燥氣相合膠固腸胃而成痢法宜升解如人參敗毒散葛根芩連之類滑脫與虛寒之痢二證情形雖異病原則同總緣中宮陽衰運轉力微陰邪盤踞腸胃阻滯元氣運行之機雖有裡急後重之勢糞出尚多非若秋燥時毒之痢每次便時不過幾點而已其人多見面白無神四肢困倦法宜溫固為主如附子理中湯理脾滌飲之類總之白痢赤痢痛甚裡急後重劇者燥熱之徵不痛裡急後重微者虛寒之驗他如純白如魚腦如豬肝如塵腐大熱不休口噤不食呃逆頻添種種危候雖在死例然治得其法十中亦可救二三予亦嘗遇此等危證審無外感無邪熱每以回陽收納法治之多效但大熱不休一條審察其人煩躁飲冷有神者以調胃承氣治之若無神安靜不渴急以回陽大劑治之亦易見效若妄以為陰虛而以養陰法治之百無一生眉批知非氏曰夫痢險症也最多危候庸手無論矣歷來諸名家亦少會歸惟陳修園先生時方妙用中論痢最佳緣熟習傷寒所論治法推本六經方是仲景方法是仲景法未嘗於仲景外稍參時法分經治病而不治痢其得力於傷寒者深矣予恆遵用其法百發百中人咸訝其神奇其實以古方治今病今月古月豈有異乎在有心人自為領取耳欽安所論為詳盡鄙心為止快近來市習一見痢證以黃芩芍藥湯與通套痢疾諸方治之究其意見無非清熱導滯調氣行血而已不知氣血之不調各有所因知其所因而治之方是良相不知其所因而治之皆是庸手呃逆按呃逆一條有陽虛陰虛元氣將絕之別不可不知也因陽虛者由中宮之陽不足以致陰邪隔據於中阻其呼吸往來接續之機其人定見無神安靜不食不渴法宜溫中降逆為主如理中湯加吳萸半夏之類因陰虛者蓋以陰虛由於火旺火邪隔拒於中阻其上下交接之氣其人定見躁暴飲冷惡熱精神不衰二便不利法宜苦寒降逆為主如大小承氣湯之類因元氣將絕而致者蓋以元陽將絕群陰頓起阻其升降交接之機其人或大汗自汗出或氣喘唇青或腹痛囊縮或爪甲青黑或頭痛如劈目眥欲裂耳腫喉痛種種病情皆宜大劑回陽降逆十中亦可救二三如吳萸四逆湯白通湯之類眉批欽安論此一條不在證名上論治專在所因上談法是一段聰明文字是此證聰明治法學者能識此聰明之理法便是良醫近來市習一見呃逆陰陽不分一味以橘皮半夏竹茹丁香柿蒂等藥治之亦有見效終不若辨明陰陽治之為當也反胃按反胃一證有陽虛陰虛之別因陽虛者蓋以陽衰則不能鎮納僭上之陰陰邪過盛勢必與陽相拒一切經火烹調之物皆不能容故下喉數刻或二三時乃仍吐出其人定見脈大而空或勁如石言語一切無神困倦喜臥法宜回陽降逆為主如吳萸四逆湯半夏生薑湯之類諸書亦云朝食暮吐為命門無火不能薰蒸果稱灼見但用藥多以陽八味大補元煎治之為補命門必用之藥舍此二方無從下手予嘗試之多不見效所以然者二方概以熟地為君以補陰棗皮以滋陰丹皮以瀉火用桂附僅十中之二三試問既曰命門無火理宜專用桂附以補火何得用地棗以滋陰丹皮以瀉火乎此皆景岳不讀仲景之書而未明陰陽之道也在景岳以為善補陽者於陰中求陽故用一派養陰之藥雜一二味補火之品於中而謂陰中求陽至極無二之法獨不思仲景為立法之祖於純陰無陽之證只用薑附草三味即能起死回生並不雜一養陰之品未必仲景不知陰中求陽乎仲景求陽在人身坎宮中說法景岳求陽在藥味養陰里註解相隔天淵無人窺破矇蔽有年不忍坐視故特申言之眉批知非氏曰斯文宗孔孟講武宗孫子註疏宗程朱百家眾技者流咸存而不論以故朝野相安道一風同稱郅治焉獨至於醫為斯世所不可缺雖窮鄉僻壤亦有囊中而趨向各不相侔聖凡迄無定論草菅人命亦不為怪此段疑案悒於懷抱久矣欲互相商榷又少知音今於批評欽安書至反胃一證其駁景岳用藥大為有理因思市醫宗後世諸家者多後世諸家之書又多於古人古人分六經後人分五經古人立方不講藥性後人立方專究藥性古人方效而今人不用後人方不效今人樂於從事反詆古人之方為太重後人之方為輕而合宜古人不立證名後人多立證名古人不以脈定證後人能以脈知病古人只論六陰陽後人論千陰陽萬陰陽群言淆亂衷諸聖今人竟舍古人而從後人視古人為不可知後人乃可法反覺後來居上以故靈素難經及傷寒成為畏途而人命直為兒戲矣余誠不知醫鄙意總以能讀古人之書得古人之心法用古人之方治今人之病或生或死與古人相合於今人無誤方為醫者未知是否祈閱者教之因陰虛者蓋以陰衰不能制火火拒於中氣機有升無降故飲食下喉一刻仍然吐出其人定見精神不衰聲音響亮煩躁不寧關脈必洪大有力法宜苦寒降逆為主如大小承氣湯之類他書議論紛紛愈出愈奇去理愈遠不可為法其中因受雖異總以一逆字定之逆則以陰陽判之便了癲狂按癲狂一證名異而源同同者同在心經也癲虛而狂實癲為心陽之不足神識錯迷癲者言語重複喜笑無常作事無緒皆由心陽不足神識不清寒痰易生上閉心竅亦能使人癲癲倒倒然專於治痰便是捨本逐末不可為法交通上下是為治本握要法宜細心體會之狂乃邪火之橫行神無定主狂者本由邪火乘心亂其神明神無所主故大叫狂妄登高棄衣親疏不避治之專以下奪清熱為主治癲貴以養正兼以行痰治狂務於祛邪滅火為要白通梔豉主於交通陰癲陽癲可療大小承氣專行攻下狂妄能醫其中尚有夙孽冤憑尤當急作善功懺悔眉批知非氏曰扶正治癲下氣治狂名論不刊近來市習治癲專以祛痰安魂定魄治狂每以清火降痰亦多獲效終不若握定金針臨證有據也脹滿按脹滿一條諸書分別有膚脹腹脹水脹氣脹血脹蠱毒之名總無一定之旨歸予仔細推究因太陽失職氣化失化而致者十居七八因吐瀉傷中克伐元氣而致者十居四五若蠱毒則另有由致所謂因太陽失職者何蓋以太陽為一身之綱領主皮膚統營衛臟腑經絡骨節莫不咸賴焉太陽居坎宮子位一陽發動散水精之氣於周身乃眾陽之宗一元之主也故稱之曰太陽至尊無二之意也乃人不知保護內而七情損之外而六客戕之以致一元傷損運化失於皮膚則膚脹生運化失於中州則腹脹作運化失於下焦則陰囊腳脹起水逆於肺則生喘咳水逆於腸則生泄瀉水注於左注於右留於上留於下留於中化而為痰則有五飲之說水脹之源皆本於斯至於氣脹者乃元氣散漫之徵多起於大病久病或吐瀉或過於克伐傷於一元血脹者周身浮腫而皮色紫紅是氣衰而陰乘於上也亦有周身浮腫而小腹硬滿小便短赤是陽衰於下而陰不化也總而言之萬病起於一元傷損分而言之上中下各有陰陽十二經各有陰陽合而觀之一陰一陽而已更以陰陽凝聚而觀之一團元氣而已至於受病淺深各有旨歸然分類以治之未始不當但方愈多而旨愈亂若不再行推醒拈出旨歸將來後學無從下手當今之際誰非見腫治腫見脹消脹者哉予意此病治法宜扶一元之真火斂已散之陽光俾一元氣復運化不乖如朮附湯姜附湯真武湯桂苓朮甘湯附子理中湯麻黃附子細辛湯附子甘草湯之類以上數方各有妙用膚脹水脹氣脹血脹腹脹皆能奏功眉批知非氏曰中寒生脹滿脹滿屬太陰此病根也試取譬焉人身尤葫蘆葫蘆有前面腹為陰也葫蘆有後面背為陽也葫蘆有上面頭為諸陽之首乾也葫蘆有下面戌亥子醜兩陰交盡二陽初生之地坎也坤也斗膽言乎中葫蘆裡面有金丹金者乾也丹者坎為月也月本無光借日而有光蓋乾交乎坤三索而得男哉生明矣三五而盈三五而缺識此之故所謂天道下濟而光明也脹滿本屬陰寒為病必陽先虛而不運斯陰始實而成脹欲消此脹必先扶陽岐伯曰陰病治陽仲景曰太陰之為病腹脹滿而用乾薑早為萬世之梯航何待饒舌然而時醫不知身中陰陽上下往來為病之消息不得不將古法今朝重提起欽安推本太陽知非更進少陰少陰者君火也主弱則臣強臣強必欺主是故少陰之君火衰微則各路之煙塵四起或太陽之寒水一強主膀胱不利或少陽之相火一強主胸膈脅肋脹滿或陽明之燥金一強主肌肉脹滿或太陰之濕土一強主單腹脹滿有大如甕者或厥陰之風木一強主少腹陰囊及腳腿脹滿獨少陰之君火一強則群陰見睍秋陽當空萬魔潛消矣故仲景以脈微細但欲寐稱為少陰不足之病三瀉心湯治少陰有餘之病三急下法存少陰將絕之陰由此推之六經皆能為脹六經之方各有治脹之妙神而明之存乎其人耳總而言之元陽為本諸陰陽為標能知諸陰陽皆為元陽所化一元陽變而為諸陰陽元陽即是諸陰陽諸陰陽仍是元陽而又非諸陰陽之外另有一元陽元陽之外另起諸陰陽陰陽又不是混作一團又不能打成一片則治病不難而可懸壺於市矣再能知六經中有主腦六陰陽中有竅妙斯真鑿破鴻濛闢開太極醫道特其餘事又多能云爾唯蠱毒則另有法治然蠱有自外自內之別自外者何埋蠱厭人一法蠻方最多或蛇或蟲或龜或鱉煉而成之或於食物放之或於衣被放之人中之者久久面黃肌瘦腹大如鼓不久即死蓄蠱之人家道順遂自喜術靈而不知造孽已深不可解也匯參輯成石室秘錄各家書上皆有妙方茲不具載自內者何若易云山風蠱為女惑男因少男配長女陰陽失常尊卑紊亂不思各正其性艮則安止巽則順從久而敗壞蠱乃生焉治之之法於止而不動者動之柔而不振者振之使之各有向背不失其正庶幾天地泰而陰陽不偏矣然則治法奈何宜苦宜辛盡之矣予嘗治一男子腹大如鼓按之中空精神困倦少氣懶言半載有餘予知為元氣散漫也即以大劑吳萸四逆湯治之一二劑而脹鼓頓失矣又治一男子腹大如鼓按之中實堅如石塊大小累累服破氣行血之藥已經數月予知為陰積於中無陽以化之也即以附子理中湯加桂叩砂半丁香一二劑而腹實頓消二證雖不足以蠱論然而治蠱之法未始不可以二證概也另有蟲蠱一證又不可不知也小兒抽掣俗作驚風按小兒抽掣一條有外感內傷之別因外感而致者由其感受外來之風寒閉其經絡運行之氣現角弓反張壯熱自汗者風傷太陽之衛也桂枝湯可與之角弓反張壯熱無汗而畏寒者寒傷太陽之營也麻黃湯可與之若壯熱燥躁口渴氣粗蒸手二便不利者熱淫於內也白虎調胃承氣可與之稍輕者導赤散加荊防蟲退茯苓亦可與之因內傷而致者或飲食傷中或大吐後或大瀉後或久病後可偶受外邪發散太過或偶停滯消導克伐太過積之既久元氣日微虛極而生抽掣諸書稱慢脾風者是也其人定見面白唇青飲食減少人困無神口冷氣微或溏泄日三五次或下半日微燒微汗抽掣時生此是元氣虛極神無定主支持失權由內而出之候只有扶元一法如附子理中加砂半回陽飲加砂半昧者不知此理一見抽掣便稱驚風若妄以祛風之品施之是速其已也業斯道者逢此等證候務須細心斟酌陰陽實據庶不致屈殺人命予非言大而夸其所目睹而親見者不勝屈指矣病家於此切切不可專求捷方眉批知非氏曰凡視小兒之病雖曰啞科而望聞問切四診皆有憑據青黃赤白黑有神無神形體之肥瘦厚薄容貌之慘舒虛實皆可目睹所謂望也聲音之盛衰氣息之粗細喘與不喘微與不微可以耳聽所謂聞也腹痛則其哭也頭必俯項背痛則其哭也頭必仰小便數不數大便調不調其父母必能稔知可以面訊所謂問也燒熱不燒熱厥冷不厥冷有汗無汗可以手摸兩手之脈可以指取所謂切也有此四診即得病情至於抽掣病在筋膜主傷風木之氣風寒無疑調和營衛足矣再有他故知犯何逆以法救之無不見效欽安指示親切分辨詳細斷不可照市醫看法單視虎口筋紋定是何病便處方藥紫紋衝上三關不必定是危候尤要在小兒抽掣勿認是風便用驚藥功德無量矣況小兒陽氣嫩弱不勝風寒作祟或發表太過或經誤下往往筋惕肉瞤振振動搖不是驚風養陰和陽便不驚風謂小兒火大者是其父母欲自殺其兒可辭去不治尤為切囑須知小兒陽弱火又能從內發小兒無欲火不能從外入此是金針中風按中風一證原有中經中臟閉脫之情陳修園先生三字經從眾錄分辨甚詳可以熟玩予更細為思之夫人身原憑一氣包羅無損無傷外邪何由而得入內邪何由而得出凡得此疾必其人內本先虛一切外邪始能由外入內一切內邪始能由內出外閉塞臟腑經絡氣機皆能令人死不得概謂皆由外致也予常見卒倒昏迷口眼喎斜或半身軟弱或周身抽掣眾人皆作中風治之專主祛風化痰不效予經手專主先天真陽衰損在此下手兼看何部病情獨現用藥即在此攸分要知人之所以奉生而不死者恃此先天一點真氣耳眉批知非氏曰此解已透然內本先虛所謂本實先撥即專主先天施治未必十治十全須知先天之陽不易回也先與病家說明愈是萬幸不愈醫不任咎若是回陽不愈真陰不能自生有人能治愈此病者願焚其書願鏟其批真氣衰於何部內邪外邪即在此處竊發治之但扶其真元內外兩邪皆能絕滅是不治邪而實以治邪未治風而實以祛風握要之法也若專主祛風化痰每每釀成脫絕危候何也正虛而邪始生舍其虛而逐其末況一切祛風化痰之品皆是耗散元氣之物未有不立增其病者然而淺深輕重步步有法貴在圓通予不過以鄙意之管見以與同人共商之耳中痰按中痰一證予思中字不甚恰切夫痰之所以生半由太陽失運水液不行聚而為痰或由中宮火衰轉輸失職水濕生痰或由心陽虧損不能鎮納濁陰水泛於上而痰證生種種不一是痰皆由內而生並非由外而致由外而入內始可以言中由內而出外決不可以言中凡為痰迷之人必素秉陽衰積陰日盛飲食不運氣機不宣忽然外邪引之內氣滯之陰邪竊發寒痰上湧堵塞清道人事昏迷喉中痰響脈必滑利平素多病多痰法宜扶陽為先祛痰為末如姜附湯薑桂茯半湯真武湯之類皆可施之即曰痰閉可也何必曰中眉批中字之義駁得倒痰字之理認得真治痰之法自爾超妙非庸手所得知患疾之人遇之病可愈學醫之人入手不得錯此救世之法醫醫之意也中食按中食一證中字亦不恰切夫食以養生雖由外入內並非食能害人必其人素緣中氣不足運化氣衰陰邪已經發動偶遇飲食入內阻滯不進忽然閉其清道人事卒倒形如死人皆是氣機偶閉為之耳何得謂食之能中乎即如平常氣實之人日日酒食厭飽而胡不中以此推之內本先虛也雖探吐之一吐即愈愈後急溫補脾土自無失矣眉批此數語包一切掃一切元箸超超顛撲不破神麯麥芽檳榔山楂可以掃除而乾薑附子又能治食矣可發一噱脫肛按脫肛一證有下焦陽衰而不能統束者有三焦火旺而逼出者因下焦陽衰而致者由其人或房勞過度或大吐大瀉大病後元氣損傷不能收束其人定見少氣懶言精神萎靡面白唇青喜食辛辣熱物者是也法宜溫固脾腎之陽陽回氣足肛脫自收如附子理中湯加葛根黃耆建中湯與市習之補中益氣湯之類因火旺逼出者或由過食厚味醇酒椒姜辛辣之物熱毒流注下焦或感受外熱燥邪流注腸胃熱邪從下發泄火氣下趨漸漸逼迫直腸遂出其人定見躁煩善飲清涼或大便不利或小便赤熱或善食易飢種種病情者是也法宜清熱如黃連解毒湯三黃石膏湯之類專清腸胃之熱熱清而腸自收矣眉批知非氏曰巽為股為風風性屬陽主升平人不脫肛者風木之氣生升不已今病脫肛生升之氣機失權欽安參悟其理指出溫升之法所謂火旺者火急風生直步廣腸肛頭順勢脫出亦當升陽散火桃花湯可用必見實熱之病情方可直折火熄風平遂其升達之性其肛自舉一二劑即止所謂中病即已安過用以傷生氣否則旋舉旋脫久久遂漏又不可不知也近來市習多用補中益氣倍升麻或用檳麻仁搗泥塗囟門穴亦多見效但於陰陽攸分全無定見終不若握此陰陽法度治之庶可無差第所列藥方亦未盡善不過明其理法之當然學者從中神而明之自然發無不中也痔瘡按痔瘡一證諸書分別牡痔牝痔氣痔血痔酒痔脈痔內痔外痔又俗稱翻花痔雞冠痔蓮花痔蜂窠痔鼠奶痔牛奶痔種種不一予謂形象雖異其源則同不必細分總在陽火陰火判之而已因陽火而致者或平素喜食厚味醇酒椒姜一切辛辣之物熱積腸胃從下發泄肛門乃屬下竅終非時刻大開熱邪下趨發泄不暢蘊積而痔乃生焉其痔定然痛甚肛門紅腫精神不衰飲食如常糞硬溺赤喜飲清涼者是也法宜專清腸胃之熱如大小承氣調胃承氣葛根芩連等湯皆可酌用又或燥邪發泄不暢辨認與上同而時令不同法宜清燥為主如黃連玉竹阿膠湯清燥湯甘桔二冬湯之類因陰火而致者或由房勞過度君火下流前陰發泄不暢直逼後陰蘊積亦能生痔又或火病用心過度憂思過度元氣虛極渙散欲從下脫而不得即脫蘊積亦能生痔其痔多青色黑色白色微痛微腫坐臥不安人必無神困倦喜臥畏寒身重面色唇口青白脈或浮空兩尺或弦勁此是元氣發泄不藏之故不得照尋常通套等方施治法宜收固如附子理中湯加葛根潛陽丹回陽飲封髓丹倍砂草之類近來治論紛紛愈出愈奇理法將泯不得不為之一正眉批知非氏曰治瘡亦貴理法明晰欽安兼習外證的是妙人赤白濁按赤白濁一證諸書所載有云赤屬血白屬氣有云敗精流溢乃謂白濁血不及變乃為赤濁有云入房太甚發為白淫有云脾移熱於腎有云白濁乃勞傷腎腎冷所致種種分辨果從誰說予謂不必拘分握定陰陽治之便了眉批析言居要夫赤濁白濁俱從溺管而出有云敗精流溢既云敗精不過一二次見之未必日日見之況精竅與尿竅不並開即云元陽不固關鎖不牢而敗精有如此之多不幾元陽有立絕之勢乎予亦常見患濁證之人精神不衰者亦多可知其非敗精也明矣予細推此證總緣二氣不調中宮運化機關失職所以然者先天賴後天以生水穀之精氣生血水穀之悍氣生精血入於營精行於衛皆從中宮轉輸轉輸失權或精或血流注闌門闌門乃秘清別濁之所從此滲入膀胱滲入者赤溺便赤滲入者白溺便白非膀胱之自能為赤白也方書多用利水尚未窺透此中消息又有云濕熱流注於下此說實為有理卓見頗超清熱利水大約從此須知中宮不調有寒熱之別寒主胃陽之不足阻滯中宮轉輸即能失職其人定見面白無神飲食短少困倦嗜臥不問赤白但以溫暖中宮俾寒邪去而轉輸復常如香砂六君附子理中之類眉批知非氏曰陽虛不能運動精微一語可補欽安之註腳熱主胃氣之過旺盤踞中宮轉輸亦能失職其人多煩躁好動精神不衰言語脈息一切有神不問赤白便以清胃為主俾熱去而轉輸復常如導赤散加茯苓前仁清胃散涼膈散之類血證門吐血鼻血牙血毛孔血耳血二便血按血證雖云數端究竟不出陰陽盈縮定之矣予於醫理真傳分辨甚詳查近市風一見血出紅光遍地人人皆謂之火醫生亦謂之火細閱其方大半都是六味地黃湯回龍湯生地四物湯加炒芥藕節茜草茅根牛膝大黃之類專主滋陰降火曷不思火有陰陽之別血色雖紅由其從火化得來終屬陰體氣從陽法天居上血從陰法地居下天包乎地氣統乎血氣過旺可以逼血外越則為陽火氣過衰不能統血陰血上僭外溢則為陰火陽火其人起居一切有神陰火動靜起居一切無神陽火始可用以上市習之方陰火決不可用當以醫理真傳之法為是眉批知非氏曰火是陰內經曰陰病治陽當用陽藥夫火何以能陰孔子曰離為火離是陰卦火是紅色血亦是紅色故知火盛吐血正是陰盛必用陽藥而始能愈此儒者之權衡非俗子所能窺測而醫亦是名醫故敢論血要知人周身軀殼全賴一氣一血貫注之而已不必區分血從何出當何治血是某經主某方分解愈多源頭即失予治一切病證與此血證只要無外感病形即握定陰陽盈縮治之見功屢屢獲效多多真不傳之秘法實度世之金針予經驗多年不敢隱秘故罄所知以告將來眉批老實人說老實話知著書之婆心更知評者之婆心有同心焉以為邀譽則非矣發斑按發斑一證有由外入而致者有由內出而致者由外入而致者由外感一切不正之氣伏於陽明陽明主肌肉邪氣遏郁熱毒愈旺忽然發泄輕則疹癢重則斑點或如桃花瓣或如紫雲色大小塊片不等其人口臭氣粗壯熱飲冷脈大而實或周身疼痛二便不利者此為外感陽證發斑是也法宜隨其機而導之如升麻葛根湯舉斑化斑消斑等湯皆可酌用因內傷而致者或飲食傷中克伐過度或房勞損陽過於滋陰或思慮用心過度或偶感外邪過於發散以致元陽外越或現斑點或現通體紫紅其人懶言嗜臥不渴不食精神困倦或現身熱而卻無痛苦情狀行動如常或身不熱而斑片累累色多嬌嫩或含青色者是也粗工不識一見斑點不察此中虛實照三陽法治之為害不淺法宜回陽收納為主如封髓丹潛陽丹回陽飲之類眉批知非氏曰斑發於陽因外感而致其證為陽能治者多惟斑發於陰因內傷而致其證為陰能識者少欽安指出兩法重在人所難識一面學者知其所難作者之心苦矣予曾經驗多人實有不測之妙總之外證發斑在三陽宜升散內證發斑在三陰宜收納此二法乃萬病治法之要眉批知其要者一言而終不知其要者流散無窮不僅此證學者須知痿躄按痿躄一證內經云肺熱葉焦一臟因而受之發為痿躄又云治痿獨取陽明陽明為五臟六腑之海主潤宗筋束骨利關節者也陽明虛則宗筋弛李東垣丹溪遵內經肺熱一語專主潤燥瀉火似為有理但內經稱治痿獨取陽明乃不易之定法此中必有定見當是肺熱葉焦之由起於陽明也陽明為五臟六腑之海生精生血化氣行水之源也內經謂陽明虛則宗筋弛明是中宮轉輸精氣機關失職精氣不輸於肺則肺痿生精氣不輸於脈則心痿生精氣不輸於肉則脾痿生精氣不輸於筋則肝痿生精氣不輸於骨則腎痿生以此分處則治痿獨取陽明一語方成定案即不能專以潤燥瀉火為準眉批知非氏曰是何意態雄且傑高談雄辯驚四方要知人身三百六十骨節無論何節精氣一節不輸則一節即成枯枝黃庭經曰泥丸百節皆有神一節無神則陰邪起而為病此理精粹以此推求方得痿證之由肺熱葉焦之實即此可悟治痿獨取陽明一語實握要之法予思各經為邪火所侵並未見即成痿證即有邪火太甚亦未見即成痿證果系火邪為殃數劑清涼火滅而正氣即復何得一年半載而不愈東垣丹溪見不及此故專主潤燥瀉火是皆未得此中三昧眉批一家之言未窺全豹法宜大辛大甘以守中復陽中宮陽復轉輸如常則痿證可立瘳矣如大劑甘草乾薑湯甘草附子湯參附湯耆附湯歸附湯朮附湯之類皆可酌選虛勞按虛勞一證諸書分別五勞七傷上損下損陳修園先生三字經從眾錄分辨甚詳可以熟玩予思虛勞之人總緣虧損先天坎中一點真陽耳真陽一衰群陰蜂起故現子午潮熱子午二時乃陰陽相交之時陽不得下交於陰則陽氣浮而不藏故潮熱生陰不得上交於陽則陰氣發騰無陽以鎮納則潮熱亦生醫者不得此中至理一見潮熱便稱陰虛用一派滋陰養陰之品每每釀成脫絕危候良可悲也自汗盜汗出凡自汗盜汗皆是陽虛之徵各書具稱盜汗為陰虛者是言其在夜分也夜分乃陽氣潛藏之時然而夜分實陰盛之候陰盛可以逼陽於外陽浮外亡血液隨之故汗出曰盜汗醫者不知其為陽虛不能鎮納陰氣陰氣外越血液亦出陰盛隔陽於外陽不得潛亦汗出此旨甚微學者務須在互根處理會咳吐白痰真陽一衰則陰邪上逆逆則咳嗽作白痰雖非血實亦血也由其火衰而化行失職精氣不得真火鍛鍊而色未赤也近來多稱陳寒入肺實是可笑腹滿不實陰氣閉塞陽微不運故也面黃肌瘦真火衰則脾土無生機土氣發泄欲外亡故面黃土衰則肌肉消以脾主肌肉故也腹時痛時止陽衰則寒隔於中阻其運行之機邪正相拒故時痛時止大便溏泄胃陽不足脾濕太甚故也困倦嗜臥少氣懶言皆氣弱之徵種種病情不可枚舉惟有甘溫固元一法實治虛勞靈丹眉批知非氏曰虛勞之人五神無主四大不收夫五神者五官之神也五官不能自為用其中有主之者仙經曰譬如弄傀儡中有工機軸是也四大者地水火風也毛髮爪指皮膚者地也津液涎沫者水也運轉動作者風也暖氣者火也然此四大全要元神元氣為主宰收攝虛勞之人元神昏散視聽混淆是五神無主宰元氣耗散舉止疲憊是四大不收攝夫人身元陽為本是生真氣真氣聚而得安真氣弱而成病虛勞者真氣耗散元陽失走迨至元陽盡純陰成嗚呼死矣欽安指出大法惟有甘溫固元是薑附草不是參耆術學者不可不知也昧者多作氣血雙補有云大劑滋陰有等專主清潤有等開鬱行滯不一而足是皆殺人轉瞬者也予非言大而矜妄自爭辯實不得不辯也厥證按厥證一條有陽厥陰厥之別陽厥者何由其外邪入內合陽經熱化熱極則陰生陽伏於內陰呈於外故現四肢冰冷或脈如絲或無脈其人雖外見純陰而口氣必蒸手小便必短赤精力不衰法宜清熱下奪為主如大小承氣調胃承氣湯等是也陰厥者何由其正氣已虛陰寒四起陰盛陽微閉塞經絡陽氣不能達於四肢故見四肢冰冷其人目暝倦臥少氣懶言法宜回陽祛陰如四逆湯回陽飲之類此陰陽生死攸關不容不辨眉批知非氏曰陰證發厥內傷已極諸人能認治多不謬惟陽證發厥熱極成寒仲景有厥證用白虎之條人多不辨欽安此論兩兩對言重在熱厥一面學者能認出熱厥評者之心亦慰矣譫語按譫語一證有陰陽之別不可不知陽證之譫語由其外邪伏熱熱乘於心濁火亂其神明神明無所主其人口中妄言必見張目不眠口臭氣粗身輕惡熱精神不衰輕者可用導赤散加黃連重者可用大小承氣湯三黃石膏湯陰證之譫語由其正氣已衰陰邪頓起神為陰氣蔽塞則神識不清其人多閉目妄言四肢無力倦臥畏寒身重汗出即有欲飲冷水一二口者其人無神定當以回陽為準切不可以為飲冷而即以涼藥投之則害人多矣須知積陰在內生有微熱積陰一化熱自消亡此處下手便是高一著法予曾經驗多人不問發熱汗出譫語口渴飲冷但見無神便以大劑回陽飲治之百治百生眉批知非氏曰譫語本是神昏氣沮此論精當治法絕妙後言不問其證決之早也但見無神眼之明也便以大劑手之快也百治百生效之必也學者先要學此手眼女科門按女科與男子稍有不同以其質秉坤柔具資生之德而有經期胎前產後病情與男子不同其餘皆同諸書分辨甚詳實可擇取予於女科一門亦稍有見解因於閒暇又從而直切暢言之以補諸書未言之旨恐見解不當高明諒之眉批知非氏曰女子之病多於男子奈何多多一病耳雖曰五漏成體一兩耳不須治一兩乳不須治一經水則其要也治之奈何在知本知本於太陰無他謬巧矣夫太陰者月也三五而盈三五而缺盈者陰進為陽主長缺者陽退為陰主消陽長陽消以陽為運用長者生之徒升發不泄消者死之徒降下不留月事以時下一月一降為不病之恆降下無所苦又不爽其期謂曰月信苟陽失健運則坤中之陰精不藏如先期而至是月受日魂未足陰中陽微不得謂為有火而用芩連知柏如後期而至是日魂消陰未盡陰中陽虛陽虛陰亦無准不得謂為有寒而用四物桂附淋漓不斷者少則非崩崩者多而不止皆由元陽先德不下以致陰精流溢不守不得僅以熱論色紫成塊色淡不鮮同為陽氣不足將行腹痛行後腹痛均是陽虛氣凝至於處子婦人經閉不通皆由虛損先宜扶陽繼須通利通利之方桃核承氣湯不遺餘力若姑息養奸百日而勞瘵成不可救藥矣非醫之過而何所有帶證處子婦人皆多患此不在經證之例亦非帶脈為病非白淫即寒濕濁惡不堪法宜升散不宜燥熯致爍陰精皆治本之訣也至於內傷外感亦能傷太陰而有以上諸疾又當於六經求治不可專於治本細讀仲景婦人熱入血室諸條觸類而伸之比類而參之有形證有理路何患無治法乎欽安分門別類博學而詳說之妙在窺透陽不化陰之玄理反復論辨只重一陽字握要以圖立法周密壓倒從世諸家何況庸手知非良深佩服而胎前不言證歸於六經矣產後不言法盡於陰陽矣知非亦可無言矣經水先期而至或十七八九日二十四五日者是也按經水先期而來諸書皆稱虛中有熱為太過為氣之盈多以四物湯加芩連阿膠之類治之以為血中有熱熱清而血不妄動經自如常予謂不盡屬熱多有元氣太虛血稍存注力不能載故先期而下其人定見面白無神少氣懶言稍有勞動心惕氣喘脈細而微亦或浮空此等法當溫固元氣為主不得妄以芩連四物治之果系可服芩連四物者人必精神健旺多暴怒抑鬱言語起居動靜一切有神如此分處用藥庶不錯誤經水後期而至或三十七八日四五十日及兩三月者是也按經水後期而至諸書稱為虛中有寒為不及為氣之縮多以桂附之類加入四物湯治之以為血中有寒寒得溫而散血自流通經即如常予謂不盡屬寒其中多有暗泄處不可不知暗泄者何其人或常自汗不止或夜多盜汗或常流鼻血或偶吐血或多泄水或飲食減少如此之人切不可照常通經趕經法施治當審其病而調之如其人當經期將至前四五日常自汗出者是氣機上浮而不下降汗出即血出也察其是衛陽不固者固之如耆附湯建中湯是也察其系內有熱伏熱蒸於外而汗出者宜涼之如益元散生地四物之類治之若是盜汗察其系陰盛隔陽於外陽氣不得潛藏氣機上浮故盜汗出法宜收納如封髓丹潛陽丹之類察其系血分有熱熱蒸於外盜汗亦作法宜清潤如雞子黃連湯之類若是鼻血吐血審是火旺逼血外行自有火形可徵法宜清涼如桃仁地黃犀角湯之類審是陽虛不能鎮納陰氣陰血上僭外越自有陽虛病情可考不得即為倒經而妄用通經涼血止血之方惟有扶陽抑陰溫中固土為準如甘草乾薑湯潛陽建中等湯若是時常泄水飲食減少多由元氣下泄陰血暗耗法宜溫中收固況飲食減少生化機微天真之液不能如常流注學者須知切切不可見其經之後至而即以通套等法施之其中尚有外感寒邪閉束營衛氣機亦能使經期後至可按六經提綱治之更有經期將至偶食生冷或洗冷水亦能使經期後至須當細問明白切不可粗心經來淋漓不斷按經來淋漓不斷一證有元氣太虛統攝失職者有因衝任伏熱迫血妄行者因元氣太弱者或由大吐大瀉傷中或過服宣散克伐或房勞憂思過度種種不一皆能如此其人起居動靜脈息聲音一切無神法宜溫固如附子理中黃耆建中香砂六君之類因衝任伏熱熱動於中血不能藏其人起居動靜脈息聲音一切有神法宜養陰清熱如黃連瀉心湯生地芩連湯之類總要握其陰陽方不誤事經水來多而色紫成塊按經水紫色成塊一證諸書皆稱火化太過熱盛極矣多以涼血湯及生地四物加芩連之類法實可從其病形定是有餘可徵若無有餘足徵而人見昏迷困倦嗜臥少氣懶言神衰已極又當以氣虛血滯陽不化陰陰凝而色故紫故成塊不得妄以清涼施之法宜溫固本元為主如理中湯加香附甘草乾薑湯建中湯之類方不為害總之眾人皆云是火我不敢即云是火全在有神無神處仔細詳情判之自無差矣經水來少而色淡按經水少而色淡一證諸書皆稱血虛統以四物加人參湯主之以為血虛者宜補其血予謂此證明是火化不足陽衰之徵陽氣健則化血赤陽氣微則化血淡陽氣盛則血自多陽氣衰則血自少乃一定之理法當扶陽以生血即一生水的宗旨何得專以四物人參湯一派甘寒之品乎此皆後人不識陰陽盈虛之妙故有如此之說也予見當以黃耆建中湯當歸補血湯加附子或甘草乾薑湯合補血湯如此治法方不誤事經水將行而腹痛按經水將行腹痛一證諸書皆言血中有滯也多用通滯湯及桃仁四物湯予思此二方皆是著重血中有滯也如果屬熱滯此二方固可治之苟因寒邪阻滯以及誤食生冷又當以溫中行滯為主無專以此二方為是如此分處治法庶不至誤事經水行後而腹痛按經水行後腹痛一證諸書皆云虛中有滯也統以八珍湯加香附治之亦頗近理予思經後腹痛必有所因非外寒風冷之侵必因內陽之弱不得概以氣血兩虛有滯為準又當留心審察如系外寒風冷必有惡風畏寒發熱身痛仍宜發散如桂枝湯是也若系內陽不足則寒從內生必有喜揉按熱熨之情法宜溫里如附子理中加丁香砂仁之類予常治經後腹痛其人面白唇淡者以甘草乾薑湯加丁香官桂治之或以補血湯加安桂治之必效婦人經閉不行或四五十日或兩三月者是也按閉經一證關係最重診視探問必須留心如診得六脈遲澀不利者乃閉之徵若診得六脈流利往來搏指妊娠之兆切切不可直口說出先要問明何人看丈夫在家否如丈夫在家稱云敝內他先請問方可言說是喜不是經閉設或言寡居或言丈夫出外數載未歸設或言室女年已過大尚未出閣訪問的確審無痰飲證形痰疾脈亦多滑利雖具喜脈切切不可說出但云經閉如在三兩月內不妨於藥中多加破血耗胎之品使胎不成亦可以曲全兩家祖宗臉面亦是陰德即服藥不效而胎成者是惡積之不可掩而罪大之不可解也倘一朝遇此主家向醫說明又當暗地設法曲為保全不露圭角其功更大設或室女于歸期促不得不從權以墮之不墮則女子之終身無依醜聲揚則兩家之面目何存舍此全彼雖在罪例情有可原自古聖賢無非在人情天理上體會輕重而已予思經閉不行亦各有所因有因經行而偶洗冷水閉者有因將行而偶食生冷閉者有因將行而偶忿氣閉者有因素秉中氣不足生化太微而致者有因偶感風寒閉塞而致者不可不知因洗冷水而閉者蓋以經血之流動全在得溫以行得寒而凝理勢然也今得冷水以侵之氣機忽然閉塞血液不流法當溫經如麻黃附子細辛湯陽旦湯或補血湯加丁香肉桂之類因食生冷而閉者誠以天真之液如霧露之氣全賴中宮運轉血自流通今為生冷停積中宮閉其運轉之機血液故不得下降法當溫中如理中湯加砂仁丁香肉桂或甘草乾薑湯加丁香胡椒之類因忿氣而閉者蓋以忿爭則氣多抑鬱抑鬱則氣滯而不舒氣不舒則血不流故閉法宜理氣舒肝為主如小柴胡湯加香附川芎麥芽之類因素秉不足生化太微而致者蓋以不足之人多病多痰多不食或多泄瀉或多汗出元氣泄多蓄少不能如常應期而下要知血注多則下行之勢易血注少則下行之勢難務宜看其何處病情為重相其機而治之或宜甘溫或宜辛溫或宜苦溫又當留意因外感風寒而閉者按六經提綱治之自然中肯切不可一見經閉即急於通經專以四物加桃仁紅花玄胡香附蘇木丑牛之類胡亂瞎撞為害非淺學者宜知更有寡婦室女經閉要不出此不過多一思交不遂抑鬱一層終不外開鬱行滯而已崩按崩證一條有陽虛者有陰虛者陽虛者何或素秉不足飲食不健或經血不調過服清涼或偶感風寒過於宣散或縱慾無度元氣剝削如此之人定見起居動靜言語脈息面色一切無神元氣太虛不能統攝陰血暴下故成血崩實乃脫絕之徵非大甘大溫不可挽救如大劑回陽飲甘草乾薑湯之類切切不可妄以涼血止血之品施之因陰虛者何夫陰之虛由於火之旺或忿怒而肝火頻生或焦思而心火頓起或過飲醇醪而胃火日熾如此之人精神飲食動靜起居一切有餘緣以火邪助之也火動於中血海沸騰傷於陽絡則妄行於上傷於陰絡則妄行於下卒然暴注若決江河急宜涼血清熱以止之如十灰散涼血湯之類切切不可妄用辛溫要知此刻邪火動極俟火一去即宜甘溫甘涼以守之復之又不可固執須知道血下既多元氣即損轉瞬亦即是寒不可不細心體會帶按帶證一條諸書言帶脈傷發為帶疾寶產云帶下有三十六疾匯參有赤白帶室女帶下胎前帶下之別女科仙方又分為五帶是就五色而立五方亦頗近理予常用其方多獲效驗予思萬病不出乎陰陽各家紛紛議論究竟旨歸無據後人不得不直記其方也予細思陽證十居五六即濕熱下注是也陰證十居六七即下元無火是也濕熱注者何或素喜辛燥醇酒椒姜或素多忿怒暴戾或素多淫欲搖動相火合水穀之濕與脾之濕流入下焦時時下降陸續不斷其形似帶故名之曰帶其人定多煩躁精神飲食不衰脈必有神其下之物多膠黏極臭者是也法宜除濕清熱為主如葛根芩連湯黃連瀉心湯加茯苓澤瀉滑石之類所謂下元無火者何或素稟不足而勞心太甚則損心陽或傷於食而消導太過則損胃脾之陽或房事過度而敗精下流則損腎陽如此之人定見頭眩心惕飲食減少四肢無力脈必兩寸旺而兩尺弱甚浮於上而不潛於下其下之物必清淡而冷不臭不黏法宜大補元陽收納腎氣如潛陽丹加故紙益智回陽飲加茯苓安桂或桂苓朮甘湯加附片砂仁之類更有五色雜下不必多求妙方總以大溫大甘收固元氣為要諸書所載亦可擇取求嗣約言大凡中年無子之人宜多積善功夫婦好生保養節欲果然精神安舒百脈和暢務於天癸至三日內乘其子宮未閉易於中鵠當交媾之際夫婦二人彼此留神勿將心放他去如此施之百發百中切勿多蓄媵妾以取敗德喪身滅亡之禍眉批知非氏曰人之生也性賦於天命懸於地各有善惡因緣以成報施知非存而不論妊娠凡婦人經水不行二三月內腹中隱隱眉批知非氏曰穩微微頻動者乃有喜之徵設或無頻動者可用驗胎法以驗之驗胎方歸芎各三錢為末艾湯吞吞後腹頻動有胎定無疑若是腹不動脈息細詳求亦有四五月始動者妊娠產後諸疾約言按妊娠已確固說著重安胎眉批知非氏曰要產後已畢固說著重補養此皆舉世相傳至要之語予謂胎前產後不必執此當以認證去病為主認證去病之要外感仍按定六經提綱病情內傷仍握定陰陽盈縮為準如此方不見病治病了至於胎前產後一切病證亦當留心如萬氏女科女科仙方女科心法匯參女科濟陰綱目皆當熟玩以廣見識小兒諸疾約言按小兒初生只要安靜審無胎中受寒無胎中受熱切不可用藥以戕之以伐生生之氣今人每每小兒下地多用銀花黃連大黃鉤藤甘草取其清胎毒小兒少生瘡癬此說似近有理究竟皆是婆婆經此說省城最重不知山野鄉村小兒下地大人常無藥服何況小兒難道皆生瘡皆死亡了但食乳之子外感病多飲食病少設或有虛損病出多半從母乳上來審其陰陽之盈縮治之食五穀之子多半飲食或是外感按定病情治之眉批知非氏曰好抽掣條中業已詳論故不復贅至於痘證初發熱以調和營衛之氣為主桂枝湯是也初現點以升解發透出透為主升麻葛根湯是也痘現齊以養漿為主理中湯是也漿足瘡熟以收回為主潛陽丹封髓丹是也此乃痘科首尾不易之法至於壞證如灰黑平塌不起空殼無膿者真元之氣衰也法宜回陽白通湯回陽飲是也如紫紅頂焦煩躁口臭氣之有餘血之不足也法宜清涼如導赤散涼血散人參白虎當歸補血湯之類近來痘科一見痘點專以解毒升散清涼如赤芍生地連翹枳殼銀花大力黃芩當歸麥冬花粉荊芥之類不知痘證全在隨機變換當其初發熱氣機勃勃向外正宜應機而助之以發透為妙如以上藥品雖有升散其中一派苦寒之品每多阻滯向外氣機以致痘不透發釀出許多證候非痘之即能死人實藥殺之也予每於痘出現點只用二三味輕清之品多見奇功如升麻一二錢葛根一二錢蟲退五六個甘草一錢即吐亦當服之所謂吐者何毒邪已壅於陽明吐則毒邪發泄於外故以輕清之品助其升騰之機使其出透若加苦寒阻之危亡之道也司命者當留意於此方不誤人外科約言外科者瘡科謂也凡瘡之生無論發於何部統以陰陽兩字判之為準眉批知非氏曰妙陰證其瘡皮色如常漫腫微疼瘡潰多半清水清膿黃水血水豆汁水辛臭水其人言語聲音脈息起居動靜一切無神口必不渴即渴定喜滾飲舌必青滑大小便必自利此皆由正本先虛陽衰已極不能化其陰滯故凝而成瘡陰盛陽微不能化陰血以成膿故見以上病形法宜辛甘化陽為主化陽者化陰氣為陽氣也陰氣化去其正自復膿自稠黏瘡自收斂而病即愈初起無論現在何部或以桂枝湯加香附麥芽附子調和營衛之氣佐香附麥芽者取其行滯而消凝也加附子者取其溫經而散寒也或麻黃附子細辛湯陽旦湯皆可瘡潰而膿不稠可用黃耆建中湯附子理中湯陰最盛者可用回陽飲白通湯或黃耆甜酒燉七孔豬蹄羊肉生薑湯之類皆可酌用陽證其瘡紅腫痛甚寒熱往來人多煩躁喜清涼而惡熱大便多堅實小便多短赤飲食精神如常脈息有力聲音響亮瘡潰多稠膿此等瘡最易治皆由邪火伏於其中火旺則血傷法宜苦甘化陰為主化陰者化陽氣為陰氣也陽氣化去正氣自復瘡自收斂而病自愈初起無論發於何部或以桂枝湯倍白芍加香附麥芽梔子治之或麻杏石甘湯或人參敗毒散加連翹花粉之類瘡潰可用當歸補血湯加銀花生地白芍之類或補中益氣湯加生地銀花之類皆可用也總之陰陽理明法自我立藥自我施不無妙處也更有一等真陽暴脫之證其來驟然無論發於何部其瘡痛如刀劈忽然紅腫其色雖紅多含青色人必困倦無神脈必浮大中空或大如繩或勁如石其唇口舌必青黑務在脈息聲音顏色四處搜求使能識此等證候切勿專在瘡上講究凡此等證每多旦發夕死惟急於回陽收納庶可十中救二三若視為尋常之瘡治之則速其死矣不可不慎歟知非氏曰欽安先生性敏而巧學博而優運一縷靈思妙緒貫諸名家之精義不啻若自其口出認證只分陰陽活人直在反掌高而不高使人有門可入可謂循循善誘矣知非之評乃一意孤行空諸倚傍恐詞義多未精核議論太涉放縱然紫不能奪朱鄭不能亂雅閱者諒之
