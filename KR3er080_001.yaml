body:
  text: 卷一用藥弊端説用藥一道關係生死原不可以執方亦不可以執藥貴在認證之有實據耳實據者何陰陽虛實而已陰陽二字萬變萬化在上有在上之陰陽實據在中有在中之陰陽實據在下有在下之陰陽實據無奈仲景而後自唐宋元明以逮本朝識此者固有不識此者最多眉批醫不執方藥在平日求至理而探玄奧一得上中下陰陽實據用藥即不誤人病家知此理法延醫入門以此審其高下決其從違萬病回春立説之功不淺此先醫醫而後醫病家具見良工心苦其在不識者徒記幾個湯頭幾味藥品不求至理不探玄奧自謂知醫一遇危症大海茫茫陰陽莫曉虛實莫辨吉凶莫分一味見頭治頭見腳治腳幸而獲效自誇高手若不獲效延綿歲月平日見識用盡方法使完則又籍口曰病入膏肓藥所難療殊不知其藝之有未精也更有一等病家略看過幾本醫書記得幾個湯歌藥性家人稍有疾病又不敢自己主張請醫入門開方去後又或自逞才能謂某味不宜某味太散某味太涼某味太熱某味或不知性忙將本草備要翻閲看此藥能治此病否如治與病合則不言不與病合則極言不是從中添減分兩偶然獲效自矜其功設或增病咎歸醫士此等不求至理自作聰明每每釀成脫絶危候雖盧緩當前亦莫能治良可悲也更有一等富貴之家過於把細些小一病藥才入口稍有變動添病減病不自知也又忙換一醫甚至月延六七位每每誤事眉批學養兼到之醫方能識此火候太非易易不知藥與病有相攻者病與藥有相拒者豈即謂藥不對證乎何不多延數時以盡藥力之長哉豫觀古人稱用藥如用兵有君臣有佐使有嚮導有緩攻有急攻有偷關有上取有下承有旁取有寒因寒用熱因熱用塞因塞用通因通用諸法豈非知得藥與病有相拒相鬥者乎豫願富貴之家不可性急要知病系外感服一三道發散藥有立見松減些者氣滯食滯腹痛卒閉之症服行氣消導開竅之品有片刻見效者若系內傷虛損日久誤服宣散清涼破氣滋陰等藥釀成咳嗽白痰子午潮熱盜汗骨蒸腹脹面腫氣喘等症又非三五劑可見大功所以古人治病有七日來復之説或三十劑五十劑甚至七八十劑始收全功者矣最可怪者近之病家好貴惡賤以高麗參枸杞龜鹿虎膠阿膠久制地黃鹿茸等品奉為至寶以桂麻薑附細辛大黃芒硝石膏等味畏若砒毒由其不知陰陽虛實至理病之當服與不當服耳眉批捫蝨而談其言侃侃有若無人之慨病之當服附子大黃砒霜皆是至寶病之不當服參耆鹿茸枸杞都是砒霜無奈今人之不講理何故諺云參耆歸地治死人無過桂附大黃治好人無功溯本窮源實由於不讀仲景書徒記幾個幸中方子略記得些各品藥性懸壺於市外著幾件好衣服轎馬往來目空一世並不虛心求理自謂金針在握仔細追究書且點不過兩篇字且畫不清幾個試問尚能知得陰陽之至理乎東家被他桂附治死西家被他硝黃送命相沿日久釀成此風眉批淋漓盡致所以病家甘死於參耆歸地之流怕亡於薑附硝黃之輩此皆醫門不幸亦當世之通弊也豫願業斯道者務將內經難經仲景傷寒金匱孫真人的千金翼諸書與唐宋金元朱張劉李並各後賢醫書彼此較量孰是孰非更將豫所著醫理真傳並此醫法圓通留心討究陰陽務求實據不可一味見頭治頭見咳治咳總要探求陰陽盈縮機關與夫用藥之從陰從陽變化法竅眉批醫學骨髓盡此一語學者潛心而能明白瞭然經方時方俱無拘執久之法活圓通理精藝熟頭頭是道隨拈二三味皆是妙法奇方觀陳修園先生三字經列病數十條俱言先以時方治之不效再求之金匱明是知道近日醫生之胸中也然時方如四君六君四物八珍十全歸脾補中六味九味陰八陽八左歸右歸參蘇五積平胃柴苓逍遙敗毒等方從中隨證加減亦多獲效大抵利於輕淺之疾而病之深重者萬難獲效修園所以刻三字經與從衆録之意不遽揭其非待其先將此等方法用盡束手無策而後明示曰再求金匱是教人由淺而深探求至理之意也竊以金匱文理幽深詞句奧古閲之未必即解其至理誠不若將各證外感內傷陰陽實據與市習用藥認證雜亂處搜出以便參究豫豈好辨哉豫實推誠相與願與後世醫生同入仲景之門共用仲景之法眉批一片婆心普濟生靈同登壽域是所切望也各症辨認陰陽用藥法眼心病不安俗云心跳心慌按心病不安一證有心血不足為病者有心氣不足為病者心血不足為病者血不足則火必旺其人多煩小便短赤而咽中干肌膚枯稿憔悴而神不大衰甚則狂妄喜笑脈必細數或洪大喜食甘涼清淡油潤之品者是也心氣不足為病者氣陽也氣衰則血必旺其人少神喜臥懶言小便清長或多言多勞力多用心一刻心中便潮熱而自汗出言者心之聲也汗者血之液也多言勞力及用心太過則心氣耗氣耗則不能統血故自汗者眉批心氣即心陽所謂神也神傷則精散精散則不能統血氣液脫而為潮熱自汗此是陽不能統陰陰無所制陰證蜂起正本澄源立法親切於治此病乎何有甚至發嘔欲吐心陽一衰陰氣上僭故發嘔脈必細微抑或浮空喜食辛辣煎炒極熱之品者是也目下市習不辨陰陽聽説心不安寧一味重在心血不足一邊故治之有效有不效其所用藥品無非人參酸棗茯神遠志琥珀龍骨硃砂地黃當歸元肉之類與夫天王補心定志寧神諸方然此等方藥全在養血果繫心血不足甚宜若繫心陽衰敗則不當此屬當世混淆莫察之弊不忍坐視不言姑酌一治心陽虛方以補市習之漏補坎益離丹附子八錢桂心八錢蛤粉五錢炙甘草四錢生薑五片用藥意解夫曰補坎益離者補先天之火以壯君火也真火與君火本同一氣真火旺則君火始能旺真火衰則君火亦即衰真火藏於水中二氣渾為一團故曰一元眉批造化機緘陰陽根柢露於腕下作一幅活太極圖觀之便得醫之真實際也真火上騰真火天體也其性發用故在上必載真水上升又交於心故曰離中含陰又曰氣行血隨水既上升又必復降下水地體也隨氣而上至離宮則水氣旺極極則復降下也水下降君火即與之下降故曰陰中含陽又曰血行氣附主宰神明即寓於渾然一氣之中晝則出而聽政以從陽陽在上也曰離夜則入而休息以從陰陰在下也曰坎此人身立命指歸醫家宜亟講也今病人不安寧既服養血之品而不愈者明是心陽不足也心陽不足固宜真補其心陽而又曰補坎者蓋以火之根在下也豫意心血不足與心陽不足皆宜專在下求之何也水火互為其根其實皆在坎也真火旺則君火自旺心陽不足自可愈真氣升則真水亦升心血不足亦能療其所以服參棗等味而不愈者是未知得火衰而水不上升也方用附桂之大辛大熱為君以補坎中之真陽細查坎陽乃先天乾金真氣所化故曰金生水後人見不及此一味補土生金補金生水著重在後天脾肺不知坎無真氣上騰五臟六腑皆是死物前賢叫人補脾者先天賴後天以輔也先天為體後天為用故經云無先天而後天不立無後天而先天亦不生教人補金是教人補先天真金所化之真氣也道家稱取坎填離即是盜取坎中一點金氣也豫恆曰人活一口氣即此考桂附大辛大熱辛即金之味熱即純陽之性也仲景深通造化知桂附力能回陽故立白通四逆回陽諸方起死回生其功迅速實非淺見可測眉批乾分一氣落於坤中而成坎乾即金也坎即水也坤中得陽即是火火曰炎上故能啓水上升而交於心心屬火為離離中得水水曰潤下又能燮火而下降全是一金為之斡旋桂附辛歸金而熱歸火大能升水降火交接心腎先生獨得仲景之祕不惜金針暗度知非再表而彰之俾醫門悉知仲景之微理大膽用附桂以起死回生病家放心服桂附以療生而救死孰謂病風不可挽復取蛤粉之咸以補腎腎得補而陽有所依自然合一矣附桂補坎中之陽陽氣也蛤粉補坎中之陰陰血也氣行血隨血行氣附陰陽合一升降不乖何心病之不能治乎此方功用最多凡一切陽虛諸症皆能奏功不獨此耳況又加薑草調中最能交通上下故曰中也者調和上下之樞機也此方藥品雖少而三氣同調學者務在藥之性味與人身之氣機何品從陽何品從陰從陰從陽皆歸不一有從元陰元陽者坎離之説也有從太陽太陰少陽少陰陽明劂陰者六步之謂也其中之淺淺深深藥性各有專主須要明白如何為順如何為逆順者是順其氣機之流行逆者逆其氣機之欲往把這病之陰陽實據與夫藥性之陰陽實據握之在手隨拈一二味皆能獲效匪彝所思子閲之久矣眉批從陰從陽順往逆來是用藥調氣機之手眼亦醫門講理法治病之權衡夫人自出母腹元陰元陽變為坎離其根落在坤中由是氣傳子母應天度而化生六經上下往來表裡雌雄相輸應二六不停水火者氣液也隨呼吸而有升降布五行而有部分醫能明此號曰上工欽安酌此一方名曰補坎益離丹以治心陽虛證深得太陽與少陰為表裡之機關窺見岐黃根柢從桂枝湯變化而出直透仲景之心法且不憚煩勞於辨證用藥中剖明陰陽大旨學者入理深談已有把握知非更拈出仲景治少陰太陰兩大法門真武何以用附子而不用幹薑理中何以用乾薑而不用附子其四逆附子乾薑並用何以又獨稱為救里而治無專經此間陰陽奧妙進退出入包含氣機不少如何用藥認證以合氣機此皆六步之中亦有從陰從陽之淺深藥性亦各有專主均可變化推衍增減隨宜知非不能明辨願以俟學者之深參而有得焉奈世人沉溺莫挽深為可慨茲特再即此方之理推之與仲景之白通湯同法也桂枝龍骨牡蠣湯同法也大小建中湯同法也即與後賢之參附湯卦髓丹陽八味皆同法也古人立方皆是握定上中下三部之陰陽而知藥性之淺深功用故隨手輒效得以名方今人只徒口誦心記而不識至理攸關無怪乎為方藥所囿矣更可鄙者甘草僅用數分全不知古人立法立方其方皆有升降皆用甘草誠以陰陽之妙交會中宮調燮之機專推國老何今之不察而此風之莫轉也肺病咳嗽按咳嗽一證有從外而入者有從內而出者從外而入者風寒暑濕燥火之邪干之也六客各有節令不同須知客邪自外而入眉批客邪者每年六步客氣之邪也閉其太陽外出之氣機氣機不暢逆於胸膈胸中乃肺地面氣欲出而不出咳嗽斯作矣定有發熱頭疼身痛一段風邪乾者兼自汗惡風寒邪乾者兼無汗惡寒暑邪乾者兼口渴飲冷人困無力濕邪乾者兼四肢沉重周身覺冷而痠疼不甚發熱燥邪乾者兼吐痰膠黏喜飲清涼火邪乾者心煩脈洪小便短赤飲冷從內而出者皆是陽虛陰盛之候陰虛也有十中僅見一二因陽虛者定見困倦懶言四肢無力人與脈息無神唇舌青淡白色而喜熱飲食少心煩身無發熱痛苦即有燒熱多在午後非若外感之終日發熱無已時也因心肺之陽不宣不能化其本經之陰邪逆於胸而作者其人無外感可徵凡事不能用心勞力稍用心力一分心便潮熱自汗出咳嗽更甚多吐白泡清痰近市醫家每稱為陳寒入肺其實不知心肺陽衰而內寒自生也眉批辨證的小注辨理確小注補法清因脾胃之陽不足不能轉輸津液水穀而作者其人飲食減少腹滿時痛多吐清冷痰涎喜食辛辣椒薑熱物因肝膽之陽不足不能收束其水挾龍雷指陰氣也兩水泛於上直干清道而作者其人腰脅脹痛足膝時冷兩顴時赤夜間痰水更甚咽乾不渴若渴飲冷便是陰虛火旺凡此內外兩法不得紊亂審是從外而入之風邪乾者去其風而咳嗽自已如桂枝湯祛風散是也寒邪乾者散其寒而咳嗽自已如麻黃湯小青龍湯是也暑邪乾者清其暑而咳嗽自已如益元散清暑湯是也濕邪乾者滲其濕而咳嗽自已如二陳湯桂苓朮甘湯是也燥邪乾者潤其燥而咳嗽自已如甘桔湯麥冬飲之類是也火邪乾者散其火清其火而咳嗽自已如導赤散葛根芩連湯之類是也審是從內之心肺陽衰者扶其陽而咳嗽自止如薑桂茯半湯溫肺飲之類是也審是脾胃陽衰者舒其脾胃而咳嗽自止如半夏生薑湯香砂六君湯甘草乾薑湯之類是也審是肝腎陽衰水邪泛上者溫其腎而咳嗽自已如真武湯滋腎丸潛陽丹加吳萸之類是也果見陰虛而致者其人水少火多飲食易消精神言語聲音必壯必性多躁暴肌膚多幹粗吐痰膠黏喜清涼脈必細數惡辛辣熱物方是的候如雞子黃連湯六味地黃之類皆可服也尚有一等久病無神皮肉如火灸而無潤澤喜熱惡冷此尤屬真氣衰極不能薰騰津液而灌溉肌膚十有九死更有一等陽虛陰盛已極元陽將脫之咳嗽氣喘痰鳴六脈浮空或徑如石唇青爪甲黑周身大熱自汗乃脫絶危候急宜大劑回陽飲治之十中可救二三余曾經驗多人但逢此候務先在藥單上擬明以免庸俗借薑附為口舌余又得一奇法眉批非法之奇乃人之愚者多也故又借一奇字以醒人眼目一人病患咳嗽發嘔欲吐頭眩腹脹小便不利余意膀胱氣機不降而返上以五苓散倍桂一劑便通而諸證立失由是觀之醫貴明理不可固執真不謬矣查目下市習於咳嗽一證每每見痰化痰見咳止咳所用藥品無非杏仁貝母冬花紫菀百合桑皮化紅蘇子白芥南星薄荷半夏與夫參蘇飲蘇沉九寶滋陰六味一味雜投以為止咳化痰每每釀成勞證此豈藥之咎哉由其不知內外各有攸分陰陽各有實據藥性各有專主何其相沿不察貽害無窮也豫故辨而正之肺痿肺癰痿症咳吐濁沫或膿血口臭不渴小便利癰症咳吐膿血胸中隱隱作痛將成時坐臥不安按癰痿二證名異而源同同者同在肺也痿虛由肺陽不足而津液失運而癰實由肺陰不足而燥邪日生蘊釀日久痿宜溫肺金匱之甘草乾薑湯是也薑性辛溫能宣肺中之寒甘草能緩薑性之散又能溫中補中又足生氣故見功實速余曾經驗多人癰宜開壅金匱之皂莢丸是也皂莢功專開壅去垢又得蜜棗以安中邪去而正氣無傷妙法也眉批辛甘化陽甘鹹養陰學者功力深到便識得此義玄妙醫中之能事畢矣豫細維金匱治痿證首列甘草乾薑湯明是辛甘化陽之法必是肺冷無疑再以痿字義考之委者謝也眉批委謝癰壅晰義精確一虛一實判若列眉如花木之葉萎敗而無潤澤其源定屬坎中真氣不上薰蒸若坎中既有真氣上騰肺何由而得萎也而治癰以皂莢丸皂莢辛鹹棗蜜味甘明是甘鹹養陰之法必是肺熱無疑更以癰字義考之癰者壅也壅則聚而不通熱伏不潰之象其源定屬水衰火旺然癰之將成未成其中尚有許多治法果系胸中隱痛脈數滑口中辟辟燥唾膿血坐臥難安此際乃癰的候否則照常治嗽法投之豫意當以肺陽不足而痿證生肺陰不足而癰證起以定此二案眉批陰陽案定人有遵循後學始有把握庶不致錯亂無據也胃病不食按不食一症有因外邪伏而不宣逆於胃口者有因飲食生冷停滯胃口者有因七情過度損傷胃氣者有因陽虛者有因陰虛者因外邪所致而不食者定有發熱頭痛身痛與夫惡寒惡風惡熱口苦便赤四肢痠痛等情按定六氣節令六經提綱病情治之外邪去而食自進矣因飲食生冷而致不食者定見飽悶吞酸胸膈脹痛等情照溫中行氣消導之法治之生冷去而食自進矣因七情過度而致不食者審其所感或憂思或悲哀或恐懼或用心勞力或抑鬱或房勞按其所感所傷而調之則飲食自進矣因陽虛者陽衰則陰盛陽虛二字包括七情在內論陽虛是總其名也陰主閉藏故不食此等病人必無外感飲食病情為準法宜扶陽扶陽二字須按定上中下部位陽旺陰消而食自進矣因陰虛者陰虛則火旺陰虛二字有外感客邪隨陽經而化為邪熱傷血按其所感經絡治之若系真陰虛極則又非苦寒可用火伏於中其人煩熱口渴飲冷甚有厄逆不休咳嗽不已反胃而食不下諸症輕則人參白虎重則大小承氣之類是瀉其亢盛之火邪以復陰血若由真陽虛極不能化生真陰陰液已枯其人定然少神氣短肌膚全無潤澤若火炙然亦常思泊潤涼物病至此際十少一生苟欲挽回只宜大甘大溫以復陽陽回則津液自生即苦甘化陰甘淡養陰皆其次也昧者不知此中消息妄以苦寒大涼治之鮮不速斃果能投治無差則陰長陽生而食自進矣眉批飲食為人之大源其所以能飲食之故尤重在精氣不食一證所因最為繁多無論內外各病皆能致之此按扼定病機病情指出治法大具手眼至活至妙學者苟知精氣為飲食之本從精氣上消息不食之故便合欽安之法而得不食之源於治胃病乎何難以上內外諸法俱備學者務要下細理會不可因其不食而即以消食行氣破滯之品雜亂投之病人莫不陰受其害查近日市習一見不食便以平胃散加丑牛檳榔山楂麥芽香附三稜莪朮之類投之內外莫分陰陽莫辨誠可慨也今特略陳大意至於變化圓通存乎其人眉批八字要緊又安可執一説而謂盡括無遺脾病嘔吐泄瀉按嘔吐泄瀉一證有隻嘔吐而不泄瀉者有隻泄瀉而不嘔吐者有嘔吐泄瀉並行者嘔吐而不泄瀉者邪乘於上也上指胃泄瀉而不嘔吐者邪乘於下也下指脾嘔吐與泄瀉並行者邪隔於中上下俱病也中指脾胃交會處也論外因則有風寒暑濕燥火與夫痘麻癍疹發泄之異論內因則有飲食停滯陽虛陰虛之別豫推究太陰一經在三陽之底面外邪初入必不能致嘔吐泄瀉即有吐瀉定是失於表散邪壅於陽明則有乾嘔之條邪伏於少陽則有喜嘔之例不得即直入於內而至吐瀉也其所以致吐瀉者由其表邪未解妄行攻下引邪入內邪陷於中方能致此治法仍宜升舉其所陷之邪如桂枝湯加葛根之法是也亦有外邪未解傳經而至太陰者邪至此地不問何邪傳至但以本經為主即在本經之標本中三氣上求之濕為太陰之本氣濕為陰邪一切外邪至此即從本氣而化為病者俱多亦有不從本氣而從中化為病者亦多中指胃胃與脾為表裡也亦有不從本中所化而從標化為病標即太陰經也太陰為陰經邪從經為病亦陰也蓋從本化者為濕邪泄瀉居多從中化者為熱邪皮黃便赤嘔吐者衆從標化者為陰邪腹痛不食屢生如此而求便得邪之所從所化也故前賢云吐瀉病求太陰是叫人在太陰經之標本中三氣上求之也治之之法濕熱陰三字定之矣從陰濕者其人吐瀉甚而肢冷唇青仲景之理中吳茱萸湯之類是也從熱化者其人即吐瀉而思水飲如仲景之五苓四苓或黃連吳萸湯之類是也更有吐瀉甚而兼腹痛劇者前賢稱為霍亂稱為發痧學者不必多求即在本經之標本中三法求之亦間有卒閉而即四肢冷者腹痛吐瀉甚者由其內本先虛外邪卒入閉其清道邪正相攻腹痛吐瀉並作法宜宣之散之開之刺之刮之等例亦不可不知至於飲食停滯而致吐瀉者蓋以飲食傷中也其人多飽悶吞酸噯臭治以溫中消食便了眉批此證欽安合三證而並論吐本從陽瀉本從陰一時吐瀉並作中宮失運此三證也吐從陽宜溫降瀉從陰宜溫升吐瀉並作必兼頭痛發熱身疼熱多欲飲水者五苓散主之寒多不飲水者理中丸主之其證小便不利者多若小便復利而大汗出脈微者四逆湯主之此外如內因外因陽虛陰虛欽安論法大備學者留心參究臨證自有把握知非氏曰定吐瀉為脾病大有妙義再細論其理脾與胃為夫妻同處中州一臟一腑合為一家一陰一陽共同轉運之權日奉君火之令而行自能燮理陰陽分清別濁何得災害並至今令腸中溏瀉以干易濕明明脾不行水水不歸經併入腸中水主潤下焉能久停故大瀉作又令人吐亦明明是水不運行脾陰把持君火之令火性炎上令不行之水胃出食管故大吐作皆由妻失運化至令其夫不能正位又安望其輸精皮毛潤溉骨髓柔及筋膜將子女臣妾悉受俱害加以日久浸淫變證蜂起若擾及君主恐更有禍生不測者噫可畏也昔賢云吐瀉者求太陰允推卓見但其中至理不為發明學者焉能了了直搗中堅抑或旁取逆取以出奇而制勝欽安無奈何又不能直吐心肺只得多方指陳旁引曲證廣立法門亦猶王良之詭遇以期嬖奚幸而獲禽其心實良苦矣知非從旁不忿直抒胸腹為欽安暢言之試問吐瀉之證本屬脾胃孰敢定為脾病乎此有功醫林之按學者不宜輕視至於痘麻毒初出時吐者居多泄瀉者少誠以痘出於臟從太陽而發泄於外外者皮膚肌肉之屬也肌肉屬陽明毒邪將出未出之候從太陽鼓舞盡壅於陽明故嘔吐者多要吐則毒氣方能發泄得透醫者當迎其機而導之考古方首用桂枝湯初發熱時也次用升麻葛根湯初現點時也皆是順其氣機以發透為妙也麻出於腑感天行者多當將出未出之際治法初與痘同但痘出透時以養漿結疤收回陽氣為重麻證出透時以清解毒盡為先至於癍疹之邪由外感不正之時氣伏於肌肉之間不能深入當經氣旺時邪不能久藏隨氣機而發泄於外若用苦寒遏郁其外泄之氣機其害最速亦多發吐學者於此數證先告以服藥後吐亦無妨切不可妄行溫中降逆止嘔之法務要果真胃寒發吐方可溫中更有陽虛之人儼若平常好人卻不能勞心用力多言但勞神一刻即有發嘔發吐者稍食豬肉即大瀉者法只宜溫中或補命門相火亦有陰虛之人血液枯極賁門不展有乾嘔吐而食不得下者更有朝食暮吐食而即吐種種情形治法不必細分總之嘔吐與反胃咳嗽厄逆吐血諸證皆是一個逆字拿定陰陽實據治之發無不中要知各經受寒閉塞皆能致逆逆則嘔吐泄瀉必作各經受熱傳變皆能致逆逆則嘔吐泄瀉亦作不可不知近閲市習一見嘔吐泄瀉多用藿香正氣散胃苓湯柴苓四神肉蔻散等方治非不善總不若辨明陰陽之為當也肝病筋攣按筋攣一證有因霍亂吐瀉而致者有因誤汗而致者有因陽虛失血而致者有陰虛者因霍亂吐瀉而致者由其吐瀉太甚傷及中宮中宮之陰陽兩亡轉輸失職不能運津液而交通上下筋骨失養故筋攣作法宜安中如仲景之吳茱萸湯理中湯皆可與也因誤汗而致者由其發汗太過血液驟傷火動於中筋脈失養故筋攣法宜扶陰如仲景之芍藥甘草湯是也因陽虛失血而致者由陽氣衰弱不能統血血亡於外氣衰於內薰蒸失宜枯稿漸臻筋脈失養故筋攣法宜大辛大甘以扶陽如仲景之附子甘草湯甘草乾薑湯皆可服也陰虛而致者由外邪入內合陽經氣化成為火邪火甚血傷筋脈失養故筋攣世云火症便是陰虛的大眼目無論何經何臟何腑有火俱要養陰但非真陰虛也若真陰虛者其人元氣虛極不能化生陰液多系久病方能致此十中罕有一生豫故曰真陰虛者少法宜養陰清火如仲景之雞子黃連湯與後賢之六味地黃湯生地四物湯皆可與也亦有忿怒抑鬱生熱熱盛傷血亦致筋攣須按病情治之必效切勿惑於市習通套之用如木瓜秦艽伸筋草舒筋靈仙松節地黃烏藥羌活一派不按陰陽病情往往誤事不可不知也眉批經曰臟真散於肝筋膜之氣也識得真元氣散於筋膜者為肝氣則知凡人病筋攣者皆失真元所養而致欽安指出四因逐層闡發陰陽之理指點驅用仲景之方皆調燮真元之法無有不效可謂神乎技矣學者細心體會洞徹源流治筋攣自有把握腎病腰痛按腰痛一證有陽虛者有陰虛者有外邪閉束者有濕氣閉滯者因陽虛而致者或由其用心過度虧損心陽或由飲食傷中損及脾陽或由房勞過度虧損腎陽陽衰陰盛百病叢生不獨腰疾但腰之痛在下部究竟總是一個陽虛然下焦之陽虛下焦之陰寒自盛陽微而運轉力衰腰痛立作其人定見身重畏寒精神困倦法宜峻補坎陽陽旺陰消腰痛自已如陽旦湯朮附羌活附子湯之類陰虛而致者由腎陽素旺也旺甚即為客邪火盛血傷元陰日竭則真陽無依腰痛立作其人必小便赤而咽乾多暴躁陽物易挺喜清涼法宜養陰陰長陽消腎氣自攝腰痛自已如滋腎丸地黃湯封髓丹倍黃柏加全皮之類因寒而致者由外感寒邪從太陽而入少陰太陽與少陰為表裡少陰為陰臟外寒亦陰入而附之陰主收束閉其腎中真陽運行之氣機故腰痛作其人定見發熱畏寒或兼身痛咽乾不渴時時欲寐法宜溫經散寒寒散而腰痛自已如麻黃附子細辛湯附羌湯之類因濕滯而致者由其人素稟勞苦久居濕地深坑中氣每多不足易感外來之客邪太陰與腎相連濕邪不消流入腎界阻其運行之機故腰痛定見四肢沉重常覺內冷天陰雨更甚腰重如有所繫法宜溫經除濕濕去而腰痛自已如腎著湯桂苓朮甘湯加附子細辛之類近來市習一見腰痛不究陰陽不探虛實便謂房勞過度傷及腎陰故所用藥品多以熟地棗皮杜仲枸杞巴戟首烏蓯蓉補骨脂菟絲龜膠一派功專滋陰補水人人所共信殊不知腎為至陰之府先天真陽寄焉陰居其二陽居其一夫婦交媾生男育女易云乾道成男稟父之陽精也坤道成女稟母之陰精也由此觀之男子所虧者腎中之陽而非腎中之陰也所謂陰虛者指腎為陰臟而説非專指腎中之水虛實指腎中之陽虛也眉批知非氏曰醫有恆言陰虛火旺多傷於房勞或損及脾胃法當滋陰瀉火夫陰者何物火者何物損之傷之者又何物治之必用一派滋陰補水之藥將滋之補之者又系何物人往往不能言知非因之喟然嘆矣不禁睪然思穆然望曰人得天地之至精日以熔鍊穀味取汁變化而生氣血其靈貫於百骸為五臟六腑之本十二經脈之原統治群陰不敢作祟俾人得安舒無恙者此一物也爰倣佛而擬其形容觀其會通曰陰者鬼之靈也火者神之靈也知鬼神為水火則知陰虛火旺滋陰補水之説為不通其法必不效安能療水火之疾病欽安此按發明陽衰陰盛後又指出虧者虧腎中之陽腎虛是腎中之陽虛陽即火而陰即鬼藉腰痛一證以傳神補出內外兩法剖明兩腰致痛之由良以太陽寒水厥陰風木少陰君相二火皆關於腎知之真故不覺言之親切有味六經之法通治百病顧可不亟講乎學者其玩索而有得焉可若不辨明這點機關但稱陰虛但知滋水勢必陰愈盛而陽愈微濕愈增而寒愈閉腰痛終無時已治人實以害人救世實以害世此皆通套之弊豈忍附和不言實不得已耳惟願同道拋去此項藥品按定陰陽虛實外感內傷治之庶不致遺害焉耳更有可怪者今之醫家專以首烏熟地一派甘寒之品為補水必用之藥何不將天一生水這句道理細心推究試問天一生水專賴此一派甘寒之品乎總之宗旨不明源頭莫徹仲景而下罕有了了眉批能辨宗旨源頭方可謂曰知醫頭痛按頭痛一證有從外而入者有從內而出者從外而入者風寒暑濕燥火六客之邪干之也干於三陽俱以表稱干於三陰俱以里論此指六客由外入內之謂非指七情損傷由內出外之謂三陽者何一曰太陽頭痛脈浮項強發熱惡寒惡風是也自汗惡風主以桂枝湯惡寒無汗主以麻黃湯是順其本經之氣機也二曰陽明頭痛額前眉稜眼眶脹甚脈長惡熱主以葛根湯是順其本經之氣機也三曰少陽頭痛而兩側獨甚寒熱往來目眩口苦主以小柴胡湯是順其本經之氣機也三陽之氣機順邪不至入於內而三陰即不病矣若三陽之外邪不解則必傳於三陰三陰者何四曰太陰外邪傳至太陰太陰主濕邪從濕化濕氣上蒸頭痛而重四肢痠疼而覺冷腹滿嘔吐不食主以理中湯是溫中除濕之意也五曰少陰少陰乃水火交會之區邪入少陰若協火而化為熱邪熱氣上蒸頭痛而咽乾便赤少氣懶言肌膚燥熯法宜養陰主以雞子黃連湯是潤燥救陰之意也邪若協水而化為陰邪頭痛而脈微欲絶身重而欲寐懶言咽乾而口不渴主以麻黃附子細辛湯是溫經散寒扶陽抑陰之意也六曰厥陰邪入厥陰厥陰主風木邪從風化為病風主輕清頭痛而巔頂更甚諸陰之脈至頸而還惟厥陰脈會頂巔厥陰又屬至陰之所邪入此從陰化者亦多頂痛多兼乾嘔吐涎爪甲唇口青色肢冷腹痛主以吳萸四逆湯是回陽降逆祛陰之意也眉批此論六經頭痛三陽三陰為病有界限有次第有傳不傳傳者病也著眼論素問云三陽為父指太陽二陽為衛指陽明一陽為紀指少陽三陰為母指太陰二陰為雌指少陰一陰為使指厥陰此篇所論是從六步流行之氣機言之也邪在三陽法宜升解不使入內為要邪在三陰法宜溫固由內而釋不使傷表為先眉批總結六經若內傷日久七情過度陽虛陰虛亦能作頭病但病形無外感可徵頭眩昏暈十居其八頭痛十僅二三因陽虛日久不能鎮納濁陰陰氣上騰有頭痛如裂如劈如泰山壓定有欲繩索緊捆者其人定見氣喘唇舌青黑渴飲滾湯此屬陽脫於上乃系危候法宜回陽收納為要如大劑白通四逆之類緩則不救若誤用發散旦夕即亡因陰虛而頭痛者乃火邪上衝其人雖無外感可徵多心煩咽乾便赤飲冷有覺火從腳底而上火從兩腰而上火從臍下而上上即頭痛無有定時非若外感之終日無已時也法宜扶陰如六味八味之類此條尚有區分病人自覺火自下而上時其人安靜不喜冷飲咽不幹便不赤心不煩唇舌若青則又是陰氣上騰法宜大辛大甘以守之復之切不可妄用滋陰降火一滋陰降火則陰愈勝而陽愈消脫證立作矣眉批推論頭痛有陽虛陰虛危候析陰陽於微芒內外兩法各有攸歸前賢雖稱頭為諸陽之首清氣所居高巔惟風可到治之專以祛風為主此語近是豫謂凡病頭痛之人每由內之正氣不足不能充周外之一切風邪六客即是六風風字宜活看內之一切陽虛陰虛俱能上逆而為病外邪則按定六經提綱病情為準內傷則按定喜怒悲哀憂思恐懼陽虛陰虛為要他如諸書所載有名雷頭風者頭響者頭搖者頭重者偏左偏右者大頭毒者宿食頭痛者種種名目亦不可不知雷頭與響者氣挾肝火而聚於上也火即是風言其盛也雷頭主以清震湯頭響者主以小柴胡加丹梔頭搖者風淫於內也主以養血湯頭重者濕氣蒸於上也主以祛風散濕湯偏於左者血虛風動也主以四物加風藥偏於右者氣虛而風襲之也主以四君加風藥左右二證豫常以封髓丹加吳萸安桂屢治屢效大頭毒者外感時行癘氣壅於三陽也主以普濟消毒飲宿食痛者飢則安而飽則甚由胃中濁氣上蒸也主以平胃散加消導藥以上等法皆前賢所制亦可擇取姑存之以便參考眉批提頓開下搜採無遺名論不刊醫家上乘查近市習一見頭痛不按陰陽專主祛風所用無非川芎白芷荊芥防風蔓荊藁本羌活天麻辛夷蒼耳夫此等藥品皆輕清之品用以祛三陽表分之風則效如桴鼓用以治三陰上逆外越之證則為害最烈不可不知也目病按目病一條眼科有七十二種之別名目愈多學者無從下手豫為之括其要統以外感內傷兩法判之易於明白瞭然從外感者多由染天行時氣而作時氣二字指六氣也看是何邪干於何部干於肺者白睛受病干於心者兩眥受病干於肝者黑珠受病干於腎者瞳子受病干於脾者上下眼皮受病無論何邪由外入內初起定見惡風畏寒惡熱頭痛紅腫脹痛羞明流淚赤脈縷縷等情或失於宣散過於寒涼久久不愈便生翳障赤白等霧皆是從外而生者也治之之法按定時令部位不外祛風清熱升散等方而已余欲按定六客逐部以論病論方未免太繁外形已經説明學者思之而亦即得之矣眉批分配精確如然鸝得珠已扼治目之要何必他求從內傷而得者則有七情之別七情者喜怒悲哀恐懼而已七情之擾總屬傷神神者火也氣也眉批一語抵人千百經云得一之精以知死生夫神火陽氣一而已矣過於喜者損心陽則心中之陰邪自盛即為客邪上乘而生赤翳障霧過於怒者損肝陽肝中之陰自盛即為客邪上乘而青翳障霧過於憂思者損脾陽脾中之陰自盛即為客邪上乘而生黃翳障霧過於恐懼者損腎陽腎中之陰自盛即為客邪上乘而生黑翳障霧過於悲哀者損肺陽肺中之陰盛即為客邪上乘而為白翳障霧此數目疾定無羞明紅腫痛甚惡熱喜冷其人少氣懶言身重嗜臥面色青白脈或虛細浮大中空種種情形皆是內傷虛損而生者也亦有一發而即痛脹欲裂目赤如榴者由先天真氣附肝而上欲從目脫也定見唇口黧黑或氣喘促喜極熱湯水六脈或暴出如繩或脈徑如石或浮大而空或釜沸者是也法宜回陽收納為要傷於心者可與補坎益離丹桂枝龍牡湯傷於肝者可與烏梅丸傷於脾者可與建中理中湯傷於腎者可與潛陽真武封髓等方傷於肺者可與薑桂湯桂苓薑半湯先天真氣暴出者可與回陽白通湯備載數方略陳大意添減分兩在人變通設或果有血虛陽亢為殃者其人定有火邪可徵如六味地黃湯丹梔四物湯皆可選用眉批法潤機圓近來市習一見目痛並不察究外內虛實多用蟲退木賊紅花菊花決明歸尾赤芍荊芥防風薄荷生地夜明砂夏枯草冬桑葉穀精草與夫壯水明目丸杞菊地黃丸滋腎養肝丸如此等方藥治外感風熱血虛每多立效若七情損傷由內出外之目疾鮮能獲效學者當細心體會內外兩法切勿混淆方可售世耳病腫痛按耳病腫痛一證有因肝膽風火而致者有忿怒抑鬱而致者有腎陽虛而陰氣上攻者有腎水衰而火邪上攻者因肝膽風火而致者由肝膽挾外受之風熱聚而不散其人兩耳紅腫痛甚時見寒熱往來口苦咽乾者是也法宜和解小柴胡湯倍柴芩加麥芽香附治之因忿怒抑鬱而致者由忿怒傷肝抑鬱之氣結而不散其人兩耳紅腫必見兩脅脹痛時多太息法宜疏肝理氣為主如生地四物湯倍加柴胡青皮麥芽香附之類因腎陽虛而致者由腎陽日衰不能鎮納僭上之陰氣其人兩耳雖腫皮色如常即痛亦微唇舌必淡人必少神法宜扶陽祛陰如封髓丹倍砂仁加安桂吳萸或潛陽丹加吳萸或陽旦湯加香附麥芽之類因腎水虛而邪火上攻者其人兩耳腫痛腰必脹口多渴心多煩陽物易挺法宜滋陰降火如六味地黃湯加龜板五味白芍或滋腎丸倍知柏之類更有一等內傷日久元陽久虛而五臟六腑之元氣已耗將盡滿身純陰先天一點真火種子暴浮於上欲從兩耳脫出有現紅腫痛極欲死者有耳心癢極欲死者有兼身癢欲死者其人定見兩尺洪大而空或六脈大如繩而弦徑唇舌或青或黑或黃或白或芒刺滿口或舌苔燥極總不思茶水口必不渴即渴喜極滾熱飲二便如常甚者爪甲青黑氣喘促或兼腹痛此等病情法宜大劑回陽不可遲緩緩則不救大凡現以上病情不獨耳疾當如是治即周身關竅百節地面或瘡或痛皆宜如是治如白通四逆回陽等方急宜進服以盡人事勿謂之小疾耳眉批耳之部左右皆屬少陽一見耳病腫痛用少陽方小柴胡湯治之似無不效欽安復指出多般耳證治法各不相同辨認均有憑據如按中或言肝膽風火或言忿怒抑鬱或言陽虛陰上或言水虛火上豈出六經之外而別具手眼乎非也耳本少陽之部一定不移而少陽之氣機升降則隨所感而變見於耳部其病情決不相類良以少陽之氣根於至陰識得至陰之氣發為少陽之氣隨所感而變見又必有陰陽變證之憑據可察故治法雖多或進而從陽外因外治也或退而從陰外因內治也總是治少陽耳病之一法蓋得六經之根底從仲景不言之奧充類至盡神明變化而出可謂善讀古書者矣學者讀其書通其意臨證審察就其所已言而更窮其變將必愈有通於其所未言者而生出治法以活人病快何如之故欽安小注補出不獨耳病當如是治云云是又在學者之善讀欽安者耳近來市習一見耳腫不問虛實不辨外內即以人參敗毒散加大力連翹銀花蒲公英外敷三黃散與藍靛腳之類果系外感風熱閉塞而成立見奇功若系內傷陰陽大虛元氣外越之候則為害最烈更有耳鳴耳聾辨認不外陰陽兩法但耳聾一證老人居多由腎陽久虧真氣不充於上故也定不易治若由外感時氣卒然閉塞清道者時邪一去漸漸能聰不藥可愈亦有痰火上升為鳴聾定有痰火情形可徵按痰火法治之必效理本無窮舉其大綱苟能細心研究自然一見便識也鼻流清涕按鼻流清涕一證有從外感而致者有從內傷而致者從外感而致者感受外來之客邪客於肺經閉其清道肺氣不得下降清涕是出其人定現發熱惡風惡寒頭疼身痛等情法宜宣散如桂枝湯麻黃湯葛根湯之類從內傷而得者由心肺之陽不足不能統攝津液而清涕出市人稱為肺寒稱為陳寒由其不知陽衰而陰寒即生也腎絡通於肺腎陽衰而陰寒內生不能收束津液而清涕亦出其人定無外感足徵多困倦無神或忿嚏不休或畏寒或兩腳冷法宜扶陽如麻黃附子細辛湯薑桂湯陽旦湯之類若久病之人忽然清涕不止又見壯熱汗氣喘唇青脈徑浮空乃亡陽欲脫之候急宜回陽緩則不救然亦十中僅救一二眉批知非氏曰夫涕本臟腑所生皆陰類也經曰水宗也積水也積水者至陰也至陰者腎之精也指涕泣而言又曰宗精之水所以不出者是精持之也輔之裹之故水不行也指平人不流清涕而言又曰涕泣者腦也腦者陰也髓者骨之充也故腦滲為涕志者骨之主也是以水流而涕從之者其行類也此指人之所以有涕而言以外感論客邪中其經閉其清道則陽氣並於上而不降陰氣並於下而不升陽並於上則火獨亢也陰並於下則腳寒腳寒則脹也夫一水不勝五火故鼻流清涕蓋氣並於鼻衝風涕下而不止以內傷論夫水之精為志火之精為神七情所感神志紛弛水火不濟陰精失守久而津液無所統攝故清涕亦出此神之傷志之奪也欽安論治洞達本原明晰旁流推及淵濁二證甚則流紅皆此物此志也學者入理深造譬之射勿矢諸正鵠醫之正宗在此查近來市習一見鼻流清涕不分內外一味發散多以參蘇飲人參敗毒九味羌活辛夷散等方外感則可內傷則殆其中尚有鼻淵鼻濁二證俗云髓之液也不知髓乃人身立命之物豈可流出乎然二證雖有淵淵者流清涕經年纍月不止濁濁者其色如米泔或如黃豆汁經年纍月不止之分緣由素稟陽虛心肺之陽衰而不收束津液故也不能統攝津液治之又一味宣散正氣愈耗而涕愈不休清者肺寒之徵肺陽不足也濁者肺熱之驗但肺熱者必有熱形可徵如無肺熱可徵則是上焦化變之機失職中宮之土氣上升於肺肺氣大衰而化變失權故黃涕作治之須有分別豫治此二證每以西砂一兩黃柏五錢炙草四錢安桂吳萸各三錢治之一二劑即止甚者加薑附二三錢屢屢獲效即甘草乾薑湯加桂尖茯苓亦可又尚有鼻血一證有由火旺而逼出定有火形可徵如口渴飲冷大小便不利之類法宜清火攻下如大小承氣犀角地黃湯導赤散之類有元陽久虛不能鎮納僭上陰邪陰血外越亦鼻血不止不僅鼻血一端如吐血齒縫血耳血毛孔血便血等其人定無火形可徵二便自利唇舌淡白人困無神法宜扶陽收納如潛陽封髓甘草乾薑或加安桂吳萸之類學者切切不可一味見病治病務要將內外病形陰陽實據熟悉胸中方不致誤人性命也鼻孔煽動按鼻孔煽動一證有因外感風寒閉塞而致者有因胃中積熱而致者有元氣將絶而致者因外邪閉塞而致者由外感風寒之邪閉其肺經外出之氣機氣機欲出而不得出壅於肺竅呼吸錯亂而鼻孔煽動其人定見發熱身疼法宜宣散如荊防敗毒散麻黃湯定喘湯皆可選用眉批鼻孔而致煽動其勢亦云亟矣雖因外感用藥深皆留神因積熱上攻而致者或由飲食停滯中脘或由過食煎炒椒薑胸中素有蓄熱熱攻於肺氣機錯亂而鼻孔煽動法宜清熱如大小承氣三物備急丸之類因元氣欲絶而致者由其人元氣久虛或又大吐大瀉大熱汗出面白無神奄奄欲絶而見鼻孔煽動法在不治若欲救之急宜回陽收納溫固脾腎元氣十中可救一二惟此條證候小兒居多大人卻少醫者切切不可一味宣散總要細細區分辨明為準眉批分陰分陽醫之要者故致叮嚀唇口紅腫按唇口紅腫一證有胃火旺極者有元陽上浮者因胃火旺而致者其人定見煩渴飲冷惡熱或二便不利或由積滯太重抑鬱生熱或過食醇醴辛辣不盡屬外邪而成若兼外感必有外感可徵挾外感者可與麻杏石甘湯升麻葛根湯無外感者可與人參白虎涼膈散大小承氣之類積滯者可與平胃加莪朮丑牛大黃之類若久病之人元陽外越氣機上浮其人定見滿身純陰實據其中唇色有紅而含青含黑慘紅老紅嫩紅等形亦有兼見面如桃花面色光澤奪目人困無神皆是脫絶危候法在不治之例若欲救之急宜收納為主如潛陽回陽白通金匱腎氣等方服一二劑如紅色光彩收回可許重生否則旦夕之間耳切宜早推勿治為上眉批知非氏曰唇字從辰從口其氣機從寸地而發至於辰辰為春三月於卦為夬陽氣上勝之象辰口即其部位也知其部屬陽其氣喜泱升不受陰寒凝滯故見紅腫之疾甚則糜爛而痛決非實證欽安示人審兼證通其變也知非從而切其源謂其獨也通其變識其獨知其生決其死醫之法亦基之矣近來粗工一見唇口紅腫不辨虛實即以大黃石膏等治之實症立生虛症立斃不可不知也其中尚有兼見流口水不止者即在口氣冷熱處與病形處求之便得陰陽之實據也齒牙腫痛按齒牙腫痛一證諸書有十二經之分其實在可從不可從之例總之以有餘不足為主然有因風火抑鬱而致者有因胃中積熱而致者有真陽虛而陰氣上攻者有元陰虛而元陽為害者因風火抑鬱而致者先有發熱身痛可徵法宜宣散如升陰散火湯消風散清胃散麻杏湯之類因積熱上攻而致者定多飽悶吞酸口渴飲冷面赤唇紅氣粗蒸手法宜去其積滯為主如平胃散加大黃石膏丑牛檳榔之類因真陽虛而陰氣上攻者其人齒牙雖痛面色必青白無神舌多青滑黑潤黃潤白黃而潤津液滿口不思茶水口中上下肉色多滯青色而不紅活或白慘黃而無紅色以上等情不僅此症一切陽虛病多見此情法宜扶陽抑陰如白通湯薑桂飲陽八味潛陽丹之類因陰虛而火邪為病者其人定多心煩飲冷便赤等情法宜養陰如六味地黃湯雞子黃連湯導赤散之類近來市習一見牙腫齒疼便以生地細辛防風荊芥石斛知母石膏玄參丹皮狗地牙等治之風火則可陽虛則殆眉批齒牙腫痛本屬小證然有經年纍月而不愈者平時若不究明陰陽虛實治之未能就痊未免貽笑大方學者勿因其小而失之口臭附口苦口酸口辛口甘口淡口糜按口臭一證有胃火旺極而致者有陰盛而真精之氣發泄者因胃火旺而致者其人必煩躁惡熱飲冷不休或舌苔芒刺干黃乾黑乾白等色氣粗汗出聲音響亮二便不利法宜專清胃火如人參白虎大小承氣三黃石膏湯之類因精氣發泄而致者由其人五臟六腑元陽已耗將盡滿身純陰逼出先天立命一點精氣勢已離根欲脫法在不救口雖極臭無一毫火象可憑舌色雖黃定多滑潤間有干黃乾黑無一分津液於上而人並不思茶水困倦無神二便自利其人安靜間有渴者只是喜飲極熱沸湯以上等形俱屬純陰若憑口臭一端而即謂之火鮮不為害豫曾治過數人雖見口臭而卻純陰畢露即以大劑白通四逆回陽等方治之一二劑後口臭全無精神漸增便可許其可愈若二三劑後並不見減十中僅救得一二仍宜此法重用多服此是病重藥輕不勝其任也昧者只圖速效服一二劑未見大效便即更醫如此之情舉世皆然豈真醫藥之不良哉眉批知非氏曰氣之香薰者清陽之氣也氣之臭惡者濁陰之氣也口臭緣濁陰極盛陽氣之用不宜多有涎垢濁膩譬如暑天陰雨過甚天陽被郁凡物發黴起涎其氣臭惡若得數日炎熱臭氣頓失人身遍體純陰所以真陽厥脫之候往往現此證象醫識此理便能治此證欽安窺見其微故按中反復徵引言之學者不可忽略看過查近市習一見口臭並不辨明陰陽便以生地二冬知母花粉石膏大黃之品投之陽盛則生陰盛則斃不可不知也其中尚有口苦者心膽有熱也心熱者可與導赤散黃連湯膽熱者可與小柴胡湯倍黃芩或瀉肝湯口酸者肝有熱也可與當歸蘆薈散龍膽瀉肝湯口辛者肺有熱也可與瀉白散清肺飲口甘者脾氣發泄也可與理中湯六君子湯口淡者脾氣不足也可與歸脾湯參苓白朮散口糜者滿口生百瘡系胃火旺也可與甘露飲涼膈散以上數證皆宜知之總在考究陰陽實據為要豫嘗治陽虛陰盛之人投以辛甘化陽二三劑即有現口苦口酸口淡口辛口甘等味又服二三劑而此等病形即無豫仔細推究皆緣真陽失職運轉力乖兼之服藥停積未去令得辛甘化陽之品運轉復行積滯即去故口中一切氣味出矣眉批真陽變動露出真面辛甘助化易危為安藥之為力不淺然此等至理少有見到者昧者不識此理見酸即治酸見苦即治苦鮮不增病醫理之微不誠難哉舌腫舌痛重舌舌強舌麻舌木舌縮按舌證雖有數端不外陰陽兩法如腫痛與重者氣之有餘也氣有餘便是火必有火形可徵如縮與強麻木者氣之不足也氣不足便是寒定有陰寒情形可驗治腫痛與重不外清熱一法如黃連解毒湯導赤散大小承氣黃連瀉心湯之類治縮與麻木強不外扶陽祛陰化痰降逆一法如白通湯薑桂飲黃耆建中湯麻黃附子細辛湯半夏乾薑湯之類眉批化痰何以不用橘皮南星礞石須知仲景六經方中無此品類或者漢時尚未出此藥耶一噱近來市習一見舌痛皆云舌乃心之苗皆火為病也即以冰硼散吹之黃連解毒服之有餘立瘳不足則殆眉批知非氏曰舌之所以能言者氣機之貫注也何必執定乃心苗一語以治舌證欽安不言之隱知非饒舌點出學者當亦豁然矣喉蛾按喉蛾一證有少陰君火為病者有腎氣為病者有胃中積熱上攻而致者有怒動肝火上攻而致者因少陰君火為病者或由外挾風熱與君火協化或本經素有邪發泄不暢上刑于肺少陰之脈挾咽喉咽喉窄狹火氣太甚欲發泄而不能薰蒸於上而生蛾子其人定多心煩小便短赤口渴飲冷若挾風熱多現發熱身疼頭痛法當祛風清熱如導赤散加荊防銀花之類無風熱而獨君火旺為病者輕則甘桔湯重則黃連解毒湯之類因腎氣不藏上攻於喉而致者俗云陰虛火旺不知腎氣以潛藏為順上行為逆實由君火太弱不能鎮納群陰非陰之虛實陰之盛世人錯認原由君火弱而不能制陰陰氣上僭逆於咽喉而生蛾子其人口內肉色必含青黑色或慘黃淡白色即或唇紅甚而口氣溫痛亦不甚人困無神脈必浮空法宜扶陽如封髓丹薑桂飲白通潛陽等方皆可令服因積熱上攻而致者其人必過食厚味或胃中素有伏熱上攻於肺亦生蛾子多煩渴飲冷二便不利口臭氣粗紅腫痛甚法宜去積熱如大小承氣湯或平胃散加丑牛檳榔大黃三稜莪朮之類因怒動肝火上攻於肺而生蛾子其人兩脅必痛動輒躁煩面青口苦脈必弦洪法宜清肝如丹梔逍遙散大青飲柴胡湯加丹梔之類總之病情變化非一二端能盡其實萬變萬化不越陰陽兩法眉批圓通一至若欲逐經逐臟逐腑論之旨多反晦誠不若少之為愈也眉批知非氏曰喉至生蛾其咽必腫痛而甚有礙食飲病家多驚恐其證又因初起誤治者多在明醫雖能剖析陰陽虛實按經用藥而緩不濟急病家恐惴如外科所配八寶紅靈丹亦不妨暫用吹喉以解燃眉略寬其心病人得此心神稍定然後按法投方易於奏效此知非所經試亦濟世之婆心也學者留意至於理法喉屬少陰欽安究及所因實為詳明何多求焉近來市習一見喉症往往用吹喉散冰硼散開喉劍一派寒涼之品甚者刺之陽證無妨陰證有礙認證貴明須當仔細兩手膀背痛按膀背痛一證有因外感風寒閉塞經絡而作者有因中氣不足內寒阻滯而作者因外感風寒而致者其人定多畏寒惡風或發熱而兼頭疼法宜宣散如桂枝湯羌活附子湯麻黃附子細辛湯之類因中氣不足而致者由中宮素虛真氣不能充周四體寒邪痰濕亦得以阻滯經絡而痛立作矣其人定然面白少神飲食減少或逢晦明陰雨而更甚麗照當空而覺輕法宜溫中行氣為主如建中湯倍桂附補中益氣湯加羌附或理中湯加桂枝香附豫恆見中年老婦每多兩手膀痛而不能舉時常作苦究其受病之由多起於少年天癸至時不知保養洗衣漿裳輒用冷水以致寒涼傷及經絡因而天癸不行者亦多即或體強而寒涼不能害視為平常不知人身真氣有盛即有衰氣未衰時寒涼雖侵不即為害逮至中年老時本身正氣已衰或兼受一點寒邪引動而痛於斯作矣豫每以甘草乾薑湯加鹿茸桂尖附子蔥酒治之多效眉批夫人少年作苦恃勇力作逮至中晚之歲稍能逸豫勞傷之疾徐發於內痛苦立作見於手膀腳腿者多粗工不識任治罔效往往病人自能體會何者今之痛處皆昔之勞力處也欽安此按識見絶高深合內經比類從容之法非功力精到者未易臻此又醫之一大法也學者不可不知近來市習一見兩手膀痛每以五積散流氣飲與夫羌活荊防伸筋舒筋草蘇木靈仙松節之類亦多獲效總不若辨明外感內傷陰陽虛實為要更有手指麻木一證屬脾氣不能充周者多外感者少兼痰濕亦多不外溫中行氣為主如歸脾湯加天麻半夏六君四君加附桂香砂建中湯倍桂附加香附當歸之類心痛按心痛一證有寒熱之別他書有云心為君主之官其可痛乎所云痛者實心包也此説近是豫謂心肝脾肺腎並六腑周身經絡骨節皮膚有形之軀殼皆後天體質全賴先天無形之真氣以養之真氣二字指真陰真陽也真陰指母之精氣真陽指父之精氣二氣渾為一氣周流上下四旁主宰神明即寓於中真氣不足無論在於何部便生疾病何得有心無痛證之説夫豈不見天之日月常有食乎凡認心痛一證必先判明界限方可心居膈膜之上下一寸即胃口胃口離心不遠胃痛而云心痛者亦多不可不察細思痛證一條痛字總是一個逆字氣順則氣血流通必無痛證氣逆則氣血壅滯不通故痛無論逆在何處皆能作痛皆能傷心其實非傷有形質之心實傷無形中所具之真宰也若執定有形質之心是知其末也心有心之界限包絡為心之外垣邪犯心包即是犯心章本不必直云邪不犯心犯心二字是犯心君居處氣也試問犯心與犯心包以何區分諸書並未剴切指陳豫謂人活一口氣氣盛則為有餘為熱邪不獨能致心痛氣衰則為不足為陰邪亦不獨能致心痛之疾熱與陰上逆皆能致心痛當以寒熱兩字判之便了若邪熱上干而痛者其人必面赤心煩熱小便短赤口渴飲冷法宜養陰清火如黃連木香湯導赤散當歸散之類若陰寒上干而痛者其人多面青唇白或舌青黑喜熱飲揉按二便自利法宜扶陽祛陰為主如甘草乾薑湯加行氣藥薑桂吳萸之類亦有陰寒已極上攻於心鼻如煤煙唇口黧黑爪甲青黑滿身純陰法在不救急以回陽諸方大劑投之十中可救一二眉批知非氏曰此段至理乃造化根柢性命之旨圭奈何泄之於醫世人不識反多訾議余觀一部內經軒岐君臣皆是借天驗人以人合天天人各道仲景太守傷寒一書太陽太陰少陽少陰陽明厥陰六經亦不過借天道之流行暗合人身之度數藉病談機而已欽安直筆於茲毋乃太過乎雖然醫道理沒久矣如此發揮守先聖之道以待後之學者心存利濟亦不為罪倘有能從此深造治病動合機宜立言彰闡至理將不失為軒岐功臣斯世和緩幸甚全甚近來市習心胃莫分一味行氣破滯並不察究陰陽往往誤事一概委之天命而人事之當盡又不可廢乎胃痛按胃痛一證有飲食寒熱虛實之別切不可執定有形質之胃當於胃中往來之氣機上理會方可眉批於氣機上理會上乘妙法蓮華經也夫人身內有胃乃受飲食之具譬如田地任人播種秀實憑天倘遇災侵而有黃落之恐田地肯任其咎乎古人擬胃曰陽土欽安論治胃病當理會氣機皆一定不易之理法也學者即不能入理深談按定外內陰陽之法總不至謬治誤人因飲食停滯於胃胃中之氣機不暢而致者其人定見飽悶吞酸噯氣痛處手不可近法宜消食行滯如厚朴七物湯平胃散加香附麥芽之類因胃陽不足復感外寒生冷食物中寒頓起而致者其人必喜揉按喜熱飲或口吐清水面白唇青法宜溫中行氣如香砂六君湯理中湯加官桂砂仁香附木香之類因積濕生熱與腸胃素有伏熱過食厚味而生熱氣鬱不舒而生熱所致者其人定多煩躁唇紅氣粗大便堅實等情法宜下奪清熱為主如調胃承氣湯大黃木香湯四磨湯之類更有一等心胃腹痛面赤如朱欲重物壓定稍安者此是陰盛逼陽於外之候法宜扶陽祛陰為急切不可照常法治之近來市習多以元胡乳沒二皮朮稜五香枳殼厚朴之味投之果有積滯主立奇功若胃腸素虧必增其害不可不知也臍痛按臍痛一證有陰陽之別臍居陰陽交界之區臍上屬脾胃臍下屬肝腎痛在臍上著重脾胃痛在臍下著重肝腎臍上下俱痛者脾胃與肝腎病也此處又宜分別何經受病為要若臍上獨痛是脾胃之氣有所滯也因寒因熱因食因仰郁又宜知審是飽悶吞酸便知飲食停而氣滯也急以消食行滯之品施之如平胃散加香附麥芽枳殼之類治之審是喜熱飲揉按而痛即減者知是脾胃之陽不足不能化其陰寒之邪也法宜溫中如理中湯香砂六君甘草乾薑湯加香附安桂丁香之類審是不喜熱飲摩按得熱而反劇者知是脾胃有鬱熱而氣滯也即以開鬱行滯之法治之如厚朴七物湯麥芽炒梔香附之類是也亦有太陽之邪未解誤下而邪陷於脾以致臍上痛者其人必先有發熱惡寒頭項強痛之候因下後方見此痛者便以桂枝大黃湯治之若臍下獨痛是厥陰之氣不宣也審是煩滿囊縮臍下病痛者厥陰之陰寒太甚也法宜回陽祛陰如吳萸四逆湯白通湯之類是也審是厥陰熱邪伏而不宣又或上攻為喉痹下攻便膿血熱深厥深口臭氣粗之類法宜扶陰如雞子黃連湯之類眉批知非氏曰三陰之病本從肚臍而分然痛在臍上有太陽陽明之不同一腑一臟之懸絶故欽安以飽悶吞酸定陽明腑病而用行消之法若稍上又是太陽地而有風寒之判皆有痛證且有氣血之區別學者平時若不詳細講究臨證必多疑似處方不無模稜斷難萬舉萬當熟玩此按悉心討論自得真詮近來市習一見臍痛不按界限一味調氣行血每以木香小茴當歸白芍川芎枳殼沉香之類故有效與不效誠不若辨明上下陰陽治之為當也疝證按疝證一條有云左為膀胱氣右為疝氣痛時睪丸上行入腹或右丸上行而左丸不上行或左丸上行而右丸不上行或兩丸並上行他書有寒疝水疝血疝氣疝狐疝陰疝㿗疝心疝肝疝之異名目雖多總無一定不易之理豫細推此病究竟只在厥陰一經也眉批此按落落大方深入顯出不愧為醫一語成鐵案誰敢再翻異余深服老吏雖形象病情不同而睪丸與陰囊其理斷無可移者豫意睪丸與陰囊上縮必是陰盛睪丸與陰囊紅腫必是熱增治縮者重在破陰以回陽吳萸四逆加桂砂小茴或烏梅丸倍陽藥之類治腫者法宜破陽以扶陰雞子黃連與瀉肝湯可施須知腫縮二字即盈虛之宗旨肝氣有餘便是火即囊丸腫的實據肝氣不足便是寒即囊丸縮的實據眉批醒豁透露又可疑者今人皆云兩丸為外腎何男子有而女子無乎此理舉世罕言明晰豫思天一生水其卦為坎二陰夾一陽腰間二腎與背脊督脈似之男女皆具理實可從若此二丸男有女無非無一定之理惜後賢窺之未及也後天既以坎離立極坎離即是乾坤是坎離已得一二之數故復申之曰天三生木木有陰木陽木之別陽木曰三為長男二陰一陽今之呼外腎者即此也故男子獨具陰木曰三為長女二陽一陰其缺在下今之呼陰戶者此也眉批闡發至理暢所欲言然似斷鰲立極卻是叫人何處住腳余謂醫道須是知得一步方許再進一步終身門外正不知幾許人也夫乾坤交媾首生長男長女後天以坎離代乾坤而天三生木之旨即在此處便見而玉莖陰戶亦於此攸分故仲景配此處屬厥陰取其至陰陰極也玉莖之舉必須心火下照又可見天三生木之機此就其形體而言其中之精義實微未可盡泄堪笑今人以外腎呼之真是説夢話也眉批再接再勵乃一讀一擊節以高唱入雲之筆繪天地生髮之機斟酌飽滿盡態極妍可謂寫生妙手發揮陰得陽而興之理尤見精緻然非學養功深不能道其隻字查近來市方一見疝證便以小茴荔枝核橘核安桂附子麝香之類屢屢獲效究其所用皆是溫肝之品取核者時核以入核之意理實可從至於囊丸紅腫此法斷不可施務在陰陽攸分處理會可也眉批結亦含耆不盡唐詩曰欲窮千里目更上一層樓如熊氏歌曰要知返本還原法須認吾身大藥王遺精按遺精一證諸書分別有夢而遺無夢而遺用心過度而遺見色而遺聞女聲而遺無故自遺種種分別總無一定不易之法豫謂不必細分統以心腎不交神魂不藏為主夫人之立身原以心腎為主腎氣上騰指坎氣也載水氣以交於心而心臟涼心氣下降使君火以入腎而腎臟溫神居二氣中晝則從離夜則從坎神宰乎氣氣統乎精神施發泄之令氣動而精自不藏若云神未施而精自泄必無此理又曰魂者神之使也眉批知非氏曰此按心腎不交是客從俗情也神魂不藏是主談至理也凡遇遺精之人以心腎不交或因於濕熱極不通之語告之無不者肯語以欲熾所致即弗帖然又必從而多方文致故欽安姑存其説以作陪襯留病人地步學者不可不知人之遺精每每五更近天明時者居多此刻神已居在寅卯界內寅卯屬木系藏魂之所魂喜動而木喜發泄木中有火濁火易亂其神明邪忘之念偶萌精神自不能守住白晝不夢但心邪思淫陽物即舉精即離位況在夢乎故一發即泄迅速難留因其目瞑必未清肝火最烈故發速非若白晝神在離總而言之神不清而氣虛好色者十居其八此證少年最多神魂不藏是其本者眉批得時而旺虛靈顯應濁火一入喪卻他家至重珍深為可惜陰符經云沉木入火自取滅亡蓋言木得火而焚也此段此理説待如吳鉤出匣寒光逼人病者若見此書熟讀百回可當百帖清涼飲定占勿藥有喜欲使封固如三才封髓丹桂枝龍骨牡蠣湯白通湯皆可服也此三方者皆是交濟陰陽之功但非一二劑可見大功總要信心得專多服十餘劑無不靈應近來通稱龍牡澀精尚未窺透其中至妙多以金櫻粟殼枸杞巴戟蓮鬚之類治之每多不效由其不知封固之有要也
