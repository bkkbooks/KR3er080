body:
  text: 卷四失血破疑説今人一見失血諸症莫不稱為火旺也稱為火旺治之莫不用寒涼以瀉火舉世宗之而不疑群醫信之而不察所以一得失血證群皆畏死由其一經失血死者甚多不知非死於病實死於瀉火之涼藥耳然則涼藥其可廢乎非即謂涼藥之可廢但失血之人正氣實者少也正氣一衰陰邪上逆十居八九邪火所致十僅一二不可不慎豫有見於今之失血家群皆喜服清涼而惡辛溫每每致死豈不痛惜豫故為當服辛溫者決其從違焉不觀天之日月猶人身之氣血乎晝則日行於上而月伏於下夜則月行於上而日伏於下人身氣血同然失血之人血行於上而氣伏不升可知欲求血之伏於下是必待氣之升於上氣升於上血猶有不伏者乎知得此中消息則辛溫扶陽之藥實為治血之藥也又可怪者人人身中本此氣血二物氣為陽法天火也血為陰法地水也故曰人非水火不生活水火二字指先天先地真氣非凡世之水火也愚夫愚婦固説不知而讀書明理之士亦豈不曉明知血之為水水既旺極而上逆何得更以滋水之品以助之此其中亦有故故者何惑於血色之紅也不知血從火里化生出來經火鍛鍊故有色赤之象豈得以色紅而即謂之火即宜服涼藥乎此處便是錯誤關頭毒流有年牢不可破豫不憚煩又從而言之願與後之來者作一臂力焉幸甚附七絶一首吐血都傳止血方生軍六味作主張甘寒一派稱良法並未逢人用附薑薑附陽也血陰也以陽治陰即益火之源以消陰翳血水如潮本陽虧陽衰陰盛敢僭為陰盛即君弱臣強夫弱妻強的章本人若識得升降意陽主升陰主降乃是定理今陰升而陽不升更以陰藥助之陰愈升而陽愈降不死何待宜苦宜辛二法持宜苦者十僅一二宜辛者十居八九益火之源以消陰翳辨解前賢云益火之源以消陰翳陽八味是也此方此語相傳已久市醫莫不奉為準繩未有幾個窺透破綻豫不能無疑也疑者何疑方藥之不與命名相符既云益火之源以消陰翳必是在扶助坎中一點真氣上説真氣一衰群陰四起故曰陰翳真氣一旺陰邪即滅故曰益火方中桂附二物力能扶坎中真陽用此便合聖經何得又用熟地棗皮之滋陰陰邪既盛就不該用此丹皮之瀉火益火而反瀉火實屬不通山藥茯苓澤瀉之甘淡養陰則利水乎推其意也以為桂附之辛熱屬火降少升多不能直趨於下故藉此熟地棗皮沉重收斂之品而使其趨下又以丹皮之苦寒助之更以苓澤利水使陰邪由下而出眉批孰知五味下喉其氣味立刻周遍呼吸立刻上下交通何待此似為有理獨不思仲景治少陰病四肢厥逆腹痛囊縮爪黑唇青大汗淋漓滿身全是陰翳何不重用此熟地棗皮丹皮苓澤之品而獨重用薑附草三味起死回生其功迅速由此觀之仲景之白通四逆實益火之源以消陰翳者也若此方而云益火消陰斷乎不可豫非固為好辨此是淆亂聖經之言毒流已久禍延已深不得不急為剪除也壯水之主以制陽光辨解前賢云壯水之主以制陽光六味丸是也此方此説相傳有年舉世宗之而不疑群醫用之而不辨豫不能無説也竊思此方必是為邪火傷陰立説並不是言坎中陽旺立説今人動云陰虛火旺陰虛便説是腎水虛通身血水皆屬腎言腎虛亦可火旺便説是腎火旺通身之氣皆本腎中一點真火生來即云腎火旺亦可但有邪正不可混淆統以六味丸治之其矇蔽有年矣豫特辨而明之陰者水也陽者火也水火互為其根合而為一不可分為二也水從火里生來故曰天一生水先天真氣號曰真火真氣即真精所化陽旺一分指真氣陰即旺一分指真陰陽衰一分陰即衰一分試問陰虛火旺何來眉批陰陽一氣耳豈有陽虛而陰不虛陰虛而陽不虛者乎千古疑團一語道破仲景一生全在邪正上論偏盛今人在一氣上論偏盛相隔天淵源頭錯亂今得此説方知前人之錯誤不少所謂制陽光者明是教人瀉邪火也邪火始能傷陰真火實能生陰此邪正關鍵用藥攸分區處豈堪混淆莫辨要知邪火竊發無論在於何處皆能傷血即以三黃白虎承氣與此六味丸按定輕重治之皆是的對妙法今人不明陰陽一氣不明邪正機關專以此方滋腎中之元陰瀉腎中之元陽實屬不通申明陰盛扶陽陽盛扶陰的確宗旨萬古一陰陽耳陰盛者扶陽為急陽盛者扶陰為先此二語實治病金針救生寶筏惜乎人之不得其要耳今人動以水火二字喻天平水火不可偏盛偏盛則為病豫謂不然人自乾坤立命以來二氣合為一氣充塞周身上下四旁毫無偏倚火盛則水盛此火指真火水指真陰言火盛水盛者即五六月之雨水可知火衰則水衰即十冬月雨水可知此正氣自然之道不作病論亦無待於扶所謂偏盛者何偏於陰者宜扶陽是言陰邪之盛不是言腎中之真陰偏盛也偏於陽者宜扶陰是言邪火之盛不是言腎中之真陰偏盛也前賢立陽八味六味丸以言治元陰元陽之方此説一倡俱言真陰真陽之果有偏盛也此語害世非淺今人又不讀聖經無怪乎六味八味之盛行而承氣四逆之莫講也邪正論凡天地之道有陰即有陽有盈即有虛有真即有偽有邪即有正試問邪正之道若何邪也者陰陽中不正之氣也眉批不正之氣四時皆有六經分為六氣不正之氣流行於中故曰六客不正之氣傷於物則物病傷於人則人病治之調之皆有其道欲得其道必明其正正也者陰陽太和之氣也眉批太和者真陰真陽渾然一氣氤氳化育之消息也太和之氣彌綸六合萬物皆榮人身太和充溢百體安舒太和之氣有虧鬼魅叢生災異疊見諸疾蜂起矣天地之大生化消長不能全其太和人生逐利逐名亦不能全其固有正日衰則邪日盛欲復其正必治其邪邪有陰邪客邪在臟或在裡之謂也陽邪之名言客邪在表在腑之謂也眉批風寒暑濕燥火六氣乃是六經的本氣六氣中不正之氣方是客氣邪正原有分別無奈今人含含糊糊而不察也正有外傷言六節之客邪由外入內也內傷之別言七情之客邪由內而出外也正自外傷邪自外入衛外之正氣衰外來之客邪作正自內傷邪自內出或勞神損心陽飲食傷脾陽房勞損腎陽皆是內傷根柢從陰從陽邪之變化無方邪由外入或從風化從燥化從熱化從濕化從寒化隨邪變遷原無定向內傷不然或損於脾或損於胃或損於肝或損於心或損於腎病情有定向用藥有攸分曰臟曰腑邪之居處各異邪居氣分表分呼為陽邪陽火也陽旺極則凡血傷凡血傷則真陰真氣亦與之俱傷皆能令人死仲景立白虎承氣早已為陽邪備法也邪居血分里分呼為陰邪陰水也陰旺極則凡氣傷凡氣傷則真陽真陰亦與之俱傷皆能令人死仲景立白通四逆早已為陰邪備法矣今人以偏盛歸於元陰元陽是不知邪正之有區分雖醫書萬種其立正立言皆是祛邪扶正知祛邪扶正則知偏盛屬客邪之盛衰非元陰元陽之自能偏盛也仲景垂方本祛邪以輔正六經畫界誠調燮之旨歸有餘言氣分之邪旺不足言血分之陰邪旺而正衰也陽旺是正衰陽不足亦是正衰都是邪蹤陽陰偏盛俱非正體真陰真陽原無偏盛之理元陰元陽今人之偏盛有茲世人知水火之有偏盛而不知是客邪傷正之為偏盛也同盛同衰一元之旨歸不謬二氣渾為一氣不可分為二道看故同盛同衰一定不易論天道則日月有盈虛論人身則秉賦有強弱究竟循環盛衰之理不作病看舉世藉為口實真乃功力未深茲特反復推詳願後之來者相參砥礪恐未道及根株處尚祈再加潤色客問參耆歸地辨論客有疑而問曰豫觀先生之方鮮用參耆歸地夫參耆歸地補氣補血之藥也先生何用之罕歟曰大哉問也豫以參耆歸地為補藥豫謂仲景一百一十三方皆補藥也豈僅參耆歸地已哉何子之不察耶曰先生欺豫哉豫亦嘗觀本草矣知麻黃桂枝主發散也澤瀉豬苓主利水也柴胡黃芩主和解也甘草乾薑主溫中也附子吳萸主回陽也黃連阿膠主養陰也各方各品各有功用先生皆謂之補藥毋乃欺人太甚耶曰豫以豫為欺子也豫實非欺子也請少坐豫實告子夫人身受生以來本父母真氣渾合化育成象成形五官百骸具備全賴這一團真氣充周真氣無傷外邪不入內邪不作何待於藥何待於補況這團真氣也非草木靈根所能補得出來醫聖仲景立方立法揭出三陽三陰是明真氣充周運行之道如邪傷太陽則以太陽之方治之太陽邪去則太陽之氣復邪傷陽明少陽及三陰即從陽明少陽三陰之方治之邪立去則正立復正復神安其病立去即是平人豫故曰一百一十三方皆補藥也以此而推豫欺子乎豫未欺子乎曰誠如先生所言則參耆歸地可以無用也曰亦何可廢哉如白虎湯則人參可用矣建中湯則黃耆可用矣四逆散則當歸可用矣炙甘草湯則地黃可用矣仲景亦何常棄而不用獨可怪者衆人謂人參補氣夫氣陽也火也何仲景不用參於四逆湯內以回陽而卻用參於白虎湯內以瀉火豈有陽明邪火正盛人參又是補火茲胡不更助其火而反瀉其火乎究其由來皆是惑於李時珍之本草有能回元氣於無何有之鄉此話一出參即盛行眉批細查李時珍云人參能回元氣於無何有之鄉這一句話不為無理當是為亢龍有悔真陰將盡之際説法庶與仲景用人參白虎湯之意混合今人不識此語而於陽虛陰盛之人一概用之以翼回陽百治百死景嶽不明此語而曰陽虛倍人參陰虛倍熟地後世宗之咸為定論究竟貽害千古諸公察之切不可為之惑況神農本草經皆云人參主補五臟是五臟屬陰人參補陰其非補陽也明甚一切調和之藥皆不究也如無人參以高麗參代之高麗參來路遠而價又且貴虛勞之人有參在家便有幾分足恃誰知竟不可恃也全不思仲景為醫林之孔子所立之方所垂之法所用之藥專意在祛邪以輔正不聞邪去之後另有補藥此皆後人之不明姑惜已身之太過日月積纍釀出別證以致死證以致死亡尚不覺悟良可哀也今與諸公約病無論乎男女老幼藥無論乎平常奇異價貴價廉只求先生認得陰陽用得恰當則盡善矣何必多求分脾腎為先後二天解聖經云知所先後則近道矣眉批聖人以大道示人欲人知明善復初故曰知所先後則近道矣先者何人身立命之祖氣也祖氣即父母真氣渾而為一者也性命由此立後者何人身血肉軀殼也凡世上一切有形之質皆屬後天不獨人身故道家稱為臭皮囊今人以腎為先天脾為後天此二語舉世宗之傳為定論豫竊謂不然夫人自乾坤顛倒化育以來先天即乾坤乾破為離坤孕為坎故曰顛倒乾坤化作身即此先天純粹之精升於人身渾然一氣是言父精母血中之真氣合而為一即太極真體先天祖氣根源今人不知此中消息妄以兩腎形似太極即以腎為先天此是混淆聖經之言理應急正但先天真氣化生真水灌溉周身腎配水臟雖説有理究竟不是腰中兩腎之謂眉批腎配水皆是喻言流行六合六合即周身上下四旁也即三陽三陰旨歸也一氣充周無方不在故曰水無一臟不潤火無一臟不燒水何常獨在兩腎況兩腎有形有質皆先天所生如何説他是先天知其要者便知得此身無處非先天亦無處非後天先與後又渾然一太極也包羅三界三界即天地水上元中元下元是也人身分為三焦上焦中焦下焦是也發育萬物萬物皆一氣所生根於呼吸呼則為闢陽之用也吸則為闔陰之用也故易曰闔戶為之坤闢戶為之乾混元破體水火即在此區分世人欲復先天一元之真氣即在此處下手可也毋他求號曰宥密這一點真竅乃真氣立極之所萬物發育之處古聖每每祕而不宣故稱之曰宥密又曰元門又曰天根月窟又曰黃庭黃中更喻無數名目人能知此接命延年先天也先天一氣造成五官百骸後天也先天一氣即寓於中先天為體先有這一團真氣而後始有人身後天為用先天無為無臭無聲後天有為有形有質不易定理先天立命自二五凝聚人之性命已立後天成形形合乎命命合乎形神宰乎中性命乃成合之則生真氣與軀殼合一也散之則亡真氣亡於軀殼之外也脾呼後天今人所云今人不知周身軀殼皆屬後天而獨曰脾為後推斯意也以為人之奉生而不死者以其賴有飲食也飲食下喉一刻即入胃脾人七日不食則死故以脾胃為後天試問飲食入脾是自己能化汁以養生還是要真氣運動不要真氣運動真氣運動還是隻養脾胃還是能養周身知運動所養在周身可知後天非僅在脾胃也豫故曰先天立命後天成形形命合一先後稱名眉批先天先地二物渾為一氣無多無少不倚不偏故曰中立極在中易曰黃中通理又曰美在其中書曰允執厥中以脾為中借喻也即以八卦方位論之坤艮為戊已土一在西南角一在東北角而又曰中五寄坤特虛位耳誰知錯誤不足為憑天之功用全在於地地生萬物故曰土為萬物之母人身軀殼包藏百脈臟腑經絡骨節不易乎地故曰脾為後天是脾也豫以為皮字之皮非脾字之脾也惟此皮乃能包藏萬象統束氣血若脾字之脾乃僅一臟也何能包藏萬有或曰是脾也古人配之中央取其運化精微而灌溉四旁不得謂脾字全非豫曰人之運動全在先天一團真氣鼓動耳飲食雖入於脾胃非真氣鼓動不能腐熱水穀真氣鼓動則一切飲食立刻消溶臟腑一身立刻俱受其澤又何嘗是脾之功乎觀於朝食暮吐之病早晨所食菜飯至晚盡行吐出菜飯全然不化稱之曰命門無火由此推之是賴脾乎是賴氣乎古人無非借物寓理借象著名今人不識一氣渾合軀殼之道先後互賴之理認脾為宗其謬已甚學者切不可執定脾腎以論先後當於無形並有質上以求理以言先後可也相傳有年奉為準繩豫今剖晰質之高明是是非非尚祈指陳六客辨解今人動云六淫之氣所傷六淫之氣即風寒暑濕燥火是也豫謂六氣乃是六經之本氣每氣各司六十日以成一歲何得稱之曰客所謂客者是指六氣節中不正之氣也不正之氣在風令中則曰風客在寒令中則曰寒客在暑令中則曰暑客在濕令中則曰濕客在燥令中則曰燥客在火令中則曰火客非指六氣即是六客也邪正之間今人每多混淆豫所以辨而明之更為之進一解曰如邪傷太陽則曰寒客寒邪傳至陽明則曰燥客燥客傳至少陽則曰暑客暑客傳至太陰則曰濕客濕客傳至少陰則曰火客火客傳至厥陰則曰風客此六客乃是論邪從太陽入內氣機流行之謂非節令之謂流行與節令皆宜明辨亦無容辨只消按定仲景六經提綱病情便知客之所處論節令也可論氣機流行也可總之一令之中主病亦有一定不可不知胎前忌服藥品解近來有妊之婦多有忌服藥品如半夏大黃巴豆丑牛檳榔大戟芫花甘遂麝香三稜莪朮附子紅花三七之類稱為墮胎之品凡有胎者切不可服今人死死記著毫不敢易豫以為皆可服也不必忌慮總在看病之若何如病果當服半夏大黃附子一切藥品皆是安胎病不當服即參茸膠桂亦能墮胎奈世人之不講理何豫故為有胎者勸凡婦人有妊三四月即當慎言語節飲食戒房勞皆是保生之道設或有病外感須按定六經提綱不必問乎藥品內傷認定陽虛陰虛亦不必問乎藥品飲食氣滯仍當推蕩亦不必問乎藥品總之邪去則正復即是安胎何今人之不察病情而只計忌服藥品此皆醫方捷徑一家之私言未明變化神而明之之道也學者切切不可為藥所惑而釀成死亡之候病家更要明白醫家亦不可大意還有一等妊婦專意墮胎竟不能墮從可識也眉批難道不去覓些三七麝香一切破血之藥乎食氣篇夫人之所以奉生而不死者惟賴有此先天一點真氣耳真氣在一日人即活一日真氣立刻亡人亦立刻亡故曰人活一口氣氣即陽也火也又曰人非此火不生此火一存凡後天一切食物下喉一刻立刻煅煉食物之真氣皆稟諸先天先地之真氣與人身之真氣本同一氣也借食物之真氣以輔人身之真氣故人得食則生不得食則死所以飲食健旺之人肌肉豐隆精神倍加由其盜得天地生物之真氣獨厚也今人只知飲酒食肉以養生誰知還是天地之真氣日日在灌溉呼吸不住在充周也人不能保全身內之真氣則疾病叢生疾病者何邪為之也邪氣之來無論內邪外邪皆是阻隔天地之真氣不與人身之真氣相合身即不安故曰病必待邪去而天地之真氣與人身之真氣仍舊貫通合一始言無病故曰聖出而立法垂方祛邪為急明人身臟腑之由來五行分布陰陽充周天人一氣之道借草木之真氣以勝邪邪居在上上字又作表字看則以能制在上之邪之品以攻之邪去自然正復推之在中在下在內在外在臟在腑在經在絡藥品皆有定主內含生化之機調燮之妙總在學者留心討理明陰陽消長之變化達順逆吉凶之趨向便知得天地即我身我身即萬物之身萬物我身天地原本一氣也服食與服藥皆保生之要也一氣分為六氣圖説今以一圈分為六層是將一元真氣分為六氣六氣即六經也氣機自下而上自內而外真氣充滿周身布護一定不易外邪入內先犯外之第一層第一層乃太陽寒水氣化出路故畏風惡寒法宜宣散治之不當邪不即去漸至第二層二層乃陽明所主陽明主燥外邪至此化為燥邪故惡熱法宜清涼不可妄用溫燥治之不當邪不即去漸至第三層三層乃少陽所主居半表半裡之間法宜和解治之不當邪不即去漸至第四層四層乃太陰所主太陰主濕邪與濕合化成濕邪濕多成瀉故吐瀉病居多法宜溫中治之不當邪不即去漸至第五層五層乃少陰所主少陰有兩法一邪從少陰心火為病則火症居多法宜清潤一邪從少陰腎水為病則陰寒為重法宜溫經散寒治之不當邪不即去漸至第六層六層乃厥陰所主厥陰有兩法一邪從風化為病風為陽邪故曰熱深厥深下攻而便膿血上攻而為喉痹法宜養陰清熱一從陰化為病多見爪甲青黑腹痛法宜回陽仲景分配六經標出六經提綱病情為認邪之法又立出六經主方為治邪之法其間隨邪變化亦難盡舉學者細讀三百九十七法一百一十三方便得步步規矩之道茲再將六經主方圓通活潑之妙略言一二庶學者不執於方明理為要則得矣風為陽邪善動從毛竅而入風動於中血液不藏毛竅疏而不實故見自汗出惡風桂枝湯圓通應用法按桂枝湯一方乃調和陰陽徹上徹下能內能外之方非僅治仲景原文所論病條而已想仲景立法之日當是邪在太陽衛分時説法就未言及別證皆可以用得今人不明聖意死守陳法不敢變通由其不識陰陽之妙變化之機也豫亦粗知醫常於臨症時多用此方應手輒效因思仲景之方原不僅治傷風證凡屬太陽經地面之病皆可用得茲特將經驗病形略舉一二於左以便參究一治胸腹痛背亦徹痛者蓋太陽之氣由下而上至胸腹寒邪逆於太陽則氣機不暢故胸腹痛而背亦徹痛太陽行身之背因腹中之氣不暢而背亦受之故桂枝湯治之而愈一治通身寒冷寒為太陽之本氣今見通體惡寒是邪犯太陽之本氣也桂枝湯能扶太陽之氣故治之而愈一治小兒角弓反張手足抽掣太陽行身之背因風中於背太陽之經氣不舒經氣卒閉故見角弓反張桂枝湯力能宣太陽之風邪故治之而愈一治腦後生瘡腦後者太陽經脈之所貫注者也風寒之邪逆於腦後抑鬱而成瘡桂枝湯宣散太陽之邪故治之而愈一治周身皮膚作癢時而惡風周身毛竅乃太陽寒水氣化出路風寒之邪外干而不得入逆於皮膚抑鬱生熱故周身作癢桂枝湯能宣太陽抑鬱之氣故治之而愈一治足跟痛痛徹腰股足跟與腰背皆太陽經循行之道因寒客之邪閉之故見以上病形桂枝湯力能輸太陽之氣故治之而愈一治小兒兩腮腫發熱惡風夫兩腮近耳下乃少陽陽明地面似不可與桂枝湯今竟以此方治之而愈者因其發熱惡風知太陽之邪逆於此也一治小兒發熱痘出蓋痘本胎毒欲出於外必得太陽真氣鼓動方能引痘外出桂枝湯扶助太陽之氣氣伸而毒盡越於外不遺於內故此方又能治痘也一治婦人妊娠惡阻婦人初妊經氣卒然不舒營衛之氣不暢故見惡阻桂枝湯能宣營衛協和陰陽故治之而愈一治發熱惡風下痢日數十次風邪犯於太陽則表氣不通表氣不通則裡氣不順邪陷於下故見下痢桂枝湯宣風外出表氣順則太陽之氣升而不陷故痢可愈按此方傷寒門尚有數症可用至於加減變通實多奇異仲景已言之矣學者細讀仲景傷寒書明其理而通其變則得活潑之妙內外兼備之道也寒為陰邪從毛竅而入寒主靜而不動毛竅密而不疏故見無汗惡寒邪不傳經而傳腑故見口渴小便不利五苓散功專利水水道利則太陽氣舒邪亦從此而解桂麻二方是祛邪從上出者也五苓散是祛邪從下出者惟此三方可稱太陽首尾專主之方也麻黃湯五苓散圓通應用法一治痘初出而忽隱壯熱無汗者蓋痘之初出全借太陽一點真氣鼓動運毒外出今壯熱而痘忽隱是因其感受外寒閉束氣機抑鬱生熱麻黃湯能開腠理祛寒外出邪去則正安痘自外出而人自平安若壯熱太甚煩躁飲冷者又可於方內加石膏一治肩背沉重覺內冷者蓋肩背之沉重寒之滯也寒滯於內故覺內冷麻黃湯輕清屬陽力能祛寒外出肩背正屬太陽所主故治之而愈一治兩腳彎發起紅塊痛甚腳彎地面乃太陽經循行之道今為寒邪閉束阻其氣機遏鬱而起紅塊痛甚麻黃湯力能散太陽之寒故治之而愈一治大便瀉水而小便全無者此病夏月居多由暑邪拂鬱擾亂正氣以致闌門失職津液不行於膀胱而直趨大腸五苓散力能化膀胱之氣故治之而愈一治頭暈咳嗽嘔吐腹脹小便短病形雖現頭暈咳嗽嘔吐總緣膀胱氣化不運水濕之氣不得下降氣機必返於上上干清道故現以上病形五苓散功專利水水氣下降氣機自順故病自愈一治霍亂吐瀉思飲冷水者此病上吐下瀉理應著重太陰其所以用五苓者蓋以吐瀉之病無小便也又見渴而思水正是太陽腑症提綱故五苓為要藥其所以致吐瀉者皆由太陽氣化失運中宮失職此刻先治太陽然後理中庶為正治亦經權之道也二方傷寒門尚有數症當用至於加減變通仲景言之甚詳茲不贅蓋太陽主開陽明主闔今陽明為太陽之邪所逼不從本經之闔而從太陽之開開於下故下利也葛根湯圓通應用法一治周身發熱發現斑點嘔吐夫周身肌肉皆屬陽明陽明主發熱不惡寒今為外邪抑鬱壅於陽明故發熱而現斑嘔吐者皆邪毒上壅外出之故葛根湯力能祛邪外出隨其邪之所向而祛之故愈一治兩眼皮紅腫痛甚眼皮上下皆陽明所主今為風熱所閉抑鬱而為紅腫痛甚葛根湯力能解陽明風熱故治之而愈一治兩乳紅腫發熱兩乳地面乃陽明所主今外感之邪伏於兩乳間故見紅腫痛甚葛根湯專祛陽明之邪治之故愈一治小兒痘初現點夫痘毒自內出外既在現點此刻毒邪盡在肌肉之間肌肉屬陽明葛根湯力能宣通肌肉之邪不使痘毒遺留於內發透為佳然後另行養漿之法若已發透即不可用此此方功用頗多加減法亦多仲景傷寒書言之甚詳茲不復贅此方本列於太陽篇中而又曰治陽明腑症者蓋以太陽之邪服桂枝湯大發汗表邪既解而陽明之血液已傷陽明乃氣多血多之腑今血液驟傷陽明之內熱立作若不急用白虎以清熱人參以養血液邪火益盛即有不可撲滅之勢故白虎又是陽明之腑方也白虎湯圓通應用法一治上消證夫上消者渴而多飲也由邪火在胃血液大傷血為陰陰傷而引水以救者陰與陰相親也白虎湯力能滅火以存陰故治之而愈一治心下一寸間發生瘡疾紅腫痛甚按心下一寸乃胃之上口也因邪熱結於胃之上口間故發生瘡疾白虎湯專清胃熱故治之而愈一治牙齦紅腫痛甚飲冷夫牙齦乃陽明所主今胃火聚於上故見紅腫痛甚又見飲冷知其邪火傷陰白虎湯力能清胃之熱故治之而愈一治兩乳紅腫痛甚兩乳乃陽明脈過之所今見紅腫痛甚是胃中之邪熱壅滯所致也白虎湯專清胃熱熱邪去而腫自消故治之而愈一治譫語遺尿口不仁而面垢三陽並病譫語者邪熱入於陽明之府也遺尿者邪熱合於太陽之府也口不仁而面垢者邪熱合於少陽之腑也白虎湯力能清熱一熱清而三病立解故治之而愈此方功用頗多加減變通亦多傷寒書言之甚詳其中尚有背惡寒一證亦用之學者當辨而明之陽明裡症用藥圖凡用此方必須審察的確總要知道胃家實三字提綱何謂胃家實如大小便不通是也大便硬腹滿是也狂妄奔走叫罵不避親疏是也潮熱譫語是也種種不一務宜斟酌不可猛浪大承氣湯圓通應用法一治咳嗽聲如洪鐘夫咳嗽之病似不可以與此方其所以必用此方者誠以咳嗽聲洪乃邪火旺極之徵火刑于肺若不亟用此方以撲滅其火肺有立壞之勢故不得不用之也一治食入即吐夫食入而出亦非可下之候其所以可下者蓋以吐則為逆非寒即火今食入而出是胃中之火逆行於上其食故不得下降也但寒與火雖辨明方可用此一治頭暈人昏亂無主三五日一發夫頭暈之症原非應下之候其所以應下者蓋以陰血虛極不能制其亢龍龍奔於上則濁火亂其神明故昏昏無主大承氣湯力能制其亢尤故治之而愈此方吳又可溫疫論條中可用此方有三十餘症傷寒陽明本篇可用六七症少陰篇急下可用有三症茲不備舉學者務宜熟讀仲景傷寒書便得圓通應用變化之道切不可死守原文當以明理為要此方雖名為少陽方究竟總是太陽經所感受的這一點邪氣種子不能從胸出去逆於胸脅之間阻其少陽升降之機故少陽之經症作其方治少陽實是治太陽也小柴胡湯圓通應用法一治兩脅脹痛夫兩脅乃少陽所主今見脹痛是少陽之氣抑鬱不舒也柴胡湯力能舒少陽之氣故治之而愈一治頭響兩側脹夫頭之兩側乃少陽所主今見脹而響是少陽之火浮於上也柴胡湯力能治少陽之經倍黃芩力能清少陽之火故治之而愈一治兩耳紅腫痛甚夫兩耳前後俱屬少陽所主今見紅腫痛甚是風熱之邪聚於少陽也柴胡湯力能治少陽之風熱故治之而愈一治瘧疾夫瘧之為病多緣外邪伏於少陽不能從轉輸而出少陽居半表半裡邪欲從陽明而出則熱欲從太陰而入則寒諸書云瘧不離少陽皆是明少陽之經氣不舒轉樞失職邪故伏而不去小柴胡湯力能伸少陽之氣少陽之氣伸轉樞復運邪自從此而出病自愈而人自安也一治吐酸不食夫不食而吐之症屬於太陰理宜溫中健脾今見不食吐酸明是木氣不舒上克脾上土畏木克故不食酸屬木乃是稟少陽熱氣所化土木相凌故見以上症形小柴胡力能舒少陽之氣少陽之氣舒即不剋制脾土兩經之氣平而病自不作矣一治婦女熱入血室譫語夫肝乃藏血之所肝與膽相為表裡膽移熱於肝熱入血室故見譫語柴胡湯力能治肝膽邪熱故治之而愈按此方功用頗多加減變化亦無窮傷寒書言之甚詳茲不贅太陰經用藥圖太陰篇內有桂枝加芍藥湯桂枝加大黃湯皆是太陽誤治邪陷於太陰而設不得謂為太陰主方學者須知理中湯圓通應用法一治吐血夫吐血之症多由中州失運陰血遂不歸經瘀滯閉塞清道以致清陽不升陰血僭上便成血逆理中湯力能調中州之氣中州健運血自歸經其病自已一治四肢浮腫夫四肢屬土土虛則元氣發泄不能潛藏故見四肢浮腫理中湯力能溫暖脾胃脾胃有權元氣不致漫散故治之而愈一治心下嘈雜吐水夫心下一寸乃胃之上口胃主納而脾主運脾氣衰而不運津液上逆於胃口以致心氣不寧故嘈雜吐水即是明驗理中湯力能溫暖中宮脾土健運水氣下行嘈雜吐水自已一治咳嗽吐清水夫咳唾之病屬於肺經理應從肺求治今獨用理中者原由中州失運水聚於上肺氣欲下降而不能故咳唾清水理中湯力能健脾脾土健而水濕下趨肺氣降而咳唾自已一治唾水不休夫唾水之病多屬胃冷理中湯能溫暖中宮土暖而水濕自消唾病立愈一治厄逆不休夫厄逆之病原有寒熱之分果屬胃寒而厄逆不休理中湯能溫中中寒去而厄逆自已一治手足微冷少神夫四肢逆冷之症原有四逆之法此乃微冷少神明系中州氣衰不能充周四肢理中湯大能溫暖中宮中州氣旺肢冷自愈按此方功用最多加減變通更多姑舉數條以便學者參悟按少陰乃水火交會之地元氣之根人身立命之主也病至此際是元氣衰極剝至於根仲景立四逆究竟是專為救這點元氣説法主方又云治三陰厥逆可知這一點元氣徹上徹下包羅天地此方不獨專為少陰立法而上中下三部之法俱備知得此理便知得薑附之功也今人不知立極之要不知薑附之功故不敢用也非不敢用也不明也麻黃附子細辛湯四逆湯圓通應用法一治忿嚏不已夫嚏之為病多緣少陰受寒麻黃附子細辛湯力能祛少陰之寒故治之而愈蓋腎絡通於鼻嚏屬腎故知病在少陰也一治腰痛難於轉側夫腰痛之症原有數端今見轉側難者明是腎藏不溫陰寒滯於內也麻黃附子細辛湯力能溫經散寒故治之而愈一治周身皮膚浮腫內冷身重夫周身浮腫內冷身重者蓋以先天之陽衰於內寒濕之邪即生於內故見身重內冷寒濕太盛則真氣不藏散於周身無陽以運化故又見浮腫麻辛附子湯力能溫腎扶陽祛陰逐寒故治之而愈一治頭腦冷夫腦為元神之府清陽聚會之處如何得冷其所以致冷者由命門火衰真氣不能上充四逆湯力能扶先天真陽真陽旺而氣自上充故治之而愈一治氣喘痰鳴夫氣喘之症舉世皆謂肺寒不知先天這一點真氣衰即不能鎮納濁陰之氣陰氣上騰漸干清道故見痰喘四逆湯力能溫下焦之陽故治之而愈一治耳腫皮色如常夫耳腫之症每多肝膽風火今見皮色如常明是陰氣逆於上也四逆湯力能扶陽祛陰治之故愈一治舌黑唇焦不渴少神夫舌黑唇焦之症多因陽明胃火而作果系陽明胃火必現煩躁口渴飲冷二便閉塞等情此則舌黑唇焦其人並不口渴卻又少神明是真陽衰極不能薰騰津液於上當知陽氣縮一分肌肉即枯一分此舌黑唇焦所由來也四逆湯力能回先天之陽陽氣一回津液復升焦枯立潤故治之而愈一治喉痛畏寒腳冷按喉痛一症原非一端此則畏寒腳冷明是少陰受寒逼出真火浮於喉間故喉痛而腳冷四逆湯力能溫少陰之氣逐在裡之寒故治之而愈一治喉痛身大熱面赤目瞑舌冷夫喉痛面赤身熱似是陽症又見目瞑舌冷卻是陰盛隔陽於外之徵四逆湯力能祛逐陰寒迎陽歸舍故治之而愈一治吐血困倦夫吐血一症總緣地氣上騰升降失職人身氣為陽主升血為陰主降今當升者不升不當升者而反升明明陰血太盛上干清道古人云益火之源以消陰翳是教人補火以治水也又云壯水之主以制陽光是教人補水以治火也四逆湯力能補火故治之而愈一治齒縫流血夫齒乃骨之餘本屬腎腎為水臟先天之真陽寄焉以統乎骨分中之血液真陽不足不能統攝血液故見血出四逆湯力能補腎中之陽治之故愈一治朝食暮吐完穀不化夫飲食入胃固以胃為主然運化之機全在先天命門這一點真火始能運化真火一衰即不能腐熟谷水而成完穀不化朝食暮吐者暮為陰盛之候陰氣上僭心肺之陽不能鎮納故聽其吐出也四逆湯力能補命門真火故治之而愈一治足心夜發熱如焚不渴尿多夫足心發熱如焚人皆謂陰之虛也夫陰虛由於火旺火旺之人尿必短赤口必飲冷理勢然也今則不渴而尿多明是下焦無陽不能統束腎氣以致陰火沸騰故見足心發熱如焚也四逆湯力能補火火旺即能統束群陰故治之而愈此病豫親身患過並治好多人此法即是丙奪丁光之義也知得丙奪丁光便知得陽衰不能鎮陰的旨歸也一治面赤發熱汗出抽掣夫面赤發熱汗出抽掣近似中風其實不是務必仔細斟酌如其人本體有陰象足徵即不可當作風熱須知面赤發熱者陽越於外也汗出抽掣者陽亡於外不能支持四維也四逆湯力能回陽陽回則諸症自已一治大便下血氣短少神夫大便下血固有虛實之分此則氣短少神必是下焦之陽不足不能統攝血液四逆湯力能扶下焦之陽陽旺則開闔有節故治之而愈一治頭搖面白少神夫頭搖之症人皆目之為風而豫於此症察其人面白少神知其為清陽不升元氣虛極不能鎮定也四逆湯力能扶陽真陽一旺即能鎮定上下四旁故治之而愈一治背冷目瞑夫背為陽中之陽不宜寒冷今又背冷而目瞑明是先天真陽衰極陰寒內生陰盛則陽微故目瞑而背冷也四逆湯力能扶先天真陽故治之而愈一治舌腫硬而青夫舌腫一症似乎心火旺極不知舌腫而青此乃陰寒太盛逼出真火欲從舌尖而出故見腫硬青滑四逆湯力能補火祛逐陰寒故治之而愈一治唇腫而赤不渴夫唇腫之症近似胃火胃火之腫口必大渴今見病人唇腫而口並不渴可知陰火出於脾間四逆湯功專補陽陽旺則陰火自消故治之而愈一治鼻涕如注面白少神夫鼻涕一症原有外感內傷之別此則面白無神明是真陽衰於上不能統攝在上之津液四逆湯力能扶坎中真陽陽旺自能統納故治之而愈一治尿多夫尿之多由於下焦之火弱不能收束故也惟四逆湯力能補下焦之火故治之而愈一治周身發起包塊皮色如常夫周身發起包塊疑似風熱陽邪此則皮色如常卻是陰邪僭居陽位四逆湯力能扶陽陽旺則陰邪自伏故治之而愈一治周身忽現紅片如雲不熱不渴夫周身發現紅雲人孰不謂風火鬱熱於皮膚夫風火鬱熱之症未有不發熱而即作者亦未有口不渴而即謂之火者此處便是認症機關豫每於此症認作陽衰陰居陽位以四逆湯治之而愈一治發熱譫語無神不渴夫發熱譫語世人皆謂熱伏於心神無所主也不知陽症熱伏於心精神不衰口渴冷飲小便亦必短赤此則無神不渴明是真陽衰極眉批在無神二字上定案發熱者陽越於外也譫語者陰邪乘於心神無所主也不渴無神非邪火也四逆湯力能回陽陽回則神安故治之而愈一治兩目白睛青色夫白輪屬肺金也今見純青曰無白色是金氣衰而肝木乘之也妻乘於夫是乾剛不振純陰無陽之候眉批坎中一點真金即真陽也人活的即此多在死例四逆湯力扶坎中之金金氣一旺目睛自然轉變故治之而愈一治兩目赤霧縷縷微脹不痛夫目窠乃五臟精華所聚之地原著不得一毫客氣今見赤霧縷縷疑是陽火為殃不知陽邪痛甚脹甚此則微脹不痛明是陽衰於上不能鎮納下焦濁陰之氣地氣上騰故見此等目疾四逆湯力能扶陽祛寒陽光一照陰火自滅故治之而愈按此方功用頗多得其要者一方可治數百種病因病加減其功用更為無窮豫每用此方救好多人人咸目豫為薑附先生不知豫非專用薑附者也只因病當服此難道豫不會寫幾個參地歸芍芩連梔柏之方乎只因世風日下不究病之陰陽專究方藥之平穩不知水懦弱民狎而玩之多死焉火猛烈民望而畏之鮮死焉總之水能生人亦能死人火能生人亦能死人豫非愛薑附惡歸地功夫全在陰陽上打算耳學者苟能洞達陰陽之理自然頭頭是道又奚疑薑附之不可用哉按厥陰為陰經陰極則生陽故多寒熱錯雜又肝主宗筋玉莖人性多思淫心火一動玉莖必舉發泄不遂多生邪熱亦多見寒熱錯雜此受病之源人多不察仲景立烏梅丸寒熱並投大有灼見並非專為蟲立法凡厥陰一切症候莫不備具舒馳遠先生謂此方不是未免執一烏梅丸圓通應用法一治巔頂痛夫厥陰之脈會於巔頂今見巔頂痛者是厥陰之邪侵於上也烏梅丸專主厥陰故治之而愈一治睪丸腫痛夫睪丸俗稱為外腎世人多以腎目之不知此乃木之餘氣所生古賢配之卦震木也二陰一陽二睪丸為偶玉莖一為奇奇居腹面丸居背面所配確乎不爽而世人蓋未之細求其理也豫每於此處病多以烏梅丸治之而愈一治腹痛飲冷夫腹痛爪甲青明是厥陰陰寒之氣阻其真陽運行之機邪正相攻故見腹痛既云寒邪何得飲冷必是陰極陽生見此寒熱錯雜烏梅丸寒熱並用故治之而愈按此方功用最多頗難盡舉姑列一二條以備參究其中之精義修園先生言之甚詳學者可熟讀而深思之便得立法立言之意而於厥陰一切症候莫不應手輒效也
