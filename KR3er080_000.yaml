body:
  text: 敘嘗聞各家著作皆有精義獨嫌者大海茫茫無從問津豫亦粗知醫每閒暇必細檢閲隨地隨時窮究天地生人生物盈虛消長這個道理思之日久偶悟得天地一陰陽耳分之為億萬陰陽合之為一陰陽於是以病參究一病有一病之虛實一病有一病之陰陽知此始明仲景之六經還是一經人身之五氣還是一氣三焦還是一焦萬病總是在陰陽之中仲景分配六經亦不過將一氣分布上下左右四旁之意探客邪之伏匿耳舍陰陽外豈另有法哉豫不揣鄙陋採取雜症數十條辨明內外判以陰陽經方時方皆納於內俾學者易於進步有戶可入雖非萬舉萬當亦可為醫林一助云爾同治甲戊季夏月蜀南臨邛鄭壽全欽安撰
