front:
  text: 序余向就刑幕歷膺牛廉訪王爵令楊明府之聘恐久而造孽退樂性余酷嗜醫然不欲行人知邀必赴依仲景六經平脈辨症處方輒去不知其貧富亦無貴賤遷徙恆無定雅不作門市想閒居讀靈素難經心知其意必解出多不成帙任其零星亦無意收束秋得臨邛欽安鄭子醫理真傳一書點讀再過知有所得於性理而涵養者深藉醫為發明耳發於醫則救醫也切救醫切則濟世也宏殆樂善而自好者與神交久之冬乃晤一見如故稱快事焉適醫法圓通又成及門議復鋟欽安謙謙君子出草索摘疵噫無瑕矣何虛心若是耶特以醫關人性命書留傳久遠不得不慎抑又仁慈之心也余粗知醫故知欽安之醫高高必傳傳仲景非傳欽安欽安傳仲景六經之法仲景之六經顯而欽安亦與之俱傳是欽安因傳仲景之六經而傳而欽安之所學先於仲景之六經而有所得者亦賴仲景而共傳由是推之書之傳與不傳恆視其人之學為何如耳余愛欽安之書實愛欽安之學欽安之學漸臻圓通之境故名其書曰圓通因識其圓通慕其圓通爰樂為圓通之評夫著醫法圓通者欽安也而評圓通醫法者為麻城知非敬氏時在清之同治十三年甲戊中秋序於錦城廬山仙館序聞之醫者意也謂以我之意消息病人之氣機審其盈縮相其陰陽定其中外各守其鄉以施攻補證有千變藥亦千變而其收效則如一素問八正神明論曰合人形於陰陽四時虛實之應冥冥之期視之無形嘗之無味故謂冥冥若神倣佛又曰觀於冥冥者言形氣營衛之不形於外而工不知之以日之寒溫月之虛盛四時氣之浮沉參伍相合而調之工常先見之然而不形於外故曰觀於冥冥焉通於無窮者可以傳於後世也是故工之所異也故俱不能見也夫不能見而工常先見之若神倣佛上合昭昭下合冥冥通於無窮傳於後世此之謂圓通至圓者莫如珠醫之意珠是也唯其能圓是以能通所通維何通神明也通造化也夫神明造化乾坤定位主宰者理流行者氣對待者數理氣數三者渾為太極判為兩儀四相成乎八卦三才立而五運分六氣變而四時行百物生而八風動於是乎苛疾起而莫能逃此之謂法法天效地法陰則陽知升知降知潛知浮知迎知拒皆通以意而成為法法即意珠也即智囊也皆性花也然之言也必醫者先得弄丸心法從河圖洛書一順一逆先後八卦能顛能倒默而識之學而不厭有諸己而後能驗諸人以圓通之心法著圓通之醫法豈易哉余於醫道究心有年求其識此意者或寡矣不意友人鄭欽安者有醫法圓通之書焉余回環讀誦見其中如論乾坤論坎離論五行論六步論氣血論水火論外感論內因論陽虛論陰虛總其要曰陰陽而已又曰有餘不足盡之矣又曰人活一口氣皆根柢之談不同泛常之論又非杜撰悉推本於靈素難經及仲景傷寒金匱之義所載各方盡是經方所引時方出不得已非其本懷作之謂聖述之謂賢欽安之書吾無聞然矣非洞明乎一身之氣機圓乎三才之理數而先得醫之意者其能之乎其言又皆數十年來臨症效驗及與二三及門互相質疑辨難所匯而集者精核不移萬舉萬當誠度世之金針醫學之標準也余既珍而寶之復慫恿授梓以公諸世欽安之造福奚有量耶吾知其克昌厥後矣不揣固陋因以頌為序時清之同治十三年蒲節月郫筒沈古齊化三敬題
