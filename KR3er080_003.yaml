body:
  text: 卷三傷寒溯源解仲景為醫林之祖著傷寒一書以開度世津梁揭出三陽三陰包含乾坤二氣之妙後賢始有步趨無奈相沿日久注家日多紛紛聚訟各逞己見捨本逐末已至於今故讀傷寒書者寡矣亦並不知傷寒何所取義也取注傷寒者亦只是照原文敷衍幾句並未道及傷寒宗旨與萬病不出傷寒宗旨教後人何由得入仲景之門豫特直解之夫曰傷寒者邪傷於寒水之經也太陽為三陽三陰之首居於寒水之地其卦為坎陽為陰根坎中一陽即人身立極真種子至尊無二故稱之曰太陽眉批考之即在六合之中卷之即在坎中一點以坎中一點示氣在血中皆喻言也如天之日也太陽從水中而出子時一陽發動真機運行自下而上自內而外散水精之氣於周身無時無刻無息不運行也故經云膀胱者州都之官津液藏焉氣化則能出焉氣化二字乃傷寒書一部的真機要知氣化行於外從皮膚毛竅而出水氣水即陰氣即陽外出是氣上而水亦上也氣化行於內從溺管而出水氣內出是水降而氣亦降也外出者輕清之氣如天之霧露也內出者重濁之氣如溝渠之流水也太陽之氣也無乖一切外邪無由得入太陽之氣偶衰無論何節何候中不正之氣干之一年六氣即風寒暑濕燥火六氣乃是正氣六氣中不正之氣才是客氣六氣每氣司六十日有零一年中三百六十日而一年之事畢循環之理寓矣必先從毛竅而入閉其太陽運行外出之氣機而太陽之經症即作故曰傷寒今人只知冬月為傷寒不知一年三百六十日日日皆有傷寒只要見得是太陽經證的面目即是傷寒也太陽為六經之首初為外邪所侵邪尚未盛正未大衰此際但能按定太陽經施治邪可立去正可立復因近來不按經施治用藥不當邪不即去正氣日衰邪氣日盛勢必漸漸入內故有傳經不傳腑傳腑不傳經二陽並病三陽並病兩感為病漸入厥陰邪苟未罷又復傳至太陽遷延日久變證百出邪盛正衰釀成陰陽脫絶種種危候仲景立三百九十七法一百一十三方以匡其失而輔其正邪在太陽經腑則以太陽經腑之法治之邪在陽明經腑則以陽明經腑之法治之邪在少陽經腑則以少陽經腑之法治之邪在太陰少陰厥陰或從本化或從中化或從標化按定標本中法治之舉傷寒而萬病已具揭六經明六氣而一年節候已該論客邪由外入內剝盡元氣能令人死步步立法扶危為安似與內傷無涉不知外邪入內剝削元氣乃是六經七情由內而戕剝削元氣毋乃非六經乎不過外邪之感有傳經之分七情之傷無經腑之變由外入內因有提綱由內出外亦有考據不過未一一指陳未明明道破總在學者深思而自得之眉批客邪由外入內以升散清解不使入內為要元氣由內出外以溫固而收納不使外出為要只此兩法誠為度世金針豫謂一元真氣即太陽太陽進一步不同又進一步不同退一步不同退兩步又不同移步換形移步更名其中許多旨歸外感內傷皆本此一元有損耳最可鄙者今人云仲景之方是為冬月傷寒立法並非為內傷與雜證立法試問內傷失血肺痿有服甘草乾薑湯而愈者否嘔吐泄瀉有服理中湯而愈者否抑鬱肝氣不舒兩脅脹痛有服小柴胡而愈者否夜夢遺精有服桂枝龍牡湯而愈者否腎臟不溫水泛為痰有服真武湯而愈者否寒濕腰痛有服麻黃附子細辛湯而愈者否少氣懶言困倦嗜臥咳嗽潮熱有服建中湯而愈者否溫病初起有服麻杏石甘湯雞子黃連湯四逆湯而愈者否痢證有服白頭翁湯桃花湯而愈者否腹痛吐瀉霍亂有服理中湯吳茱萸湯而愈者否婦人經期妊娠有服桂枝湯而愈者否痘證初起有服桂枝湯升麻葛根湯而愈者否老人大便艱澀有服麻仁丸而愈者否陽虛大便下血有服四逆湯而愈者否陰虛大便膿血有服雞子黃連湯而愈者否今人不體貼只記時行幾個通套方子某病用某方倍其味某病用某方減某味如此而已究其陰陽至理全然莫曉六經變化罕有得知愈趨愈下不堪問矣附七絶一首傷寒二字立津梁六氣循環妙理藏不是長沙留一線而今焉有作醫郎問曰冬傷於寒春必病溫其故何也夫曰冬傷於寒者傷於太陽寒水氣也冬令乃陽氣潛藏正天一生水之際少年無知不能節欲眉批節欲二字不專指房勞兼一切耗氣之事耗散元精元精即天一元精一耗冬不藏精也不能化生真水即不能剋制燥金之氣故當春之際溫病立作二月屬卯卯酉陽明燥金主事苟能封固嚴密指冬能藏精者元精即能化生真水而燥金自不敢橫行無忌春即不病溫矣此刻辛溫固本之藥未可遽施當從二日傳經之法治之未為不可雖然如此又當細求而清涼之品亦不可妄用病人雖現大熱口渴飲冷譫語又當於脈息聲音之有神無神眉批無神非溫有神乃是飲冷之多寡大便之實與不實小便之利與不利有神者可與麻杏石甘湯無神者可用回陽收納之法治之庶不致人性命也辨溫約言今人於春令偶感外邪發熱身疼口渴飲冷汗出譫語便閉惡熱等情舉世皆云溫病動用達原飲三消飲升解散三黃石膏大小承氣普濟消毒散種種方法豫思此等施治皆是治客邪眉批客邪二字春為風客夏為火客夏為濕客按六氣即候可由太陽而趨至陽明伏而不傳漸入陽明之裡以此等法治之實屬妥貼切切不可言溫但言風邪傷了太陽由太陽趨至陽明風為陽邪合陽明之燥熱化為一團熱邪熱盛則傷陰故現氣實脈實身輕氣粗只宜清涼滋陰攻下等法至於溫病乃冬不藏精根本先壞這點元氣隨木氣發泄病情近似外感粗工不察治以發散清涼十個九死豫業斯道三十餘年今始認得病情形狀與用藥治法一併敘陳病人初得病便覺頭昏周身無力發熱而身不痛口不渴昏昏欲睡舌上無苔滿口津液而舌上青光隱隱即或口渴而卻喜滾即或飲冷而竟一二口即或譫語而人安靜閉目即或欲行走如狂其身輕飄無力即或二便不利倦臥不言不語即或汗出而聲低息短即或面紅而口氣溫和六脈洪大究竟無力即或目赤咽乾全不飲冷大便不實小便自利即服清涼即服攻下即服升解熱總不退神總不清只宜回陽收納方能有濟豫經驗多人一見便知重者非十餘劑不效輕者一二劑可了惜乎世多畏薑附而信任不篤獨不思前賢云甘溫能除大熱即是為元氣外越立法即是為溫病立法今人不分陰陽病情相似處理會一見發熱便云外感便用升解一見發熱不退便用清涼滋陰攻下一見二便不利便去通利把人治死尚不覺悟亦由其學識之未到也茲再將陰虛陽虛病情録數十條以與將來辨認邪盛熱熾血傷病情乾嘔不止病人二三日發熱不退脈息聲音一切有神乾嘔不止者此熱壅於陽明也法宜解肌清熱張目譫語病人四五日發熱惡熱煩躁不寧張目不眠時而妄言脈健者此熱邪氣盛氣主上升故張目不眠譫語頻臨屬邪熱乘心而神昏也法宜清熱熱清而正復張目譫語自已若瞑目譫語脈空無神又當回陽不可養陰口渴飲冷不止病人六七日發熱不退脈洪有力飲冷不止者此邪熱太甚傷及津液也法宜滅火存陰為主大汗如雨病人或六七日發熱汗出如雨脈大有力口臭氣粗聲音洪亮口渴飲冷此乃熱蒸於內胃火旺極也法宜急清肌熱此有餘之候並非久病亡陽可比舌苔干黃煩躁不寧病人或七八日發熱不退舌苔干黃煩躁不寧脈健身輕腸胃已實此胃火太甚津液將枯急宜滋陰攻下為主狂叫不避親疏病人或八九日發熱不退氣粗身輕脈健狂叫目無親疏棄衣奔走此邪火旺極亂其神明神無所主也急宜清涼攻下滅去邪火不可遲延二便不利病人或七八日發熱惡熱煩躁不寧口渴飲冷脈健身輕二便不利此邪熱傷陰血液不能滋潤溝渠通體皆是一團邪火急宜攻下不可遲延鼻如煤煙病人或八九日發熱不退煩躁飲冷胸滿不食口臭氣粗忽現鼻如煤煙此由邪火旺極炎薰於上也急宜攻下肛門似烙病人或十餘日發熱不退脈健氣粗煩躁不寧飲水不已自覺肛門似烙此邪熱下攻於大腸真陰有立亡之勢急宜攻下不可因循姑惜小便涓滴作痛病人或八九日發熱惡熱煩渴飲冷舌黃而芒刺滿口脈健身輕小便涓滴痛者此邪熱下趨小腸結於膀胱也急宜清熱利水食入即吐病人發熱惡熱口臭氣粗脈健食入即吐者此是邪熱伏於胃口阻其下行之機熱主上升此刻邪熱為祟升多降少故食入即吐急宜攻其邪火邪火一滅食自能下矣昏沉不省人事病人或八九日身熱不退氣粗舌乾小便短赤大便極黃而溏或清水血水脈健有力或脈細如絲或四肢厥逆人雖昏沉其口氣極蒸手舌根必紅活即舌黑起刺此是邪熱入里伏於其內急宜攻下清裡切不可妄用辛溫日晡發熱飲冷妄言鬼神病人或八九日十餘日外邪未解入於裡分身雖發熱日晡更甚飲冷不已妄言鬼神此是熱甚傷血神昏無主急宜養血滋陰並非陰火上騰元氣外越可比厄逆不止病人或八九日發熱不退口渴轉增飲水不輟忽見厄逆連聲此由邪熱隔中阻其交通之氣機也法宜攻下鼻血如注病人發熱煩躁二便不利口臭氣粗忽見鼻血如注發熱更甚者此由邪火太甚逼血妄行也法宜清熱攻下苟血出而熱退便通又是解病佳兆斑疹頻發病人發熱不退煩躁不寧飲冷氣粗脈健神健忽發現斑疹此邪熱盡越於外解病之兆急宜隨機而升解之乾咳無痰吐涎膠黏病人七八日發熱不退或熱已退舌上干粗脈健聲洪煩渴飲冷人時恍惚乾咳不已吐涎膠黏此乃火旺津枯熱逼於肺宜潤燥清金瀉火為要喉痛厥逆病人或八九日發熱不退或不身熱脈健身輕口氣極熱小便短赤神氣衰減肌膚干粗忽見喉痛厥逆此邪入厥陰熱深厥深上攻而為喉痹是也急宜清潤瀉火養陰為主膿血下行不止病人或八九日身熱不退或身不熱時而煩渴時而厥逆煩躁不寧此厥陰邪熱下攻於腸也法宜清火養陰為主皮毛乾粗病人或七八日發熱不退或身不熱心煩氣衰小便短而咽中干忽見皮膚干粗毛髮枯稿此邪火傷陰血液失運急宜瀉火養陰為主筋攣拘急病人或七八日或十餘日發熱不退或不身熱煩渴咽乾小便短赤惡熱喜冷忽然四肢拘急不仁此由邪火傷陰血液不榮於筋故見拘急法宜滋陰瀉火為主陰囊如斗病人或十餘日身熱未退或不身熱脈健身輕心煩口渴聲音洪亮忽見陰囊紅腫其大如斗疼痛異常此熱邪下攻宗筋宗筋之脈貫於陰囊急宜瀉火養陰滋肝為主周身紅塊病人身熱脈健煩躁不寧忽現周身紅塊痛癢異常此是邪熱壅於肌肉也宜解肌清熱瀉火為主身冷如冰形如死人病人八九日初發熱口渴飲冷二便不利煩躁譫語忽見身冷如冰形如死人此是熱極內伏陽氣不達於外證似純陰此刻審治不可粗心當於氣口中求之二便處求之豫經驗多人口氣雖微極其蒸手舌根紅而不青小便短赤急宜攻下不可因循姑惜切切不可妄用薑附頭面腫痛病人二三日頭面腫痛此邪熱壅於三陽也急宜宣散清熱為主以上數十條略言其概其中尚有許多火證情形有當用甘寒養陰法者有當用苦寒攻下存陰法者有當用清涼滋陰法者有當用利水育陰法者有當用潤燥救陰法者有當用甘溫回陽救陰法者種種不一全在臨時變通總之正氣生人邪氣死人用養陰等法皆為陽證邪火立説而非為陰氣上騰之陰火立説當知陽證邪火其人脈息聲音一切有神若陰氣上騰之陰火脈息起居一切無神陰象全具此乃認證關鍵不可不知辨認陰盛陽衰及陽脫病情頭痛如劈素稟陽虛之人身無他苦忽然頭痛如劈多見唇青爪甲青黑或氣上喘或脈浮空或徑如石此陽竭於上急宜回陽收納十中可救四五目痛如裂察非外感非邪火上攻或脈象與上條同病情有一二同者急宜回陽若滋陰解散則死耳癢欲死審無口苦咽乾寒熱往來即非肝膽為病此是腎氣上騰欲從耳脫也必有陰象足徵急宜回陽收納印堂如鏡久病虛極之人忽然印堂光明如鏡此是陽竭於上旦夕死亡之徵若不思而救之急宜大劑回陽收納光斂而飲食漸加過七日而精神更健者即有生機否則未敢遽許唇赤如朱久病虛極之人無邪火可徵忽見辰赤如朱此真陽從唇而脫旦夕死亡之徵急服回陽十中可救二三兩顴發赤久病與素秉不足之人兩顴發赤此真元竭於上也急宜回陽收納誤治則死鼻涕如注久病虛極之人忽鼻涕如注此元氣將脫旦夕死亡之證急宜回陽收納或救一二口張氣出久病虛極之人忽見口張氣出此元氣將絶旦夕死亡之徵法在不治若欲救之急宜回陽收納以盡人事眼胞下陷久病之人忽見眼胞下陷此五藏元氣竭於下也旦夕即死法在不治若欲救之急宜大劑回陽十中或可救一二白眼輪青久病虛損之人忽見白睛青而人無神此真陽衰極死亡之徵急宜回陽十中可救五六目腫如桃久病與素秉不足之人忽見目腫如桃滿身純陰並無一點邪火風熱可驗此是元氣從目脫出急宜回陽收納可保無虞目常直視久病虛極之人忽見目常直視此真氣將絶不能運動法在死例若欲救之急宜回陽或可十中救一二目光如華久病與素秉不足之人目前常見五彩光華此五臟精氣外越陽氣不藏亦在死例急宜回陽收納十中可救五六面色光彩久病虛損之人忽見面色鮮豔如無病之人此是真陽已竭於上旦夕死亡之客若欲救之急宜回陽光斂而神稍健過七日不變者方有生機否則不救面如枯骨久病虛極之人忽見面如枯骨此真元已絶精氣全無旦夕死亡之徵可預為辦理後事急服回陽十中或可救得一二面赤如朱面赤如瘀而白如紙面黑如煤面青如枯草久病虛極之人並無邪火足徵忽見面赤如朱者此真陽已竭於上也法在不治惟回陽一法或可十中救一二更有如瘀如紙如煤如枯草之類皆在死例不可勉強施治齒牙血出素秉陽虛之人並無邪火足徵陰象全具忽見滿口齒牙血出此是腎中之陽虛不能統攝血液陰血外溢只有扶陽收納一法最妥若以滋陰之六味地黃湯治之是速其危也牙腫如茄凡牙腫之人察其非胃火風熱各部有陰象足徵此是元氣浮於上而不潛藏急宜回陽收納封固為要若以養陰清火治之是速其亡也耳腫不痛凡耳腫之人其皮色必定如常即或微紅多含青色各部定有陰象足徵急宜大劑回陽切勿謂肝膽風熱照常法外感治之是速其死也喉痛飲滾凡喉痛飲滾之人必非風熱上攻定見脈息聲音一切無神陰象畢露急宜回陽之藥冷服以救之其效甚速此是陽浮於上不安其宅今得同氣之物以引之必返其舍若照風熱法治之是速其危矣咳嗽不已久病與素秉不足之人或過服清涼發散之人忽然咳嗽異常無時休息陰象全具此是陰邪上干清道元陽有從肺脫之勢急宜回陽祛陰陽旺陰消咳嗽自止切不可仍照滋陰與通套治咳嗽之上方治之若畏而不回陽是自尋其意也氣喘唇青久病與素秉不足之人忽見氣喘唇青乃是元氣上浮脫絶之徵法在難治急宜回陽降逆收納俟氣喘不作唇色轉紅方有生機苟信任不專聽之而已心痛欲死凡忽然心痛欲死之人或面赤或唇青察定陰陽不可苟且如心痛面赤飲冷稍安一刻者此是邪熱犯於心也急宜清火若面赤而飲滾兼見唇舌青光此是寒邪犯於心也急宜扶陽腹痛欲絶凡腹痛欲死之人細察各部情形如唇舌青黑此是陰寒凝滯陽不運行也急宜回陽如舌黃氣粗二便不利周身冰冷此是熱邪內攻閉其清道急宜宣散通滯如今之萬應靈通丸又名兌金丸又名靈寶如意丸又名川督普濟丸又名玉樞萬靈丹一半吹鼻一半服立刻見效不可不知也腸鳴瀉泄凡久病與素秉不足之人有腸鳴如雷泄瀉不止者此乃命門火衰臟寒之極急宜大劑回陽若以利水之藥治之必不見效豫曾經驗多人大便下血凡久病與素秉不足之人忽然大便下血不止此是下焦無火不能統攝有下脫之勢急宜大劑回陽如附子理中回陽飲之類小便下血此條與上大便下血同豫曾經驗多少皆是重在回陽其妙莫測由其無邪熱足徵也精滴不已大凡好色之人與素秉不足之人精常自出此是元陽大耗封鎖不密急宜大劑回陽交通水火為主豫嘗以白通湯治此病百發百中午後面赤凡午後面赤或發燒舉世皆謂陰虛不知久病與素秉不足之人陽氣日衰不能鎮納其陰陰邪日盛上浮於外況午後正陰盛時陽氣欲下潛藏於陰中而陰盛不納逼陽於外元氣升多降少故或現面赤或現夜燒此皆陰盛之候若按陰虛治之其病必劇豫常以回陽收納交通上下之法治之百發百中身癢欲死久病與素秉不足之人身忽癢極或通身發紅點形似風疹其實非風疹風疹之為病必不癢極欲死多見發熱身疼惡寒惡風若久病素不足之人其來者驟多不發熱身疼即或大熱而小便必清口渴飲滾各部必有陰象足徵脈亦有浮空徑急如繩可據此病急宜大劑回陽收納為要若作風疹治之速其亡也大汗如雨久病與素秉不足之人忽然大汗如雨此亡陽之候也然亦有非亡陽者夫大汗如雨驟然而出片刻即汗止者此非亡陽乃陰邪從毛竅而出則為解病之兆若其人氣息奄奄旋出而身冷者真亡陽也法則不治若欲救之亦只回陽一法然陽明熱極熱蒸於外亦有大汗如雨一條須有陽症病情足徵此則陰象全具一一可考大汗厄逆久病與素秉不足之人與過服克伐清涼之人忽然大汗厄逆此陽亡於外脾腎之氣絶於內旦夕死亡之證也急宜回陽降逆服藥後如汗止厄逆不作即有生機若仍用時派止汗之麻黃根浮小麥止厄之丁香柿蒂未有不立見其死者也身熱無神久病與素秉不足之人或偶勞心忽見身大熱而不疼並無所苦只是人困無神不渴不食此是元氣發外宜回陽收納一劑可愈若以為發熱即照外感之法治之是速其危也世多不識吐血身熱凡吐血之人多屬氣衰不能攝血吐則氣機向外元氣亦與之向外故身熱急宜回陽收納為主切不可見吐血而即謂之火以涼劑施之大吐身熱經云吐則亡陽吐屬太陰大吐之人多緣中宮或寒或熱或食阻滯若即吐已而見周身大熱並無三陽表證足徵此屬脾胃之元氣發外急宜收納中宮元氣為主切不可仍照藿香正氣散之法治之豫於此證每以甘草乾薑湯加砂仁十治十效大泄身熱久病與素秉不足之人忽然大泄漸而身大熱者此屬陽脫之候大熱者陽竭於上大泄者陰脫於下急宜溫中收納為主切不可一見身熱便云外感一見大泄便云傷食若用解表消導利水其禍立至不可不知午後身熱經云陰虛生內熱是指邪氣旺而血衰並非專指午後夜間發熱為陰虛也今人全不在陰陽至理處探取盈縮消息一見午後夜間發熱便云陰虛便去滋水推其意以為午後屬陰即為陰虛就不知午後夜間正陰盛之時並非陰虛之候即有發熱多屬陰盛隔陽於外陽氣不得潛藏陽浮於外故見身熱何也人身真氣從子時一陽發動歷醜寅卯辰巳陽氣旺極至午未申酉戌亥陽衰而下潛藏今為陰隔拒不得下降故多發熱此乃陰陽盛衰元氣出入消息不可不知也豫於此證無論夜間午後發燒熱或面赤或唇赤脈空飲滾無神即以白通湯治之屢治屢效皮毛出血久病與素秉不足之人忽見皮毛出血此乃衛外之陽不足急宜回陽收納不可遲延陰囊縮入久病與素秉不足之人忽然囊縮腹痛此厥陰陰寒太甚陽氣虛極也急宜回陽或用艾火燒丹田或臍中或以胡椒末綿裹塞臍中用有力人口氣吹入腹中痛即止亦是救急妙法兩腳大燒久病與素秉不足之人或夜臥或午後兩腳大燒欲踏石上人困無神此元氣發騰有亡陽之勢急宜回陽收納為主切不可妄云陰虛而用滋陰之藥兩手腫熱凡素秉不足之人忽然兩手腫大如盂微痛微紅夜間午後便燒熱難忍此陰盛逼陽從手脫也急宜回陽收納力主兩乳忽腫凡素秉不足之人忽然兩乳腫大皮色如常此是元氣從兩乳脫出切勿當作瘡治當以回陽收納為主瘡口不斂凡瘡口久而不斂多屬元氣大傷不能化毒生肌只宜大劑回陽陽回氣旺其毒自消其口自斂切忌養陰清涼見瘡治瘡痘瘡平塌凡痘瘡平塌總緣無火只宜大劑回陽切不可兼用滋陰肛脫不收凡素秉不足之人或因大泄或因過痢以致肛脫不收此是下元無火不能收束法宜回陽收納腎氣或灸百會穴亦是良法小便不止久病與素秉不足之人忽見小便日數十次每來清長而多此是下元無火也急宜回陽收納腎氣切不可妄行利水腹痛即泄久病與素秉不足之人多有小腹一痛立即泄瀉或溏糞清白糞日十餘次此屬下焦火衰陰寒氣滯急宜回陽切不可專以理氣分利為事身疼無熱久病與素秉不足之人忽見身疼而卻不發熱者是里有寒也法宜溫里但服溫里之藥多有見大熱身疼甚者此是陰邪漬散即愈之徵切不可妄用清涼以止之身熱無疼久病與素秉不足之人與服克伐宣散太過之人忽見身熱而卻無痛苦並見各部陰象足徵此是陽越於外也急宜回陽收納不可妄用滋陰升散身冷內熱久病與素秉不足之人身外冷而覺內熱難當欲得清涼方快清涼入口卻又不受舌青滑而人無神二便自利此是陰氣發潮切不可妄用滋陰清涼之品急宜大劑回陽陽回則陰潮自滅若果系時疫外冷內熱之候其人必煩躁口渴飲冷二便不利人必有神又當攻下回陽則危身熱內冷久病之人忽見身大熱而內冷亦甚疊褥數重此是陽越於外寒隔於內急宜回陽陽氣復藏外自不熱內自不冷切不可認作表邪若與之解表則元氣立亡此等證多無外感足徵即或有太陽表證仍宜大劑回陽藥中加桂麻幾分即可無虞身重畏冷久病與素秉不足之人忽見身重畏冷者此是陰盛而陽微也急宜回陽身強不用久病與素秉不足之人與過服克伐宣散之人忽然身強不用此是真陽衰極陽氣不充君令不行陰氣旺甚阻滯經脈宜大劑回陽陽旺陰消正氣復充君令復行其病自已世人不識多以中風目之其用多以祛風每每釀成壞證不可不知也腳輕頭重久病與素秉不足之人人忽見腳輕頭重此是陰乘於上陽衰於內也急宜回陽收納真氣陽旺陰消頭重不作便是生機腳麻身軟久病與素秉不足之人多有腳麻身軟者此是陽氣虛甚不能充周急宜甘溫扶陽陽氣充足其病自已氣喘脈徑久病之人忽見氣喘脈徑此陽竭於上旦夕死亡之候急急回陽十中可救一二但非至親切切不可主方即主方亦必須批明以免生怨切不可見脈徑而云火大便去滋陰降火吐血脈大凡吐血之人忽見脈來洪大此陽竭於上危亡之候也今人動云吐血屬火脈大屬火皆是認不明陰陽之過也眉批人能知得血是水氣是火便知得滋陰之誤薑附之效也虛勞脈徑凡虛損已極之人脈象只宜沉細若見洪大細數或弦或緊或徑或如擊石或如粗繩或如雀啄釜沸皆死亡之候切切不可出方果系至親至友情迫不已只宜大甘大溫以扶之苟能脈氣和平即有生機切切不可妄用滋陰要知虛損之人多屬氣虛所現證形多有近似陰虛其實非陰虛也豫嘗見虛損之人每每少氣懶言身重嗜臥潮熱而口不渴飲食減少起居動靜一切無神明明陽虛並未見一分火旺陰虛的面目近閲市習一見此等病情每稱為陰虛所用藥品多半甘寒養陰並未見幾個膽大用辛溫者故一成虛勞十個九死非死於病實死於藥非死於藥實死於醫皆由醫家不明陰陽至理病家深畏辛溫故罕有幾個得生真大憾也以上數十條揭出元氣離根陽虛將脫危候情狀雖異病源則一學者苟能細心體會胸中即有定據一見便知用藥自不錯亂雖不能十救十全亦不致誤人性命但病有萬端亦非數十條可盡學者即在這點元氣上探求盈虛出入消息雖千萬病情亦不能出其範圍豫更一言奉告夫人身三百六十骨節節節皆有神節節皆有鬼神者陽之靈氣之主也此言節節皆正氣布護鬼者陰之靈血之主也此言節節皆真陰布護故前賢云鬼神塞滿宇宙宇宙指天地指人身也無論何節現出鬼象即陰邪也即以神治之神陽也火也氣也以陽治陰即益火之源以消陰翳即扶南瀉北之意即補火治水之義用藥即桂附薑砂一承是也無論何節現出邪神為殃言邪神者明非即正氣之盛指邪氣之盛邪氣即邪火也乾坤以正氣充塞正氣不能害人氣始能害人故曰邪神又可以鬼伏之鬼陰也血也水也邪神邪火也鬼伏神即以水治火滋陰降火用藥即三黃石膏大小承氣一派是也今人動云滋陰降火皆是為邪火傷陰立説並未有真正陰虛即謂陰虛皆陽虛也何則陰陽本一氣不可分也故經云氣旺則血旺氣衰則血衰氣升則血升氣降則血降氣在則血在氣亡則血亡明得此理便知天一生水之旨歸甘溫辛溫回陽之妙諦學者不必他處猜想即於鬼神一語領會通身陰陽用藥從陰從陽法度認得邪正關鍵識得諸家錯誤便可超人上乘臻於神化辨脈切要浮脈主風洪脈主火實脈主熱數脈主熱緊脈主寒滑脈主痰沉脈屬陰遲脈屬寒細脈不足微脈不足虛脈不足弱脈不足以上脈象諸書言浮主風也洪與實數滑主火主熱主寒主痰也豫謂浮脈未可遽概為風洪大實數緊滑未可遽概為火為熱為寒為痰也沉遲細微與虛弱亦未可遽概為陰為寒為不足為虛損也要知外感脈浮而病現頭疼身痛發熱惡風自汗鼻築流清始可以言風也若內傷已久元氣將脫之候脈象亦浮猶得以風言之乎洪大實數之脈而病現發熱惡熱煩躁口渴飲冷譫語口臭氣粗二便閉寒之類始可以言火言熱也若內傷已久元氣將脫之候脈象有極洪極長極實極數極徑之類又尚得以時行火熱證言之乎緊寒滑痰之脈而病現身疼發熱畏寒與吐痰不休之類始可言寒邪痰濕也若內傷已久元氣將脫之候脈象亦有極緊極滑之形又尚得以寒痰目之乎沉遲細微虛弱之脈而病現面白唇青少氣懶言困倦嗜臥之類乃可以言不足言虛寒言陰陽兩傷若外邪深入協火而動閉其清道熱伏於中陽氣不達於四末四肢冰冷惟口氣蒸手小便短赤而痛此為陽極似陰又尚得以氣血虛損言之乎總之脈無定體認證為要陰陽內外辨察宜清雖二十八脈詳分亦不過資顧問已耳學者苟能識得此中變化便不為脈所囿矣切脈金針夫脈者氣與血渾而為一者也其要在寸口百脈皆會於此其妙在散於周身隨邪之淺深臟腑之盛衰人性之剛柔身體之長短肌肉之肥瘦老幼男女之不同變化萬端其綱在浮沉遲數其妙在有神無神即有力無力也有神無神者即盈縮機關內外祕訣他如浮洪長大數實皆為盈為有餘之候果病情相符則為脈與病合當從有餘立法施治如脈雖具有上等象而病現不足已極則為脈不合病當舍脈從病急宜扶其不足培其本源切勿惑於浮風洪火之説若按浮風洪火治去則為害非淺沉遲細微虛弱皆為縮為不足果病情相符則為脈與病合當照不足立法施治如脈雖具以上等象而病現有餘已極又當舍脈從病切勿惑於沉遲細微為虛損若按虛損治去則為禍不淺豫恆曰一盈一縮即陰陽旨歸萬病繩墨切脈知此便易進步便易認證庶不為脈所囿矣相舌切要舌上白苔病人雖舌現白苔並未見頭疼身痛發熱惡寒惡熱等情切不可認為表證認為瘟證當於脈息聲音起居動靜有神無神處探求病情自有著落切切不可猛浪如果有表證足徵始可照解表法施治舌上黃苔病人雖舌現黃苔無論干黃色潤黃色老黃色黑黃色並未見口渴飲冷煩躁惡熱便閉等情切不可便謂火旺熱極當於陽虛真氣不上升處理會病情上理會治法即在其中如果見便閉口臭氣粗身輕惡熱心煩飲冷精神有餘等情便當攻下不可遲延舌上黑苔病人雖舌現黑苔無論乾黑色青黑色潤黑色雖現陰象切不可即作陰證施治如其人煩躁口渴飲冷惡熱身輕氣粗口臭二便閉結即當攻下不可遲延如其人安靜懶言困倦不渴不食二便自利即當回陽不可遲延舌上紅黑色舌上潤白苔舌根獨黃色舌上白黃色舌上黃芒刺舌尖獨青色舌上黑黃色舌上黑芒刺舌根獨黑色舌上青黃色舌上白芒刺舌尖慘紅色舌上粉白苔舌上青紅色舌心獨黃色舌上乾白苔舌上淡黃色舌邊獨白色舌裂而開瓣舌如豬腰色舌之分辨實屬繁冗亦難盡舉姑無論其舌之青黃赤白黑干潤燥裂芒刺滿口紅白相間黃黑相兼統以陰陽兩字盡之矣是陰證則有陰象足徵是陽證則有陽證可憑識得此旨則不專以舌論矣諸書紛紛論舌言某舌當某藥某舌當某方皆是刻舟求劍之流不可為法學者務於平日先將陰陽病情真真假假熟悉胸中自然一見便知亦是認證要著萬病一氣説病有萬端發於一元一元者二氣渾為一氣者也一氣盈縮病即生焉有餘即火不足即寒他如脈來洪大氣之盈也脈來數實脈來浮滑氣之盈也間亦不足脈來洪大數實浮滑乃邪實火盛此為有餘久病暴脫亦有此脈象不可不知脈來遲細氣之縮也脈來短小脈來虛弱氣之縮也間亦有餘脈來遲細短小虛弱皆為不足若溫病熱極脈伏亦有此脈不可不知脈來劈石脈來魚尾脈來雀啄脈來釜沸脈來掉尾脈來散亂氣之絶也推之面色如朱氣盈之驗亦有縮者素乎面赤不作病看新病面赤惡熱則為邪實火旺久病無神虛極之人而面赤則為陽竭於上脫絶之候色如雞冠者吉色如瘀血者死面青有神氣盈之驗亦有縮者素乎面青有神不作病看有病而始面青則為肝病有神主肝旺無神主肝虛色如翠羽者吉色如枯草者凶面白有神氣盈之驗亦有縮者素乎面白不作病看有病而始見面白者方以病論白而有神肺氣嘗旺白而無神肺虛之徵白如豬膏者吉色如枯骨者危面黃有神氣盈之驗亦有縮者素乎面黃不作病看有病而始面黃方以病論黃而有神胃積之盛黃而無神氣弱之徵黃而鮮明者吉黃如塵埃色者凶面黑有神氣盈之驗亦有縮者素乎面黑不作病看有病而始面黑方以病論黑而有神腎氣尚旺黑而無神腎氣衰弱黑如鳥羽者吉色如炭煤者危此論五色之盛衰其中尚有生克額屬心而黑氣可畏鼻屬土而青色堪驚骸下黃而水病腮左白而肝傷腮右赤兮火灼唇上黑兮水泱氣色之變化多端明暗之機關可據至若審音察理五音細詳五音指宮商角徵羽以應人身五臟也聲如洪鐘指邪火之旺極素來音洪不作病看有病而始見聲洪則為邪實火旺法宜瀉火為主語柔而細屬正氣之大傷素來聲細不作病看有病而始見聲低息短則為不足忽笑忽歌心脾之邪熱已現笑主心旺歌主脾旺或狂或叫陽明之氣實方張狂叫乃胃熱極瞑目而言語重重曰神曰鬼瞑目妄言鬼神是正氣虛極神不守舍也張目而呼罵叨叨最烈最橫肝火與心胃邪旺其勢有不可撲滅曰飲食曰起居也須考證食健力健言氣之盈食少力少本氣之縮飲冷飲滾兮陰陽之形蹤已判好動好臥兮虛實之病機畢陳至於身體更宜詳辨肌肉豐隆定見胃氣之旺形瘦如柴已知正氣之微皮膚干潤判乎吉凶毛髮脫落知其正敗要知風氣為殃春溫之名已播火氣作祟暑熱之號已工濕氣時行霍亂之病偏多燥氣行秋瘧痢之病不少又乃冬布嚴寒傷寒名著一年節令病氣之變化無窮六氣循環各令之機關可據六氣即是六經六經仍是一經五行分為五氣五氣仍是一氣揭太陽以言氣之始論厥陰以言氣之終晝夜循環周而復始病也者病此氣也周身骨節經絡皆是後天有形之質全賴一氣貫注雖各處發病形勢不同總在一氣之中神為氣之宰氣傷則神不安故曰病氣也者周身軀殼之大用也身中無氣則無神故曰死用藥以治病實以治氣也氣之旺者宜平正氣不易旺惟邪氣易旺須當細分氣之衰者宜助衰有邪衰正衰之別當知氣升者宜降瀉其亢盛氣之陷者宜舉氣之滯者宜行氣之郁者宜解氣之脫者宜固氣之散者宜斂知其氣之平知其氣之變用藥不失宜匡救不失道醫之事畢矣胎元圖説今以一大圈喻人一身之真氣中有一小圈喻人身受胎之始基始基之謂胎元之消息也稱為祖氣號曰先天先天即父母精血中一點真氣眉批陽精陰血各具真氣故曰真氣寓於凡精凡血之中二氣渾為一氣一氣中含五氣五氣即青黃赤白黑秉天也五氣即金木水火土秉地也在人即心肝脾肺腎經云二五精妙合二凝是也五氣發生萬物陰陽配合迭相運用化生五臟六腑百脈經絡天地所有人身皆具然未生以前五行在乾坤之中既生以後乾坤即在五行之內五氣生萬物一物一太極一物一陰陽陽之用從晝陰之用從夜此坎離之功用所由分而萬物之功用所由出由一而萬理攸分由萬而一元合聚故曰一粒粟藏大千世界即此之謂也孟子云萬物皆備於我皆是由明善復初以知得箇中這一點機關這一點胎元消息也其中這點真消息逐日運行無刻休息子時發動由下而中而上陽根於陰故由下而發上由上而中而下陰根於陽故由上而趨下此陰陽互為其根一元之消息也循環不已然由下而中而上三陽已分下中上為三部陽主上升一氣分為三部即太陽陽明少陽也由上而中而下三陰已定上中下為三部陰主下降陽從背面陰從腹面三陰即太陰少陰厥陰是也合之二三如六故曰六步而成位六爻之義於此分六氣六經之所由判亦無非這一點胎元流行充周之所化育也仲景知得六步之精義移步換形移步更名變化萬端不出範圍豫初業斯道即聞諸師云萬病不出六經不出陰陽終不了了冥心之餘忽得此胎元消息始識師言之不謬仲景之骨髓如見矣用藥須知外感風寒忌收納也凡一切外邪初入切不可攻下攻下則引邪入里變證百出切不可妄用溫固收納收納為關門捉賊延禍匪輕切不可妄用滋陰滋陰則留戀陰邪病根難除只宜按定六經提綱病情施治庶不誤人內傷虛損忌發散也凡內傷之人多半咳嗽由清陽不升濁陰不降閉塞清道而成只宜辛甘化陽之品蕩去陰邪清升濁降咳嗽自已昧者不識稱為陳寒入肺純用一派搜寒宣散之品每每釀成脫證不知病既內傷正虛無疑而更用此宣散則一線之正氣又為大傷豈能久延時刻而不脫絶者乎凡內傷之人多半胸滿不食痰多由中宮氣衰轉輸失職陰邪痰水堵寒胸中只宜溫中醒脾助正胸滿痰水自去也昧者不察多用一派推蕩破滯之品每每釀成腹脹不治之病不可不知凡內傷之人多有身熱而卻不疼雖然內熱而口不渴如此等病情近似外感近似火症只宜回陽收納收納則陽不外越而身熱自已陽回則鎮納陰邪而陰潮不作諸書稱內熱由陰虛不知陽衰而陰鬼立出即晝夜亦可知也昧者不識一見發熱稱為外感便以發散投之必危一見內熱稱為陰虛滋陰降火必殆陽虛吐血忌滋陰也凡吐血之人由正氣已衰中宮不運陰邪僭居陽位久久積聚陽無力以施運行之權陽無力以申乾剛之令一觸即發血所以出也只宜甘溫扶陽以申其正氣正氣日申陰血自降一定之理昧者不察一見吐血便以滋陰止血之品希圖速效究竟釀成死證含糊有年真憾事也陰虛吐血忌溫補也凡陰虛吐血之人多半精神有餘火伏於中逼血妄行吐後人不困倦此乃有餘之候百中僅見一二只宜清涼平其有餘若照陽虛吐血治之必殆不可不知陽虛一切病證忌滋陰也凡陽虛之人多屬氣衰血盛無論發何疾病多緣陰邪為殃切不可再滋其陰若更滋其陰則陰愈盛而陽愈消每每釀出真陽外越之候不可不知陰虛一切病證忌溫補也凡陰虛之人多屬氣盛血衰無論何部發病多緣火邪為殃切不可再扶其陽若扶其陽則陽愈旺而陰愈消每每釀出亢龍有悔之候不可不知病有宜汗者太陽病發熱身疼自汗惡風者當發汗太陽病外症未解脈浮弱者當微發汗太陽病表症未罷發汗未過脈浮數者仍可發汗陽明病脈遲汗出多微惡寒者表未解也可發汗太陰病脈浮者可發汗太陰病汗後不解仍發熱脈浮者當復汗之傷寒發汗本無體隨邪之淺深本氣之盛衰有大發汗復發汗微發汗更有和解亦得汗而解溫經亦得汗而解回陽亦得汗而解不可不知病有不宜汗者仲景云陽盛陰虛下之則愈汗之則死發熱身疼脈浮緊者當發汗假令尺脈遲弱者不可發汗以營弱血少故也咽燥喉痹者不可發汗津液現已傷也咳而小便利若無小便者不可發汗下元虛也下利雖有表證不可發汗發汗則水濕必散於周身而成浮腫脹滿淋家不可發汗發汗則津液內亡客熱更增衄血亡血家不可發汗以其血液虛也瘡家不可發汗發汗則痙表虛熱盛故生瘡汗之則表愈虛而熱愈熾熱則傷血熱則生風故變為痙少陰病脈沉細數沉為在裡不可發汗大便素難便者不可發汗發汗則譫語以其血液既少而復奪之表虛里實故譫語汗家不可重發汗發汗則心神恍惚蓋以汗為血液也心液大耗神無所主故見恍惚虛人發熱無身疼者不可發汗發汗則陽亡蓋以發熱乃陽越於外收之唯恐不及今誤汗之陽必亡血氣欲絶手足厥冷引衣踡臥不可發汗發汗則殆厥證脈緊不可發汗汗則聲絶咽嘶舌萎要知陽厥宜下即熱深厥深是也陰厥宜回陽即四逆湯法是也脈弦細頭痛發熱者屬少陽宜和解不宜發汗發汗則變證百出太陽與少陽並病頭項強痛或眩冒時加結胸心下痞硬者不可發汗風溫證不可發汗汗之則熱盛汗則血傷也濕溫證不可發汗汗之衛陽虛津液竭熱必盛也虛煩證不可發汗汗之則心血虛而煩愈盛也午後熱不可發汗汗之則陽亡久病陽虛陰虛一切諸證不可擅發汗病有宜吐者病如桂枝證頭不疼項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為有寒一云內有久痰宜吐之病人胸中菀菀而痛不能食欲使人按之而反有涎唾下利日十餘行其脈反遲寸口微滑此宜吐之吐之則利止少陰病飲食入口即吐心下溫溫欲吐復不能吐者宜吐之宿食在上脘者當吐之病手足逆冷脈乍結以客氣在胸中心下滿而煩欲食不能病在胸中當吐之凡病在膈上脈大胸滿多痰者食在胃口脈滑者俱宜吐之病有不宜吐者脈虛脈微者不可吐太陽病乾嘔嘔逆者不可吐吐之則傷胃四肢厥逆者不可吐膈上有寒飲乾嘔者不宜吐當溫之凡中下二部之病切不可吐吐則為逆病有宜下者發汗不解腹滿痛者急下之下利三部脈皆平按之心下硬者急下之下利脈遲滑者內實也利未欲止當下之脈滑而數者有宿食也宜下之寸脈浮大按之反澀尺中亦微而澀知有宿食也宜下之下利不欲食者以有宿食故也當下之下利見譫語者有屎燥也宜下之下利瘥至其年月日時復發者病不盡故也當下之傷寒六七日目中不了了睛不合無表裡證大便難身微熱者此為實也急下之陽明病發熱汗出多者急下之二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈少陰病得之二三日口燥咽乾者急下之此邪未深入便作口燥腎水將干宜急下之以救欲絶之水也少陰證六七日腹脹不大便者急下之此少陰邪熱入胃府也土勝則水乾宜急下以救腎水少陰病自利清水色純青心中必痛口中燥者急下之青為肝色肝邪乘腎故下利陽邪上攻故口燥此亦少陰傳陽明腑證也厥陰證舌卷囊縮宜急下之此證有寒極而縮者宜溫此由陽明之熱陷入厥陰陽明主潤宗筋宗筋為熱所功弗榮而急引舌與睪丸故舌卷囊縮此為熱極故宜急下以存陰也須知胃為五臟六腑之大源凡胃受熱處處皆可傳及總之土燥則水易虧故陽明與厥陰皆有急下法證雖不同其入腑之理則一也病有不宜下者仲景云陰盛陽虛汗之則愈下之則死太陽病外證未解者不可下下之則引邪入里也脈浮大者不可下浮大為在表也惡寒者不可下邪尚在表也嘔多雖有陽明證不可下邪在上焦也陰明病不能食攻其熱必噦胃中虛冷故也陽明病發汗反下之則為大逆太陽陽明合病喘而胸滿不可下宜麻黃湯寒散肺清胃邪亦自散也脈細數者不可下細數為血虛有熱下之熱邪入里恐亡陰惡水者不可下下之則內冷不嗜食完穀出頭痛目黃者不可下邪在上也陽微者不可下下之痞硬陰盛而陽不宣也寒厥者不可下下之則死腹脹可按而減者不可下裡虛而邪未實也咽中祕塞者不可下邪在上也陽明病面赤心下雖微滿不可下邪未實也腹中上下左右有動氣者不可下結胸證脈浮大者不可下邪在表也臟結無陽證舌上苔滑安靜不渴者不可下大便硬小便數者不可下乃脾約丸證也陽明病自汗出若發汗小便自利者不可下此為津液內竭雖硬不可攻宜蜜煎導之凡病之當汗與不當汗當吐與不當吐當下與不當下淺深各有定據不得胡行妄為務宜詳察病情診視脈象有神無神聲音微厲飲熱飲冷喜按畏按各處搜求自然有下手處也服藥須知大凡陽虛陰盛之人滿身純陰雖現一切證形如氣喘氣短痰多咳嗽不食嗜臥面白唇青午後夜間發熱咽痛腹痛泄瀉無故目赤牙疼腰痛膝冷足軟手弱聲低息微脈時大時徑或浮或空或沉或細種種不一皆宜扶陽驅逐陰邪陽旺陰消邪盡正復方可了扶陽之品但初服辛溫有胸中煩躁者有昏死一二時者有鼻血出者有滿口起疱者有喉干喉痛目赤者此是陽藥運行陰邪化去從上竅而出也以不思冷水吃力準即吃一二口冷水皆無妨服辛溫四五劑或七八劑忽咳嗽痰多日夜不輟此是肺胃之陰邪從上出也切不可清潤服辛溫十餘劑後忽然周身面目浮腫或發現斑點痛癢異常或汗出此是陽藥運行陰邪化去從七竅而出也以飲食漸加為準服辛溫十餘劑或二十餘劑或腹痛泄瀉此是陽藥運行陰邪化去從下竅而出也但人必困倦數日飲食懶餐三五日自已其中尚有辛溫回陽而周身反見大痛大熱者陰陷於內得陽運而外解也半日即愈凡服此等熱藥總要服至周身腹中發熱難安時然後與以一劑滋陰此乃全身陰邪化去真陽已復即與以一劑滋陰之品以斂其所復之陽陽得陰斂而陽有所依自然互根相濟而體健身輕矣雖然邪之情形萬變莫測以上所論不過略陳大意耳學者須知
